<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Nippon Electricals — Smart POS</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#CC0000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#CC0000;border-radius:2px}
select option{background:#1a1a1a;color:#f0f0f0}
input[type=file]{width:100%;background:#242424;border:1.5px dashed #444;border-radius:8px;padding:10px;color:#888;font-size:13px;cursor:pointer}
input[type=file]::file-selector-button{background:#CC0000;color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;margin-right:10px;font-size:12px}
@media print{body *{visibility:hidden}#bill-print,#bill-print *{visibility:visible}#bill-print{position:fixed;top:0;left:0;width:100%;background:#fff;color:#000;padding:16px;font-family:'Space Mono',monospace;font-size:11px}}

@keyframes fadeUp    {from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn    {from{opacity:0}to{opacity:1}}
@keyframes slideDown {from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp   {from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn     {0%{opacity:0;transform:scale(0.82)}70%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes spin      {to{transform:rotate(360deg)}}
@keyframes glow      {0%,100%{box-shadow:0 0 18px #CC000066,0 0 40px #CC000022}50%{box-shadow:0 0 40px #CC0000bb,0 0 80px #CC000044}}
@keyframes bulbPulse {0%,100%{filter:brightness(1) drop-shadow(0 0 6px #FFD70099)}50%{filter:brightness(1.18) drop-shadow(0 0 22px #FFD700ff)}}
@keyframes badgePop  {0%{transform:scale(0)}60%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes shimmer   {0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes toastIn   {from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes ripple    {to{transform:scale(4);opacity:0}}
@keyframes navPop    {0%{transform:scale(0.6) translateY(5px)}100%{transform:scale(1) translateY(0)}}
@keyframes sparkle   {0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
@keyframes float     {0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

.anim-fadeUp   {animation:fadeUp   0.32s ease both}
.anim-fadeIn   {animation:fadeIn   0.22s ease both}
.anim-slideDown{animation:slideDown 0.3s ease both}
.anim-popIn    {animation:popIn    0.3s cubic-bezier(.34,1.56,.64,1) both}
.anim-slideUp  {animation:slideUp  0.36s cubic-bezier(.22,1,.36,1) both}
.anim-float    {animation:float 3s ease-in-out infinite}

.card-tap{transition:transform 0.14s ease,box-shadow 0.14s ease,background 0.14s ease}
.card-tap:active{transform:scale(0.97)}

.btn-ripple{position:relative;overflow:hidden}
.btn-ripple .rip{position:absolute;border-radius:50%;background:rgba(255,255,255,0.3);animation:ripple 0.55s linear;pointer-events:none}

.logo-glow{animation:glow 2.8s ease-in-out infinite;border-radius:20px}
.bulb-anim{animation:bulbPulse 2.2s ease-in-out infinite}
.cart-badge{animation:badgePop 0.28s cubic-bezier(.34,1.56,.64,1) both}
.nav-icon-active{animation:navPop 0.22s cubic-bezier(.34,1.56,.64,1) both}
</style>
</head>
<body>
<div id="root"></div>
<div id="bill-print"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, createContext, useContext } = React;

// ─── Supabase config ──────────────────────────────────────────────────────────
const CFG_KEY = 'ne_supabase_cfg';
const getCfg  = () => { try{return JSON.parse(localStorage.getItem(CFG_KEY)||'null');}catch{return null;} };
const saveCfg = (u,k) => localStorage.setItem(CFG_KEY,JSON.stringify({url:u,key:k}));
const clearCfg= () => localStorage.removeItem(CFG_KEY);
let _sb = null;
const initSupabase = (u,k) => { _sb = window.supabase.createClient(u,k); return _sb; };

// ─── DB layer ─────────────────────────────────────────────────────────────────
const DB = {
  getAll: async s => { const {data,error}=await _sb.from(s).select('id,data').order('id'); if(error)throw error; return (data||[]).map(r=>({...r.data,id:r.id})); },
  put:    async (s,item) => { const {error}=await _sb.from(s).upsert({id:item.id,data:item},{onConflict:'id'}); if(error)throw error; },
  del:    async (s,id)   => { const {error}=await _sb.from(s).delete().eq('id',id); if(error)throw error; },
  seed:   async (s,items)=> { const {count,error}=await _sb.from(s).select('id',{count:'exact',head:true}); if(!error&&count===0) for(const i of items) await DB.put(s,i); },
};

// ─── Seeds ────────────────────────────────────────────────────────────────────
const SEED_USERS     = [{id:1,name:"Admin",username:"admin",password:"admin123",role:"admin",email:"",active:true,avatar:"A",createdAt:new Date().toISOString().split('T')[0]}];
const SEED_PRODUCTS  = [];
const SEED_SALES     = [];
const SEED_CHEQUES   = [];
const SEED_COMPANIES = [];

const SL_BANKS = ["Bank of Ceylon","HNB","Commercial Bank","Sampath Bank","People's Bank","NDB","DFCC","Seylan Bank","Pan Asia Bank","Nations Trust Bank","Union Bank","Citi Bank","Other"];
const CATS = ["Lighting","Circuit Breakers","Wires & Cables","Switchgear","Fans","Accessories","Tools","Conduit & Fittings","Other"];

// ─── Context ──────────────────────────────────────────────────────────────────
const Ctx = createContext(null);
const useApp = () => useContext(Ctx);

// ─── Colors ───────────────────────────────────────────────────────────────────
const C = {red:'#CC0000',dark:'#0f0f0f',card:'#1a1a1a',border:'#2a2a2a',text:'#f0f0f0',muted:'#888',gold:'#FFD700',green:'#00C853',blue:'#1976D2',orange:'#FF6D00',purple:'#7B1FA2'};

// ─── Helpers ──────────────────────────────────────────────────────────────────
const lkr  = n => 'Rs. '+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const lkrK = n => 'Rs. '+(Number(n||0)/1000).toFixed(1)+'K';
const uid  = () => Date.now()+Math.floor(Math.random()*9999);
const today= () => new Date().toISOString().split('T')[0];
const compressImg = file => new Promise(res=>{
  const rd=new FileReader(); rd.onload=e=>{const im=new Image(); im.onload=()=>{const MAX=1200,r=Math.min(MAX/im.width,MAX/im.height,1),cv=document.createElement('canvas'); cv.width=im.width*r; cv.height=im.height*r; cv.getContext('2d').drawImage(im,0,0,cv.width,cv.height); res(cv.toDataURL('image/jpeg',0.75));};im.src=e.target.result;}; rd.readAsDataURL(file);
});

// ─── Export utilities ─────────────────────────────────────────────────────────
const xlsxExport=(rows,sheet,fname)=>{const ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,sheet);XLSX.writeFile(wb,fname+'.xlsx');};
const pdfExport=(title,cols,rows,fname,orient='landscape')=>{try{const{jsPDF}=window.jspdf,doc=new jsPDF({orientation:orient,unit:'mm',format:'a4'});doc.setFontSize(14);doc.setTextColor(204,0,0);doc.text('NIPPON ELECTRICALS',14,14);doc.setFontSize(11);doc.setTextColor(0);doc.text(title,14,21);doc.setFontSize(8);doc.setTextColor(120);doc.text('Exported: '+new Date().toLocaleString(),14,27);doc.autoTable({columns:cols.map(c=>({header:c.h,dataKey:c.k})),body:rows,startY:32,styles:{fontSize:8,cellPadding:2},headStyles:{fillColor:[204,0,0],textColor:255,fontStyle:'bold'},alternateRowStyles:{fillColor:[245,245,245]}});doc.save(fname+'.pdf');}catch(e){alert('PDF failed – try Excel');}};
const exportSalesXLSX=s=>xlsxExport(s.map(x=>({'Invoice':x.invoiceNo,'Date':x.date,'Customer':x.customer,'Items':x.items.map(i=>i.name+'x'+i.qty).join(' | '),'Subtotal':x.subtotal,'Tax':x.taxAmount,'Discount':x.discount,'Total':x.total,'Payment':x.paymentMode,'Cashier':x.cashier})),'Sales','NE_Sales_Report');
const exportSalesPDF=s=>pdfExport('Sales Report',[{h:'Invoice',k:'inv'},{h:'Date',k:'date'},{h:'Customer',k:'cust'},{h:'Items',k:'items'},{h:'Total',k:'total'},{h:'Payment',k:'pay'},{h:'Cashier',k:'cash'}],s.map(x=>({inv:x.invoiceNo,date:x.date,cust:x.customer,items:x.items.map(i=>i.name+'x'+i.qty).join(', '),total:lkr(x.total),pay:x.paymentMode,cash:x.cashier})),'NE_Sales_Report');
const exportProductsXLSX=p=>xlsxExport(p.map(x=>({'SKU':x.sku,'Name':x.name,'Category':x.category,'Sale Price':x.price,'Cost Price':x.costPrice,'Stock':x.stock,'Unit':x.unit,'Tax%':x.taxRate,'Status':x.active?'Active':'Inactive'})),'Products','NE_Products');
const exportProductsPDF=p=>pdfExport('Products Report',[{h:'SKU',k:'sku'},{h:'Name',k:'name'},{h:'Category',k:'cat'},{h:'Sale Price',k:'price'},{h:'Stock',k:'stock'},{h:'Status',k:'st'}],p.map(x=>({sku:x.sku,name:x.name,cat:x.category,price:lkr(x.price),stock:x.stock+' '+x.unit,st:x.active?'Active':'Inactive'})),'NE_Products');
const exportChequesXLSX=c=>xlsxExport(c.map(x=>({'Category':x.category,'Party':x.customerName||x.companyName,'Cheque No':x.chequeNo,'Bank':x.bank,'Amount':x.amount,'Date':x.chequeDate,'Status':x.status})),'Cheques','NE_Cheques');
const exportChequesPDF=c=>pdfExport('Cheques Report',[{h:'Category',k:'cat'},{h:'Party',k:'party'},{h:'Cheque No',k:'no'},{h:'Bank',k:'bank'},{h:'Amount',k:'amt'},{h:'Status',k:'st'}],c.map(x=>({cat:x.category,party:x.customerName||x.companyName,no:x.chequeNo,bank:x.bank,amt:lkr(x.amount),st:x.status})),'NE_Cheques');
const exportCompaniesXLSX=(cos,prods)=>{const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cos.map(c=>({'Name':c.name,'Type':c.type,'Contact':c.contactPerson,'Phone':c.phone,'Email':c.email,'Status':c.active?'Active':'Inactive'}))),'Companies');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(prods.filter(p=>p.supplierId).map(p=>({'Company':p.supplierName,'SKU':p.sku,'Name':p.name,'Sale Price':p.price,'Cost':p.costPrice,'Stock':p.stock}))),'Company Products');XLSX.writeFile(wb,'NE_Companies.xlsx');};
const exportCompaniesPDF=(cos,prods)=>pdfExport('Companies Report',[{h:'Company',k:'name'},{h:'Type',k:'type'},{h:'Contact',k:'contact'},{h:'Phone',k:'phone'},{h:'Products',k:'prods'},{h:'Status',k:'st'}],cos.map(c=>({name:c.name,type:c.type,contact:c.contactPerson,phone:c.phone,prods:prods.filter(p=>p.supplierId===c.id).length+' items',st:c.active?'Active':'Inactive'})),'NE_Companies');

// ═══════════════════════════════════════════════════════════════════════
//  LOGO — SVG Bulb
// ═══════════════════════════════════════════════════════════════════════

  <svg width={size} height={size} viewBox="0 0 80 80" fill="none"
    className={glow?'logo-glow':''} style={{borderRadius:'20%',display:'block',flexShrink:0}}>
    <defs>
      <radialGradient id="bg1" cx="40%" cy="25%" r="70%">
        <stop offset="0%" stopColor="#FF3333"/>
        <stop offset="100%" stopColor="#7A0000"/>
      </radialGradient>
      <radialGradient id="blb" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stopColor="#FFEE88"/>
        <stop offset="100%" stopColor="#FF9900" stopOpacity="0.5"/>

    </defs>
    {/* Background */}

    <line x1="53" y1="13" x2="50.5" y2="16.5" stroke="#FFD700" strokeWidth="1.6" strokeLinecap="round" opacity="0.75"/>
    <line x1="27" y1="13" x2="29.5" y2="16.5" stroke="#FFD700" strokeWidth="1.6" strokeLinecap="round" opacity="0.75"/>
    <line x1="58" y1="24" x2="54"   y2="25.5" stroke="#FFD700" strokeWidth="1.3" strokeLinecap="round" opacity="0.55"/>
    <line x1="22" y1="24" x2="26"   y2="25.5" stroke="#FFD700" strokeWidth="1.3" strokeLinecap="round" opacity="0.55"/>
  </svg>
);

//  SETUP SCREEN
// ═══════════════════════════════════════════════════════════════════════
function SetupScreen({onConnected}) {
  const [step,setStep]=useState(1);
  const [url,setUrl]=useState('');
  const [key,setKey]=useState('');
  const [testing,setTesting]=useState(false);
  const [err,setErr]=useState('');
  const [copied,setCopied]=useState(false);

  const SQL=`create table if not exists users     (id bigint primary key, data jsonb not null);
create table if not exists products  (id bigint primary key, data jsonb not null);
create table if not exists sales     (id bigint primary key, data jsonb not null);
create table if not exists cheques   (id bigint primary key, data jsonb not null);
create table if not exists companies (id bigint primary key, data jsonb not null);
alter table users     disable row level security;
alter table products  disable row level security;
alter table sales     disable row level security;
alter table cheques   disable row level security;
alter table companies disable row level security;
alter publication supabase_realtime add table users;
alter publication supabase_realtime add table products;
alter publication supabase_realtime add table sales;
alter publication supabase_realtime add table cheques;
alter publication supabase_realtime add table companies;
insert into users (id, data) values (1, '{"id":1,"name":"Admin","username":"admin","password":"admin123","role":"admin","email":"","active":true,"avatar":"A","createdAt":"2025-01-01"}') on conflict (id) do nothing;`;

  const copySQL=()=>{navigator.clipboard.writeText(SQL).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});};

  const connect=async()=>{
    if(!url.includes('supabase.co')||!key){setErr('Enter valid Supabase URL and anon key.');return;}
    setTesting(true);setErr('');
    try{
      initSupabase(url.trim(),key.trim());
      const{error}=await _sb.from('users').select('id',{count:'exact',head:true});
      if(error)throw new Error(error.message);
      saveCfg(url.trim(),key.trim());
      onConnected();
    }catch(e){setErr('Connection failed: '+e.message);_sb=null;}
    setTesting(false);
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',padding:'32px 18px'}}>
      <div className="anim-float" style={{marginBottom:24,textAlign:'center'}}>
        <NipponLogo size={80} glow={true}/>
      </div>
      <h1 className="anim-slideDown" style={{fontSize:20,fontWeight:900,marginBottom:4}}>NIPPON ELECTRICALS</h1>
      <p className="anim-fadeIn" style={{fontSize:11,color:C.muted,letterSpacing:1.2,marginBottom:28}}>DATABASE SETUP</p>

      <div style={{display:'flex',gap:8,marginBottom:28,alignItems:'center'}}>
        {[1,2].map(s=>(
          <React.Fragment key={s}>
            <div style={{width:28,height:28,borderRadius:'50%',background:step>=s?C.red:C.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:step>=s?'#fff':C.muted,transition:'all 0.3s'}}>{s}</div>
            {s<2&&<div style={{width:40,height:2,background:step>1?C.red:C.border,borderRadius:2,transition:'background 0.4s'}}/>}
          </React.Fragment>
        ))}
      </div>

      <div className="anim-fadeUp" style={{width:'100%',maxWidth:440}}>
        {step===1&&(
          <div style={{background:C.card,borderRadius:16,padding:22,border:`1px solid ${C.border}`,marginBottom:16}}>
            <h2 style={{fontSize:15,fontWeight:700,marginBottom:4}}>Step 1 — Create Supabase Project</h2>
            <p style={{fontSize:12,color:C.muted,marginBottom:18,lineHeight:1.7}}>Supabase is a free cloud database that syncs across all your shop devices in real-time.</p>
            {[['1','Go to supabase.com and create a free account'],['2','Click New Project → name it "nippon-pos" → Create'],['3','Wait ~2 minutes for project to be ready'],['4','Go to SQL Editor → New Query'],['5','Paste the SQL below and click Run']].map(([n,t])=>(
              <div key={n} style={{display:'flex',gap:10,marginBottom:12}}>
                <div style={{width:22,height:22,borderRadius:'50%',background:C.red,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff',flexShrink:0}}>{n}</div>
                <p style={{fontSize:13,color:C.text,lineHeight:1.5}}>{t}</p>
              </div>
            ))}
            <div style={{background:'#0d1117',borderRadius:10,padding:12,border:`1px solid ${C.border}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:'uppercase'}}>SQL Setup Script</span>
                <button onClick={copySQL} style={{background:copied?C.green:C.border,border:'none',borderRadius:6,padding:'4px 10px',color:'#fff',fontSize:11,cursor:'pointer',fontWeight:700,transition:'background 0.2s'}}>{copied?'✓ Copied!':'Copy SQL'}</button>
              </div>
              <pre style={{fontSize:9,color:'#7ee787',fontFamily:"'Space Mono'",overflow:'auto',maxHeight:160,margin:0,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{SQL}</pre>
            </div>
          </div>
        )}
        {step===1&&<Btn ch="I've run the SQL — Next →" onClick={()=>setStep(2)} full sz="lg"/>}

        {step===2&&(
          <>
            <div style={{background:C.card,borderRadius:16,padding:22,border:`1px solid ${C.border}`,marginBottom:16}}>
              <h2 style={{fontSize:15,fontWeight:700,marginBottom:4}}>Step 2 — Enter Supabase Credentials</h2>
              <p style={{fontSize:12,color:C.muted,marginBottom:16,lineHeight:1.6}}>Find these in: Supabase → Project Settings → API</p>
              <Inp lbl="Project URL *" val={url} set={setUrl} ph="https://xxxxxxxxxxxx.supabase.co"/>
              <Inp lbl="Anon / Public Key *" val={key} set={setKey} ph="eyJhbGciOi..."/>
              {err&&<div style={{background:'#3a1a1a',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#ff8888',lineHeight:1.5,marginTop:4}}>{err}</div>}
            </div>
            <div style={{display:'flex',gap:10}}>
              <Btn ch="← Back" v="dk" onClick={()=>setStep(1)} sz="lg"/>
              <Btn ch={testing?'Connecting…':'Connect & Start'} onClick={connect} dis={testing} st={{flex:1}} sz="lg"/>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
function LoginPage() {
  const {users,login,toast2}=useApp();
  const [u,setU]=useState('');
  const [p,setP]=useState('');
  const [loading,setLoading]=useState(false);

  const doLogin=()=>{
    setLoading(true);
    setTimeout(()=>{
      const found=users.find(x=>x.username===u.trim()&&x.password===p);
      if(!found){toast2('Invalid credentials','error');setLoading(false);return;}
      if(!found.active){toast2('Account deactivated','error');setLoading(false);return;}
      login(found);
    },400);
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px 18px'}}>
      <div className="anim-float" style={{marginBottom:20,textAlign:'center'}}>
        <NipponLogo size={92} glow={true}/>
      </div>
      <h1 className="anim-slideDown" style={{fontSize:24,fontWeight:900,letterSpacing:-0.5,marginBottom:2}}>NIPPON ELECTRICALS</h1>
      <p className="anim-fadeIn" style={{fontSize:11,color:C.muted,letterSpacing:1.4,marginBottom:36}}>SMART POS SYSTEM · LKR</p>

      <div className="anim-fadeUp" style={{width:'100%',maxWidth:360,background:C.card,borderRadius:18,padding:28,border:`1px solid ${C.border}`,borderTop:`3px solid ${C.red}`,boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
        <h2 style={{fontSize:16,fontWeight:700,marginBottom:20,textAlign:'center'}}>Staff Login</h2>
        <div style={{background:'#1a1500',border:`1px solid ${C.gold}33`,borderRadius:10,padding:'10px 14px',marginBottom:20,fontSize:12,color:C.gold,lineHeight:1.6}}>
          Default: <strong>admin</strong> / <strong>admin123</strong> — change after first login
        </div>
        <Inp lbl="Username" val={u} set={setU} ph="Enter username"/>
        <Inp lbl="Password" val={p} set={setP} type="password" ph="Enter password"/>

      </div>
    </div>
  );
}

            </div>
          </div>
          <button onClick={logout} style={{background:'rgba(255,255,255,0.15)',border:'none',borderRadius:10,padding:'8px 12px',color:'#fff',cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',gap:5,fontWeight:600,transition:'background 0.2s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.25)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.15)'}>
            <Ic n="out" s={14} c="#fff"/>Out
          </button>
        </div>
      </div>

      <div style={{padding:'14px 14px 0'}}>
        {/* Today Stats */}
        <p style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Today's Performance</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <StatBox lbl="Today Revenue" val={lkrK(todayRev)} col={C.green} icon="coin"/>
          <StatBox lbl="Today Sales" val={todaySales.length} col={C.blue} icon="pos"/>
          <StatBox lbl="Month Revenue" val={lkrK(monthRev)} col={C.gold} icon="coin"/>
          <StatBox lbl="Low Stock" val={lowStock.length} col={lowStock.length>0?C.orange:C.muted} icon="warn"/>
        </div>

        {/* Pending cheques alert */}
        {pendingCheques.length>0&&(
          <div className="anim-fadeUp" style={{background:'#1a1000',border:`1px solid ${C.gold}44`,borderRadius:12,padding:'12px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
            <Ic n="chq" s={18} c={C.gold}/>
            <div><div style={{fontSize:13,fontWeight:700,color:C.gold}}>{pendingCheques.length} Pending Cheques</div>
            <div style={{fontSize:11,color:C.muted}}>Total: {lkr(pendingCheques.reduce((a,c)=>a+c.amount,0))}</div></div>
          </div>
        )}

        {/* Low Stock */}
        {lowStock.length>0&&(
          <Card st={{marginBottom:14,borderLeft:`3px solid ${C.orange}`}} ch={
            <>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}><Ic n="warn" s={16} c={C.orange}/><span style={{fontWeight:700,color:C.orange,fontSize:13}}>Low Stock Alert</span></div>
              {lowStock.slice(0,5).map(p=>(
                <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:`1px solid ${C.border}`}}>
                  <span style={{fontSize:12}}>{p.name}</span><Badge ch={p.stock+' '+p.unit+' left'} col={C.orange}/>
                </div>
              ))}
            </>
          }/>
        )}

        {/* Recent Sales */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h3 style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1}}>RECENT TRANSACTIONS</h3>
          {sales.length>0&&<div style={{display:'flex',gap:6}}>
            <button onClick={()=>exportSalesXLSX(sales)} style={{background:C.border,border:'none',borderRadius:6,padding:'4px 10px',color:C.green,fontSize:10,cursor:'pointer',fontWeight:700,display:'flex',alignItems:'center',gap:4}}><Ic n="xls" s={12} c={C.green}/>XLS</button>
            <button onClick={()=>exportSalesPDF(sales)} style={{background:C.border,border:'none',borderRadius:6,padding:'4px 10px',color:C.red,fontSize:10,cursor:'pointer',fontWeight:700,display:'flex',alignItems:'center',gap:4}}><Ic n="pdf2" s={12} c={C.red}/>PDF</button>
          </div>}
        </div>
        {[...sales].reverse().slice(0,8).map((s,i)=>(
          <div key={s.id} className="anim-fadeUp" style={{background:C.card,borderRadius:10,padding:'11px 13px',marginBottom:8,border:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',animationDelay:`${i*0.05}s`}}>
            <div><div style={{fontSize:13,fontWeight:600}}>{s.customer}</div><div style={{fontSize:11,color:C.muted}}>{s.invoiceNo} · {s.date}</div></div>
            <div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:700,color:C.green,fontFamily:"'Space Mono'"}}>{lkr(s.total)}</div><Badge ch={s.paymentMode} col={C.green}/></div>
          </div>
        ))}
        {sales.length===0&&(
          <Card ch={<div style={{textAlign:'center',padding:'24px 0',color:C.muted}}><Ic n="pos" s={36} c={C.muted}/><p style={{marginTop:10,fontSize:13}}>No sales yet</p><p style={{fontSize:11,marginTop:4}}>Create your first bill in the POS tab</p></div>}/>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  POS PAGE
// ═══════════════════════════════════════════════════════════════════════
function POSPage() {
  const {products,user,onSaleComplete,toast2}=useApp();
  const [cart,setCart]   =useState([]);
  const [srch,setSrch]   =useState('');
  const [cust,setCust]   =useState('Walk-in Customer');
  const [pay,setPay]     =useState('cash');
  const [disc,setDisc]   =useState('');
  const [paid,setPaid]   =useState('');
  const [tab,setTab]     =useState('grid');   // 'grid' | 'cart'
  const [cat,setCat]     =useState('All');
  const [chqNo,setChqNo] =useState('');
  const [chqBk,setChqBk] =useState('');
  const [busy,setBusy]   =useState(false);
  const [flashId,setFlashId]=useState(null);
  const [badgeK,setBadgeK]  =useState(0);

  const cats=['All',...CATS];
  const filtered=products.filter(p=>p.active&&(cat==='All'||p.category===cat)&&p.name.toLowerCase().includes(srch.toLowerCase()));

  const add=p=>{
    if(p.stock<=0){toast2('Out of stock!','error');return;}
    setCart(prev=>{
      const ex=prev.find(i=>i.pid===p.id);
      if(ex){if(ex.qty>=p.stock){toast2('Max stock!','error');return prev;} return prev.map(i=>i.pid===p.id?{...i,qty:i.qty+1}:i);}
      return [...prev,{pid:p.id,name:p.name,price:p.price,qty:1,tax:p.taxRate||0,sku:p.sku||''}];
    });
    setFlashId(p.id); setBadgeK(k=>k+1);
    setTimeout(()=>setFlashId(null),380);
    toast2(p.name+' added ✓','success');
  };
  const updQty=(pid,d)=>setCart(prev=>prev.map(i=>i.pid===pid?{...i,qty:Math.max(1,i.qty+d)}:i));
  const rem=pid=>setCart(prev=>prev.filter(i=>i.pid!==pid));
  const clearAll=()=>{setCart([]);setDisc('');setPaid('');setChqNo('');setChqBk('');setCust('Walk-in Customer');setPay('cash');};

  const discN=Math.max(0,parseFloat(disc)||0);
  const sub  =cart.reduce((a,i)=>a+i.price*i.qty,0);
  const tax  =cart.reduce((a,i)=>a+(i.price*i.qty*(i.tax||0)/100),0);
  const total=Math.max(0,sub+tax-discN);
  const chng =parseFloat(paid||0)-total;
  const cnt  =cart.reduce((a,i)=>a+i.qty,0);

  const checkout=async()=>{
    if(!cart.length){toast2('Cart is empty!','error');return;}
    if(pay==='cash'&&parseFloat(paid||0)<total){toast2('Insufficient payment!','error');return;}
    if(pay==='cheque'&&(!chqNo||!chqBk)){toast2('Enter cheque details!','error');return;}
    setBusy(true);
    try{
      const inv={id:uid(),date:today(),customer:cust.trim()||'Walk-in Customer',items:[...cart],subtotal:sub,taxAmount:tax,total,discount:discN,paid:parseFloat(paid||total),change:Math.max(0,chng),paymentMode:pay,cashier:user.username,status:'completed',invoiceNo:'NE-'+today().replace(/-/g,'').slice(2)+'-'+String(uid()).slice(-4),chqDet:pay==='cheque'?{no:chqNo,bank:chqBk}:null,createdAt:new Date().toISOString()};
      await onSaleComplete(inv);
    }catch(e){toast2('Checkout failed: '+e.message,'error');setBusy(false);}
  };

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',paddingBottom:70}}>
      {/* Header bar with logo */}
      <div style={{background:C.card,padding:'10px 13px',borderBottom:`1px solid ${C.border}`,display:'flex',gap:8,alignItems:'center'}}>
        <NipponLogo size={32}/>
        <div style={{flex:1,position:'relative'}}>
          <div style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)'}}><Ic n="srch" s={14} c={C.muted}/></div>
          <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Search products…"
            style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 10px 8px 30px',color:C.text,fontSize:13,fontFamily:"'Noto Sans JP'",outline:'none'}}
            onFocus={e=>e.target.style.borderColor=C.red} onBlur={e=>e.target.style.borderColor=C.border}/>
        </div>
        <button onClick={()=>setTab(t=>t==='grid'?'cart':'grid')}
          style={{position:'relative',background:tab==='cart'?C.red:C.border,border:'none',borderRadius:8,padding:'8px 11px',cursor:'pointer',display:'flex',alignItems:'center',transition:'background 0.2s'}}>
          <Ic n="cart" s={18} c="#fff"/>
          {cnt>0&&<span key={badgeK} className="cart-badge" style={{background:'#fff',color:C.red,borderRadius:'50%',width:17,height:17,fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',position:'absolute',top:-5,right:-5}}>{cnt}</span>}
        </button>
      </div>

      {/* Tab bar */}
      <div style={{display:'flex',background:'#141414',borderBottom:`1px solid ${C.border}`}}>
        {[['grid','box','Products'],['cart','cart',cnt>0?`Cart (${cnt})`:'Cart']].map(([v,ic,lb])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:'9px 4px',background:'none',border:'none',cursor:'pointer',color:tab===v?C.red:C.muted,fontWeight:tab===v?700:400,fontSize:12,borderBottom:tab===v?`2px solid ${C.red}`:'2px solid transparent',display:'flex',alignItems:'center',justifyContent:'center',gap:6,transition:'color 0.2s'}}>
            <Ic n={ic} s={14} c={tab===v?C.red:C.muted}/>{lb}
          </button>
        ))}
      </div>

      {/* PRODUCTS GRID */}
      {tab==='grid'&&(
        <div style={{flex:1,overflow:'auto'}}>
          <div style={{display:'flex',gap:6,padding:'10px 12px',overflow:'auto',borderBottom:`1px solid ${C.border}`}}>
            {cats.map(c=>(
              <button key={c} onClick={()=>setCat(c)} style={{background:cat===c?C.red:C.border,border:'none',borderRadius:20,padding:'5px 13px',color:'#fff',fontSize:10,cursor:'pointer',whiteSpace:'nowrap',fontWeight:cat===c?700:400,transition:'all 0.18s',transform:cat===c?'scale(1.06)':'scale(1)'}}>
                {c}
              </button>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,padding:12}}>
            {filtered.map(p=>{
              const inCart=cart.find(i=>i.pid===p.id);
              const flash=flashId===p.id;
              return (
                <div key={p.id} onClick={()=>add(p)} className="card-tap"
                  style={{background:flash?'#2d1010':C.card,borderRadius:12,padding:12,border:`1.5px solid ${flash?C.red:inCart?C.red+'66':p.stock<=p.minStock?C.orange+'55':C.border}`,cursor:'pointer',transition:'all 0.18s',boxShadow:flash?`0 0 16px ${C.red}44`:inCart?`0 0 8px ${C.red}22`:'none',userSelect:'none'}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{p.category}</div>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:6,lineHeight:1.3}}>{p.name}</div>
                  <div style={{fontSize:16,fontWeight:900,color:C.red,fontFamily:"'Space Mono'"}}>{lkr(p.price)}</div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:5}}>
                    <span style={{fontSize:10,color:p.stock<=p.minStock?C.orange:C.muted}}>Stk:{p.stock}</span>
                    {inCart&&<span style={{background:C.red,color:'#fff',borderRadius:10,padding:'2px 7px',fontSize:10,fontWeight:700}}>×{inCart.qty}</span>}
                  </div>
                  {p.taxRate>0&&<div style={{fontSize:9,color:C.muted,marginTop:2}}>+{p.taxRate}% Tax</div>}
                </div>
              );
            })}
            {!filtered.length&&(
              <div className="anim-fadeIn" style={{gridColumn:'1/-1',textAlign:'center',color:C.muted,padding:48}}>
                <Ic n="box" s={44} c={C.muted}/>
                <p style={{marginTop:12,fontSize:13}}>{products.filter(p=>p.active).length===0?'No products yet — add them in Products tab':'No matches'}</p>
              </div>
            )}
          </div>
        </div>
      )}

      {/* CART VIEW */}
      {tab==='cart'&&(
        <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column'}}>
          <div style={{flex:1,overflow:'auto',padding:12}}>
            <Inp lbl="Customer Name" val={cust} set={setCust} ph="Customer name"/>
            {!cart.length?(
              <div className="anim-fadeIn" style={{textAlign:'center',color:C.muted,padding:40}}>
                <Ic n="cart" s={44} c={C.muted}/>
                <p style={{marginTop:12,fontSize:13}}>Cart empty — tap Products to add items</p>
                <Btn ch="Browse Products" v="out" onClick={()=>setTab('grid')} st={{marginTop:16}}/>
              </div>
            ):cart.map((item,i)=>(
              <div key={item.pid} className="anim-fadeUp" style={{background:C.card,borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.border}`,animationDelay:`${i*0.04}s`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{item.name}</div><div style={{fontSize:11,color:C.muted}}>{lkr(item.price)}{item.tax>0?` +${item.tax}% Tax`:''}</div></div>
                  <button onClick={()=>rem(item.pid)} style={{background:'#3a1a1a',border:'none',borderRadius:6,padding:'5px 7px',cursor:'pointer'}}><Ic n="del" s={14} c={C.red}/></button>
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{display:'flex',alignItems:'center',background:'#242424',borderRadius:10,overflow:'hidden'}}>
                    <button onClick={()=>updQty(item.pid,-1)} style={{background:'none',border:'none',padding:'7px 13px',cursor:'pointer',color:C.red,fontSize:18,fontWeight:700,lineHeight:1}}>−</button>
                    <span style={{fontFamily:"'Space Mono'",fontWeight:700,minWidth:24,textAlign:'center',fontSize:15}}>{item.qty}</span>
                    <button onClick={()=>updQty(item.pid,1)} style={{background:'none',border:'none',padding:'7px 13px',cursor:'pointer',color:C.green,fontSize:18,fontWeight:700,lineHeight:1}}>+</button>
                  </div>
                  <div style={{fontFamily:"'Space Mono'",fontWeight:700,fontSize:14}}>{lkr(item.price*item.qty)}</div>
                </div>
              </div>
            ))}
          </div>

          {cart.length>0&&(
            <div style={{background:'#141414',padding:14,borderTop:`1px solid ${C.border}`}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{color:C.muted,fontSize:13}}>Subtotal</span><span style={{fontFamily:"'Space Mono'"}}>{lkr(sub)}</span></div>
              {tax>0&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{color:C.muted,fontSize:13}}>Tax</span><span style={{fontFamily:"'Space Mono'"}}>{lkr(tax)}</span></div>}
              <input value={disc} onChange={e=>setDisc(e.target.value)} placeholder="Discount (Rs.)" type="number" min="0"
                style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 12px',color:C.text,fontSize:13,marginBottom:8,fontFamily:"'Noto Sans JP'",outline:'none'}}/>
              <div style={{display:'flex',justifyContent:'space-between',borderTop:`1px solid ${C.border}`,paddingTop:8,marginBottom:10}}>
                <span style={{fontWeight:700,fontSize:15}}>TOTAL</span>
                <span style={{fontFamily:"'Space Mono'",fontWeight:900,fontSize:20,color:C.red}}>{lkr(total)}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6,marginBottom:10}}>
                {['cash','card','upi','cheque'].map(m=>(
                  <button key={m} onClick={()=>setPay(m)} style={{background:pay===m?C.red:C.border,border:'none',borderRadius:8,padding:'7px 2px',color:'#fff',fontSize:10,cursor:'pointer',fontWeight:pay===m?700:400,textTransform:'uppercase',transition:'all 0.18s',transform:pay===m?'scale(1.06)':'scale(1)'}}>
                    {m}
                  </button>
                ))}
              </div>
              {pay==='cash'&&(
                <div style={{marginBottom:10}}>
                  <input value={paid} onChange={e=>setPaid(e.target.value)} placeholder="Amount paid (Rs.)" type="number"
                    style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:14,fontFamily:"'Noto Sans JP'",outline:'none',marginBottom:4}}/>
                  {paid&&<div className="anim-fadeIn" style={{fontSize:12,color:chng>=0?C.green:C.red,fontWeight:700}}>Change: {lkr(Math.abs(chng))}{chng<0?' ⚠ Short':''}</div>}
                </div>
              )}
              {pay==='cheque'&&(
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
                  <input value={chqNo} onChange={e=>setChqNo(e.target.value)} placeholder="Cheque No."
                    style={{background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,fontFamily:"'Noto Sans JP'",outline:'none'}}/>
                  <select value={chqBk} onChange={e=>setChqBk(e.target.value)}
                    style={{background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:chqBk?C.text:C.muted,fontSize:13,fontFamily:"'Noto Sans JP'",outline:'none'}}>
                    <option value="">Select Bank…</option>
                    {SL_BANKS.map(b=><option key={b} value={b}>{b}</option>)}
                  </select>
                </div>
              )}
              <div style={{display:'flex',gap:8}}>
                <Btn ch="Clear" v="dk" onClick={clearAll} st={{flex:1}}/>
                <Btn ch={busy?<span style={{animation:'spin 0.6s linear infinite',display:'inline-block'}}>↻</span>:<><Ic n="ok" s={14} c="#fff"/>Checkout</>}
                  onClick={checkout} dis={busy} st={{flex:2,background:C.green,border:'none',color:'#fff'}}/>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

//  BILL VIEW
// ═══════════════════════════════════════════════════════════════════════
function BillView({sale,onNewSale}) {
  const printBill=()=>{
    const el=document.getElementById('bill-print');
    el.innerHTML=`<div style="text-align:center;margin-bottom:14px"><b style="font-size:16px">NIPPON ELECTRICALS</b><br/><small>Smart POS System</small><hr/></div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Invoice:</span><b>${sale.invoiceNo}</b></div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Date:</span><span>${sale.date}</span></div><div style="display:flex;justify-content:space-between;margin-bottom:12px"><span>Customer:</span><span>${sale.customer}</span></div><hr/>${sale.items.map(i=>`<div style="display:flex;justify-content:space-between;margin:4px 0"><span>${i.name} ×${i.qty}</span><span>Rs.${(i.price*i.qty).toFixed(2)}</span></div>`).join('')}<hr/><div style="display:flex;justify-content:space-between"><span>Subtotal</span><span>Rs.${sale.subtotal.toFixed(2)}</span></div>${sale.taxAmount>0?`<div style="display:flex;justify-content:space-between"><span>Tax</span><span>Rs.${sale.taxAmount.toFixed(2)}</span></div>`:''}<div style="display:flex;justify-content:space-between"><span>Discount</span><span>Rs.${sale.discount.toFixed(2)}</span></div><div style="display:flex;justify-content:space-between;font-size:16px;font-weight:bold;margin-top:8px"><span>TOTAL</span><span>Rs.${sale.total.toFixed(2)}</span></div><hr/><div style="display:flex;justify-content:space-between"><span>Payment</span><span>${sale.paymentMode.toUpperCase()}</span></div><div style="text-align:center;margin-top:16px;font-size:11px">Thank you for shopping with Nippon Electricals!<br/>No exchange / refund after 7 days.</div>`;
    window.print();
  };
  return (
    <div style={{maxWidth:420,margin:'0 auto',padding:'20px 14px',paddingBottom:90}}>
      <div className="anim-popIn" style={{textAlign:'center',marginBottom:24}}>
        <div style={{width:64,height:64,borderRadius:'50%',background:C.green+'22',border:`2px solid ${C.green}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
          <Ic n="ok" s={30} c={C.green}/>
        </div>
        <h2 style={{fontSize:18,fontWeight:900,color:C.green}}>Sale Complete!</h2>
        <p style={{fontSize:12,color:C.muted,marginTop:4}}>{sale.invoiceNo}</p>
      </div>
      <Card st={{marginBottom:12,borderTop:`3px solid ${C.red}`}} ch={
        <>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:11,color:C.muted}}>Customer</span><span style={{fontWeight:700}}>{sale.customer}</span>
          </div>
          {sale.items.map((item,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:13}}>{item.name} <span style={{color:C.muted}}>×{item.qty}</span></span>
              <span style={{fontFamily:"'Space Mono'",fontSize:13}}>{lkr(item.price*item.qty)}</span>
            </div>
          ))}
          <div style={{borderTop:`1px solid ${C.border}`,marginTop:10,paddingTop:10}}>
            {sale.taxAmount>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.muted,marginBottom:4}}><span>Tax</span><span>{lkr(sale.taxAmount)}</span></div>}
            {sale.discount>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.muted,marginBottom:4}}><span>Discount</span><span>−{lkr(sale.discount)}</span></div>}
            <div style={{display:'flex',justifyContent:'space-between',fontWeight:900,fontSize:18,marginTop:6}}>
              <span>TOTAL</span><span style={{fontFamily:"'Space Mono'",color:C.red}}>{lkr(sale.total)}</span>
            </div>
            {sale.paymentMode==='cash'&&sale.change>0&&(
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:C.green,marginTop:6}}>
                <span>Change</span><span style={{fontFamily:"'Space Mono'"}}>{lkr(sale.change)}</span>
              </div>
            )}
            <div style={{marginTop:10}}><Badge ch={sale.paymentMode.toUpperCase()} col={C.green}/></div>
          </div>
        </>
      }/>
      <div style={{display:'flex',gap:10}}>
        <Btn ch={<><Ic n="print" s={14} c="#fff"/>Print Bill</>} onClick={printBill} st={{flex:1}}/>
        <Btn ch={<><Ic n="add" s={14} c="#fff"/>New Bill</>} v="ok" onClick={onNewSale} st={{flex:1}}/>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  PRODUCTS PAGE — FIXED
// ═══════════════════════════════════════════════════════════════════════
function ProductsPage() {
  const {products,upsertProduct,deleteProduct,toast2,user,companies}=useApp();
  const [srch,setSrch]     =useState('');
  const [cat,setCat]       =useState('All');
  const [showForm,setShowForm]=useState(false);
  const [ed,setEd]         =useState(null);
  const blank={name:'',sku:'',category:'Lighting',price:'',costPrice:'',stock:'',unit:'pcs',taxRate:'0',minStock:'10',barcode:'',active:true,supplierId:'',supplierName:''};
  const [f,setF]=useState(blank);
  const [saving,setSaving]=useState(false);

  const cats=['All',...CATS];
  const list=products.filter(p=>(cat==='All'||p.category===cat)&&(p.name.toLowerCase().includes(srch.toLowerCase())||String(p.sku||'').toLowerCase().includes(srch.toLowerCase())));

  const openAdd=()=>{setEd(null);setF(blank);setShowForm(true);};
  const openEdit=p=>{setEd(p);setF({...blank,...p,price:String(p.price||''),costPrice:String(p.costPrice||''),stock:String(p.stock||''),taxRate:String(p.taxRate||'0'),minStock:String(p.minStock||'10'),supplierId:String(p.supplierId||''),supplierName:p.supplierName||''});setShowForm(true);};

  const chgSupplier=v=>{const co=companies.find(c=>String(c.id)===v);setF(p=>({...p,supplierId:v,supplierName:co?co.name:''}));};

  const save=async()=>{
    if(!f.name.trim()){toast2('Product name required!','error');return;}
    if(!f.price||isNaN(parseFloat(f.price))){toast2('Valid sale price required!','error');return;}
    if(!f.stock||isNaN(parseInt(f.stock))){toast2('Stock quantity required!','error');return;}
    setSaving(true);
    try{
      const p={
        ...f,
        id:ed?ed.id:uid(),
        name:f.name.trim(),
        price:parseFloat(f.price),
        costPrice:parseFloat(f.costPrice||0),
        stock:parseInt(f.stock),
        taxRate:parseFloat(f.taxRate||0),
        minStock:parseInt(f.minStock||10),
        supplierId:f.supplierId?parseInt(f.supplierId):null,
        active:f.active!==false,
      };
      await upsertProduct(p);
      toast2(ed?'Product updated!':'Product added!','success');
      setShowForm(false);
    }catch(e){toast2('Save failed: '+e.message,'error');}
    setSaving(false);
  };

  const toggle=async p=>{await upsertProduct({...p,active:!p.active});toast2(p.active?'Deactivated':'Activated','info');};
  const del=async id=>{if(confirm('Delete this product?')){await deleteProduct(id);toast2('Deleted','info');}};
  const canEdit=user.role==='admin'||user.role==='manager';

  return (
    <div style={{padding:14,paddingBottom:90}}>
      <SectionHeader title="Products" right={<>
        {canEdit&&<Btn ch={<><Ic n="add" s={14} c="#fff"/>Add</>} onClick={openAdd} sz="sm"/>}
        <ExportMenu onXLSX={()=>exportProductsXLSX(products)} onPDF={()=>exportProductsPDF(products)}/>
      </>}/>

      <div style={{position:'relative',marginBottom:10}}>
        <div style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)'}}><Ic n="srch" s={14} c={C.muted}/></div>
        <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Search name or SKU…"
          style={{width:'100%',background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 10px 9px 32px',color:C.text,fontSize:13,fontFamily:"'Noto Sans JP'",outline:'none',transition:'border 0.2s'}}
          onFocus={e=>e.target.style.borderColor=C.red} onBlur={e=>e.target.style.borderColor=C.border}/>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:14,overflow:'auto',paddingBottom:3}}>
        {cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{background:cat===c?C.red:C.border,border:'none',borderRadius:16,padding:'5px 13px',color:'#fff',fontSize:10,cursor:'pointer',whiteSpace:'nowrap',fontWeight:cat===c?700:400,transition:'all 0.18s'}}>{c}</button>)}
      </div>

      {list.length===0&&(
        <div className="anim-fadeIn" style={{textAlign:'center',color:C.muted,padding:48}}>
          <Ic n="box" s={44} c={C.muted}/>
          <p style={{marginTop:12,fontSize:13}}>{products.length===0?'No products yet':'No matches'}</p>
          {canEdit&&products.length===0&&<Btn ch="Add Your First Product" onClick={openAdd} st={{marginTop:16}}/>}
        </div>
      )}

      {list.map((p,i)=>(
        <div key={p.id} className="anim-fadeUp" style={{background:C.card,borderRadius:12,padding:13,marginBottom:8,border:`1px solid ${C.border}`,opacity:p.active?1:0.55,animationDelay:`${i*0.04}s`}}>
          <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3,flexWrap:'wrap'}}>
                <span style={{fontSize:13,fontWeight:700}}>{p.name}</span>
                {!p.active&&<Badge ch="Inactive" col={C.muted}/>}
                {p.stock<=(p.minStock||10)&&<Badge ch="Low Stock" col={C.orange}/>}
              </div>
              <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{p.sku||'—'} · {p.category}</div>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                <span style={{fontSize:14,fontWeight:900,color:C.red,fontFamily:"'Space Mono'"}}>{lkr(p.price)}</span>
                <span style={{fontSize:11,color:C.muted}}>Cost:{lkr(p.costPrice)}</span>
                <span style={{fontSize:11,color:p.stock<=(p.minStock||10)?C.orange:C.muted}}>Stk:{p.stock} {p.unit}</span>
                {p.taxRate>0&&<Badge ch={p.taxRate+'% Tax'} col={C.blue}/>}
              </div>
              {p.supplierName&&<div style={{fontSize:11,color:C.muted,marginTop:4,display:'flex',alignItems:'center',gap:4}}><Ic n="bldg" s={11} c={C.muted}/>{p.supplierName}</div>}
            </div>
            {canEdit&&(
              <div style={{display:'flex',flexDirection:'column',gap:5,flexShrink:0}}>
                <button onClick={()=>openEdit(p)} style={{background:C.border,border:'none',borderRadius:6,padding:'6px 8px',cursor:'pointer',transition:'background 0.15s'}} onMouseEnter={e=>e.currentTarget.style.background='#333'} onMouseLeave={e=>e.currentTarget.style.background=C.border}><Ic n="edit" s={13}/></button>
                <button onClick={()=>toggle(p)} style={{background:p.active?'#1a3a1a':'#3a1a1a',border:'none',borderRadius:6,padding:'6px 8px',cursor:'pointer'}}><Ic n={p.active?'eye':'eyeoff'} s={13} c={p.active?C.green:C.red}/></button>
                <button onClick={()=>del(p.id)} style={{background:'#3a1a1a',border:'none',borderRadius:6,padding:'6px 8px',cursor:'pointer'}}><Ic n="del" s={13} c={C.red}/></button>
              </div>
            )}
          </div>
        </div>
      ))}

      <Modal open={showForm} onClose={()=>setShowForm(false)} title={ed?'Edit Product':'Add Product'} ch={
        <>
          <Inp lbl="Product Name" val={f.name} set={v=>setF(p=>({...p,name:v}))} req/>
          <Inp lbl="SKU / Item Code" val={f.sku} set={v=>setF(p=>({...p,sku:v}))} ph="NE-LT-001"/>
          <Sel lbl="Category" val={f.category} set={v=>setF(p=>({...p,category:v}))} opts={CATS}/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Inp lbl="Sale Price (Rs.) *" val={f.price} set={v=>setF(p=>({...p,price:v}))} type="number" req/>
            <Inp lbl="Cost Price (Rs.)" val={f.costPrice} set={v=>setF(p=>({...p,costPrice:v}))} type="number"/>
            <Inp lbl="Stock Qty *" val={f.stock} set={v=>setF(p=>({...p,stock:v}))} type="number" req/>
            <Inp lbl="Min Stock Alert" val={f.minStock} set={v=>setF(p=>({...p,minStock:v}))} type="number"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel lbl="Unit" val={f.unit} set={v=>setF(p=>({...p,unit:v}))} opts={['pcs','roll','box','kg','meter','set','pair']}/>
            <Inp lbl="Tax %" val={f.taxRate} set={v=>setF(p=>({...p,taxRate:v}))} type="number"/>
          </div>
          <Inp lbl="Barcode" val={f.barcode} set={v=>setF(p=>({...p,barcode:v}))}/>
          {companies.length>0&&(
            <Sel lbl="Supplier / Company" val={f.supplierId} set={chgSupplier}
              opts={[{v:'',l:'— No Supplier —'},...companies.map(c=>({v:String(c.id),l:c.name+' ('+c.type+')'}))]}/>
          )}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:13,padding:'10px 13px',background:'#242424',borderRadius:8}}>
            <span style={{fontSize:13}}>Active (visible in POS)</span>
            <button onClick={()=>setF(p=>({...p,active:!p.active}))} style={{background:f.active?C.green:C.border,border:'none',borderRadius:12,width:44,height:24,cursor:'pointer',position:'relative',transition:'background 0.2s'}}>
              <div style={{width:18,height:18,borderRadius:'50%',background:'#fff',position:'absolute',top:3,left:f.active?23:3,transition:'left 0.2s'}}/>
            </button>
          </div>
          <Btn ch={saving?'Saving…':(ed?'Update Product':'Add Product')} onClick={save} dis={saving} full sz="lg"/>
        </>
      }/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  CHEQUES PAGE
// ═══════════════════════════════════════════════════════════════════════
function ChequesPage() {
  const {cheques,upsertCheque,deleteCheque,toast2}=useApp();
  const [showForm,setShowForm]=useState(false);
  const [ed,setEd]=useState(null);
  const [flt,setFlt]=useState('all');
  const [catFlt,setCatFlt]=useState('all');
  const [viewImg,setViewImg]=useState(null);
  const blank={category:'received',customerName:'',companyName:'',chequeNo:'',bank:'',branch:'',amount:'',chequeDate:today(),dueDate:'',givenDate:today(),billNumber:'',invoiceRef:'',isReturn:false,returnReason:'',chequeImage:null,status:'pending',notes:''};
  const [f,setF]=useState(blank);
  const [imgLoading,setImgLoading]=useState(false);

  let list=[...cheques];
  if(catFlt!=='all') list=list.filter(c=>c.category===catFlt);
  if(flt!=='all') list=list.filter(c=>c.status===flt);
  list.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));

  const pendAmt=cheques.filter(c=>c.status==='pending'&&c.category==='received').reduce((a,c)=>a+c.amount,0);
  const givenAmt=cheques.filter(c=>c.status==='pending'&&c.category==='given').reduce((a,c)=>a+c.amount,0);

  const openForm=(c=null)=>{if(c){setEd(c);setF({...blank,...c,amount:String(c.amount)});}else{setEd(null);setF(blank);}setShowForm(true);};
  const handleImg=async e=>{const file=e.target.files[0];if(!file)return;setImgLoading(true);try{const img=await compressImg(file);setF(p=>({...p,chequeImage:img}));}catch(e){toast2('Image load failed','error');}setImgLoading(false);};
  const save=async()=>{
    if(!f.chequeNo||!f.bank||!f.amount){toast2('Fill required fields!','error');return;}
    if(f.category==='received'&&!f.customerName){toast2('Customer name required!','error');return;}
    if(f.category==='given'&&!f.companyName){toast2('Company name required!','error');return;}
    const c={...f,amount:parseFloat(f.amount),id:ed?ed.id:uid(),createdAt:ed?ed.createdAt:new Date().toISOString(),clearedDate:f.status==='cleared'?(ed?.clearedDate||today()):null};
    await upsertCheque(c);toast2(ed?'Updated!':'Added!','success');setShowForm(false);
  };
  const setStatus=async(c,status)=>{await upsertCheque({...c,status,clearedDate:status==='cleared'?today():c.clearedDate});toast2('Marked as '+status,'success');};
  const del=async id=>{if(confirm('Delete?')){await deleteCheque(id);toast2('Deleted','info');}};

  const sc={pending:C.orange,cleared:C.green,bounced:C.red,returned:C.red};
  const cc={received:C.green,given:C.blue,return:C.orange};
  const catLabel={received:'Customer Received',given:'Company/Dealer Given',return:'Return Cheque'};

  return (
    <div style={{padding:14,paddingBottom:90}}>
      <SectionHeader title="Cheques" right={<>
        <Btn ch={<><Ic n="add" s={14} c="#fff"/>Add</>} onClick={()=>openForm()} sz="sm"/>
        <ExportMenu onXLSX={()=>exportChequesXLSX(cheques)} onPDF={()=>exportChequesPDF(cheques)}/>
      </>}/>
      <div style={{display:'flex',gap:10,marginBottom:14}}>
        <StatBox lbl="Pending Received" val={lkrK(pendAmt)} col={C.green} icon="chq"/>
        <StatBox lbl="Pending Given" val={lkrK(givenAmt)} col={C.blue} icon="chq"/>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:8,overflow:'auto'}}>
        {[['all','All Types'],['received','Received'],['given','Given'],['return','Return']].map(([v,l])=>(
          <button key={v} onClick={()=>setCatFlt(v)} style={{background:catFlt===v?C.red:C.border,border:'none',borderRadius:16,padding:'4px 12px',color:'#fff',fontSize:10,cursor:'pointer',whiteSpace:'nowrap',fontWeight:catFlt===v?700:400,transition:'all 0.18s'}}>{l}</button>
        ))}
      </div>
      <div style={{display:'flex',gap:6,marginBottom:14,overflow:'auto'}}>
        {[['all','All'],['pending','Pending'],['cleared','Cleared'],['bounced','Bounced'],['returned','Returned']].map(([v,l])=>(
          <button key={v} onClick={()=>setFlt(v)} style={{background:flt===v?C.border:C.dark,border:`1px solid ${flt===v?C.muted:C.border}`,borderRadius:16,padding:'3px 10px',color:flt===v?C.text:C.muted,fontSize:10,cursor:'pointer',whiteSpace:'nowrap',transition:'all 0.18s'}}>{l}</button>
        ))}
      </div>

      {list.map((c,i)=>(
        <div key={c.id} className="anim-fadeUp" style={{background:C.card,borderRadius:12,padding:13,marginBottom:12,border:`1px solid ${C.border}`,borderLeft:`3px solid ${cc[c.category]||C.muted}`,animationDelay:`${i*0.04}s`}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:4}}><Badge ch={catLabel[c.category]} col={cc[c.category]}/><Badge ch={c.status} col={sc[c.status]}/></div>
              <div style={{fontSize:14,fontWeight:700}}>{c.customerName||c.companyName}</div>
              <div style={{fontSize:11,color:C.muted}}>CHQ# {c.chequeNo} · {c.bank}</div>
            </div>
            <div style={{fontSize:16,fontWeight:900,color:c.category==='received'?C.green:C.blue,fontFamily:"'Space Mono'",textAlign:'right',flexShrink:0}}>{lkr(c.amount)}</div>
          </div>
          <div style={{background:'#242424',borderRadius:8,padding:'8px 10px',marginBottom:10,fontSize:11,display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
            <div><span style={{color:C.muted}}>Cheque Date: </span><strong>{c.chequeDate}</strong></div>
            {c.dueDate&&<div><span style={{color:C.muted}}>Due: </span><strong style={{color:C.orange}}>{c.dueDate}</strong></div>}
            {c.billNumber&&<div><span style={{color:C.muted}}>Bill No: </span><strong>{c.billNumber}</strong></div>}
            {c.returnReason&&<div style={{gridColumn:'1/-1'}}><span style={{color:C.muted}}>Reason: </span><strong style={{color:C.red}}>{c.returnReason}</strong></div>}
          </div>
          {c.chequeImage&&<button onClick={()=>setViewImg(c.chequeImage)} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,padding:'6px 12px',color:C.muted,cursor:'pointer',fontSize:11,display:'flex',alignItems:'center',gap:6,marginBottom:10}}><Ic n="img" s={14} c={C.muted}/>View Image</button>}
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {c.status==='pending'&&<Btn ch={<><Ic n="ok" s={12} c="#fff"/>Cleared</>} v="ok" sz="sm" onClick={()=>setStatus(c,'cleared')}/>}
            {c.status==='pending'&&<Btn ch="Bounced" sz="sm" st={{background:'#3a1a1a',color:C.red,border:'none'}} onClick={()=>setStatus(c,'bounced')}/>}
            <Btn ch={<><Ic n="edit" s={12}/>Edit</>} v="dk" sz="sm" onClick={()=>openForm(c)}/>
            <Btn ch={<><Ic n="del" s={12} c={C.red}/></>} sz="sm" st={{background:'#3a1a1a',border:'none'}} onClick={()=>del(c.id)}/>
          </div>
        </div>
      ))}
      {list.length===0&&<div className="anim-fadeIn" style={{textAlign:'center',color:C.muted,padding:40}}><Ic n="chq" s={44} c={C.muted}/><p style={{marginTop:12}}>No cheques found</p></div>}

      {viewImg&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.95)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={()=>setViewImg(null)}>
          <img src={viewImg} style={{maxWidth:'100%',maxHeight:'90vh',borderRadius:8}} alt="Cheque"/>
          <button onClick={()=>setViewImg(null)} style={{position:'absolute',top:20,right:20,background:C.red,border:'none',borderRadius:'50%',width:36,height:36,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="x" s={18} c="#fff"/></button>
        </div>
      )}

      <Modal open={showForm} onClose={()=>setShowForm(false)} title={ed?'Edit Cheque':'Add Cheque'} ch={
        <div>
          <div style={{marginBottom:16}}>
            <label style={{display:'block',fontSize:11,color:C.muted,marginBottom:8,letterSpacing:0.5,textTransform:'uppercase'}}>Category *</label>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
              {[['received','Customer\nReceived',C.green],['given','Company\nGiven',C.blue],['return','Return\nCheque',C.orange]].map(([v,l,col])=>(
                <button key={v} onClick={()=>setF(p=>({...p,category:v}))} style={{background:f.category===v?col+'33':C.border,border:`2px solid ${f.category===v?col:C.border}`,borderRadius:8,padding:'10px 4px',cursor:'pointer',color:f.category===v?col:C.muted,fontSize:11,fontWeight:700,lineHeight:1.4,whiteSpace:'pre-line',transition:'all 0.18s'}}>{l}</button>
              ))}
            </div>
          </div>
          {f.category==='received'&&<Inp lbl="Customer Name" val={f.customerName} set={v=>setF(p=>({...p,customerName:v}))} req/>}
          {f.category==='given'&&<Inp lbl="Company / Dealer Name" val={f.companyName} set={v=>setF(p=>({...p,companyName:v}))} req/>}
          {f.category==='return'&&<Inp lbl="Party Name" val={f.customerName} set={v=>setF(p=>({...p,customerName:v}))} req/>}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Inp lbl="Cheque No. *" val={f.chequeNo} set={v=>setF(p=>({...p,chequeNo:v}))}/>
            <Inp lbl="Amount (Rs.) *" val={f.amount} set={v=>setF(p=>({...p,amount:v}))} type="number"/>
          </div>
          <Sel lbl="Bank *" val={f.bank} set={v=>setF(p=>({...p,bank:v}))} opts={[{v:'',l:'Select Bank…'},...SL_BANKS.map(b=>({v:b,l:b}))]}/>
          <Inp lbl="Branch" val={f.branch} set={v=>setF(p=>({...p,branch:v}))}/>
          <Inp lbl="Cheque Date *" val={f.chequeDate} set={v=>setF(p=>({...p,chequeDate:v}))} type="date"/>
          {f.category==='received'&&<Inp lbl="Due Date" val={f.dueDate} set={v=>setF(p=>({...p,dueDate:v}))} type="date"/>}
          {f.category==='given'&&<><Inp lbl="Bill Number" val={f.billNumber} set={v=>setF(p=>({...p,billNumber:v}))}/><div style={{marginBottom:13}}><label style={{display:'block',fontSize:11,color:C.muted,marginBottom:5,letterSpacing:0.5,textTransform:'uppercase'}}>Cheque Image</label><input type="file" accept="image/*" onChange={handleImg}/>{imgLoading&&<p style={{fontSize:11,color:C.muted,marginTop:4}}>Compressing…</p>}{f.chequeImage&&<img src={f.chequeImage} style={{maxWidth:140,maxHeight:80,borderRadius:6,marginTop:8,border:`1px solid ${C.border}`}} alt="preview"/>}</div></>}
          {f.category==='return'&&<Inp lbl="Return Reason" val={f.returnReason} set={v=>setF(p=>({...p,returnReason:v}))}/>}
          <Sel lbl="Status" val={f.status} set={v=>setF(p=>({...p,status:v}))} opts={[{v:'pending',l:'Pending'},{v:'cleared',l:'Cleared'},{v:'bounced',l:'Bounced'},{v:'returned',l:'Returned'}]}/>
          <Inp lbl="Invoice/Bill Reference" val={f.invoiceRef} set={v=>setF(p=>({...p,invoiceRef:v}))}/>
          <Textarea lbl="Notes" val={f.notes} set={v=>setF(p=>({...p,notes:v}))}/>
          <Btn ch={ed?'Update Cheque':'Add Cheque'} onClick={save} full sz="lg"/>
        </div>
      }/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  COMPANIES PAGE
// ═══════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════════════════════════
function App() {
  const [configured,setConfigured]=useState(()=>!!getCfg());
  const [ready,setReady]  =useState(false);
  const [dbErr,setDbErr]  =useState('');
  const [me,setMe]        =useState(null);
  const [pg,setPg]        =useState('dash');
  const [toast,setToast]  =useState(null);
  const [users,setUsers]  =useState([]);
  const [products,setProducts]=useState([]);
  const [sales,setSales]  =useState([]);
  const [cheques,setCheques]=useState([]);
  const [companies,setCompanies]=useState([]);
  const [posKey,setPosKey]=useState(0);
  const [bill,setBill]    =useState(null);
  const tRef=useRef(null);
  const chanRef=useRef(null);

  const merge=(set,item)=>set(prev=>prev.find(x=>x.id===item.id)?prev.map(x=>x.id===item.id?item:x):[...prev,item]);
  const remove=(set,id)=>set(prev=>prev.filter(x=>x.id!==id));

  const subscribeRT=()=>{
    if(chanRef.current)_sb.removeChannel(chanRef.current);
    const map={users:setUsers,products:setProducts,sales:setSales,cheques:setCheques,companies:setCompanies};
    const ch=_sb.channel('ne-rt-'+Math.random());
    Object.keys(map).forEach(t=>ch.on('postgres_changes',{event:'*',schema:'public',table:t},pl=>{
      if(pl.eventType==='DELETE')remove(map[t],pl.old.id);
      else merge(map[t],{...pl.new.data,id:pl.new.id});
    }));
    ch.subscribe(); chanRef.current=ch;
  };

  const loadAll=async()=>{
    const[u,p,s,c,co]=await Promise.all([DB.getAll('users'),DB.getAll('products'),DB.getAll('sales'),DB.getAll('cheques'),DB.getAll('companies')]);
    setUsers(u);setProducts(p);setSales(s);setCheques(c);setCompanies(co);
  };

  useEffect(()=>{
    if(!configured)return;
    const cfg=getCfg(); if(!cfg)return;
    initSupabase(cfg.url,cfg.key);
    setReady(false);setDbErr('');
    loadAll()
      .then(async()=>{await DB.seed('users',SEED_USERS);const[u]=await Promise.all([DB.getAll('users')]);setUsers(u);subscribeRT();})
      .catch(e=>{console.error(e);setDbErr('Connection failed: '+e.message);})
      .finally(()=>setReady(true));
    return()=>{if(chanRef.current)_sb.removeChannel(chanRef.current);};
  },[configured]);

  const toast2=(msg,type='info')=>{setToast({msg,type});clearTimeout(tRef.current);tRef.current=setTimeout(()=>setToast(null),2800);};
  const login=u=>{setMe(u);setPg('dash');};
  const logout=()=>{setMe(null);setPg('dash');setBill(null);};
  const reconfigure=()=>{clearCfg();setConfigured(false);setMe(null);setReady(false);};

  const upsertProduct=async p=>{await DB.put('products',p);merge(setProducts,p);};
  const deleteProduct=async id=>{await DB.del('products',id);remove(setProducts,id);};
  const upsertCheque =async c=>{await DB.put('cheques',c);merge(setCheques,c);};
  const deleteCheque =async id=>{await DB.del('cheques',id);remove(setCheques,id);};
  const upsertUser   =async u=>{await DB.put('users',u);merge(setUsers,u);};
  const upsertCompany=async c=>{await DB.put('companies',c);merge(setCompanies,c);};
  const deleteCompany=async id=>{await DB.del('companies',id);remove(setCompanies,id);};
  const onSaleComplete=async sale=>{await DB.put('sales',sale);setSales(prev=>[...prev,sale]);setBill(sale);setPosKey(k=>k+1);};
  const onNewSale=()=>setBill(null);

  if(!configured) return <SetupScreen onConnected={()=>setConfigured(true)}/>;
  if(!ready) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div className="anim-float"><NipponLogo size={72} glow={true}/></div>
      <div style={{color:C.muted,fontSize:14}}>Connecting to database…</div>
      {dbErr&&<div style={{maxWidth:300,background:'#3a1a1a',border:`1px solid ${C.red}44`,borderRadius:10,padding:16,textAlign:'center'}}>
        <p style={{fontSize:12,color:'#ff8888',marginBottom:12,lineHeight:1.5}}>{dbErr}</p>
        <Btn ch="Reconfigure" v="out" onClick={reconfigure}/>
      </div>}
    </div>
  );

  const ctx={user:me,users,products,sales,cheques,companies,toast2,login,logout,onSaleComplete,upsertProduct,deleteProduct,upsertCheque,deleteCheque,upsertUser,upsertCompany,deleteCompany,reconfigure};
  const pages={dash:Dashboard,prod:ProductsPage,comp:CompaniesPage,chq:ChequesPage,accts:AccountsPage};
  const renderPOS=()=>bill?<BillView sale={bill} onNewSale={onNewSale}/>:<POSPage key={posKey}/>;

  return (
    <Ctx.Provider value={ctx}>
      <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',position:'relative'}}>
        {!me?<LoginPage/>:(
          <>
            {pg==='pos'?renderPOS():React.createElement(pages[pg]||Dashboard)}
            {!(pg==='pos'&&bill)&&<Nav pg={pg} setPg={setPg} user={me}/>}
          </>
        )}
        <Toast t={toast}/>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

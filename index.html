*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:"Noto Sans JP",sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#CC0000;border-radius:2px}
select option{background:#1a1a1a;color:#f0f0f0}
@media print{body *{visibility:hidden}#bill-print,#bill-print *{visibility:visible}#bill-print{position:fixed;top:0;left:0;width:100%;background:#fff;color:#000;padding:16px;font-family:"Space Mono",monospace;font-size:11px}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(0.82)}70%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 18px #CC000066,0 0 40px #CC000022}50%{box-shadow:0 0 40px #CC0000bb,0 0 80px #CC000044}}
@keyframes bulbPulse{0%,100%{filter:brightness(1) drop-shadow(0 0 6px #FFD70099)}50%{filter:brightness(1.18) drop-shadow(0 0 22px #FFD700ff)}}
@keyframes badgePop{0%{transform:scale(0)}60%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes navPop{0%{transform:scale(0.6) translateY(5px)}100%{transform:scale(1) translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.fadeUp{animation:fadeUp 0.3s ease both}
.fadeIn{animation:fadeIn 0.22s ease both}
.slideDown{animation:slideDown 0.3s ease both}
.popIn{animation:popIn 0.3s cubic-bezier(.34,1.56,.64,1) both}
.slideUp{animation:slideUp 0.36s cubic-bezier(.22,1,.36,1) both}
.floatAnim{animation:float 3s ease-in-out infinite}
.glowAnim{animation:glow 2.8s ease-in-out infinite;border-radius:20px}
.bulbAnim{animation:bulbPulse 2.2s ease-in-out infinite}
.badgeAnim{animation:badgePop 0.28s cubic-bezier(.34,1.56,.64,1) both}
.navActive{animation:navPop 0.22s cubic-bezier(.34,1.56,.64,1) both}
</style>

const CFG_KEY = "ne_supabase_cfg";
const getCfg = () => { try { return JSON.parse(localStorage.getItem(CFG_KEY)||"null"); } catch(e) { return null; } };
const saveCfg = (u,k) => localStorage.setItem(CFG_KEY, JSON.stringify({url:u,key:k}));
const clearCfg = () => localStorage.removeItem(CFG_KEY);
let _sb = null;
const initSB = (u,k) => { _sb = window.supabase.createClient(u,k); return _sb; };

// ─── DB ───────────────────────────────────────────────────────────────────────
const DB = {
  getAll: async (t) => {
    const {data,error} = await _sb.from(t).select("id,data").order("id");
    if (error) throw error;
    return (data||[]).map(r => ({...r.data, id:r.id}));
  },
  put: async (t,item) => {
    const {error} = await _sb.from(t).upsert({id:item.id,data:item},{onConflict:"id"});
    if (error) throw error;
  },
  del: async (t,id) => {
    const {error} = await _sb.from(t).delete().eq("id",id);
    if (error) throw error;
  },
  seed: async (t,rows) => {
    const {count,error} = await _sb.from(t).select("id",{count:"exact",head:true});
    if (!error && count===0) { for (const r of rows) await DB.put(t,r); }
  }
};

const compressImg = file => new Promise(res => {
  const rd = new FileReader();
  rd.onload = e => {
    const im = new Image();
    im.onload = () => {
      const MAX=1200, r=Math.min(MAX/im.width,MAX/im.height,1);
      const cv = document.createElement("canvas");
      cv.width=im.width*r; cv.height=im.height*r;
      cv.getContext("2d").drawImage(im,0,0,cv.width,cv.height);
      res(cv.toDataURL("image/jpeg",0.75));
    };
    im.src = e.target.result;
  };
  rd.readAsDataURL(file);
});

const pdfExp = (title,cols,rows,fname) => {

function Btn({ch, onClick, col, sz="md", dis=false, full=false, st={}}) {
  const bg = col||C.red;
  const pd = {sm:"6px 12px",md:"10px 18px",lg:"13px 22px"}[sz];
  const fs = {sm:11,md:13,lg:15}[sz];
  return (
    <button onClick={onClick} disabled={dis}
      style={{background:dis?"#333":bg,border:"none",borderRadius:10,padding:pd,color:"#fff",
        fontSize:fs,fontWeight:700,cursor:dis?"not-allowed":"pointer",opacity:dis?0.5:1,
        display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,
        width:full?"100%":"auto",transition:"opacity 0.15s, transform 0.1s",...st}}

function Badge({ch, col=C.muted}) {

function Card({ch, st={}}) {

function Field({lbl, children}) {
  return (
    <div style={{marginBottom:14}}>
      {lbl && <label style={{display:"block",fontSize:11,color:C.muted,marginBottom:5,letterSpacing:0.5,textTransform:"uppercase"}}>{lbl}</label>}

const inputStyle = {
  width:"100%",background:"#242424",border:"1.5px solid "+C.border,
  borderRadius:8,padding:"11px 13px",color:C.text,fontSize:14,
  outline:"none",boxSizing:"border-box",transition:"border-color 0.2s",
  fontFamily:'"Noto Sans JP",sans-serif'
};
const focusRed = e => e.target.style.borderColor = C.red;
const blurGray = e => e.target.style.borderColor = C.border;

function Inp({lbl, val, set, ph="", type="text", req=false, onEnter}) {
  return (
    <Field lbl={lbl && (req ? lbl+" *" : lbl)}>
      <input type={type} value={val} placeholder={ph}
        onChange={e => set(e.target.value)}
        onKeyDown={e => e.key==="Enter" && onEnter && onEnter()}
        style={inputStyle}
        onFocus={focusRed} onBlur={blurGray}/>
    </Field>
  );
}

function Sel({lbl, val, set, opts=[]}) {
  return (
    <Field lbl={lbl}>
      <select value={val} onChange={e => set(e.target.value)}
        style={{...inputStyle, appearance:"none"}}>
        {opts.map((o,i) => typeof o==="string"
          ? <option key={i} value={o}>{o}</option>
          : <option key={i} value={o.v}>{o.l}</option>)}
      </select>
    </Field>
  );
}

function Textarea({lbl, val, set, ph}) {
  return (
    <Field lbl={lbl}>
      <textarea value={val} placeholder={ph} rows={3}
        onChange={e => set(e.target.value)}
        style={{...inputStyle, resize:"vertical"}}
        onFocus={focusRed} onBlur={blurGray}/>

  );
}

function Modal({open, onClose, title, ch}) {

//  SETUP SCREEN
// ═══════════════════════════════════════════════════════════════════════
function SetupScreen({onConnected}) {
  const [step,setStep] = useState(1);
  const [url,setUrl] = useState("");
  const [key,setKey] = useState("");
  const [busy,setBusy] = useState(false);
  const [err,setErr] = useState("");
  const [copied,setCopied] = useState(false);

  const SQL = [
    "create table if not exists users(id bigint primary key,data jsonb not null);",
    "create table if not exists products(id bigint primary key,data jsonb not null);",
    "create table if not exists sales(id bigint primary key,data jsonb not null);",
    "create table if not exists cheques(id bigint primary key,data jsonb not null);",
    "create table if not exists companies(id bigint primary key,data jsonb not null);",
    "alter table users disable row level security;",
    "alter table products disable row level security;",
    "alter table sales disable row level security;",
    "alter table cheques disable row level security;",
    "alter table companies disable row level security;"
  ].join("\n");

  const copySQL = () => { navigator.clipboard.writeText(SQL); setCopied(true); setTimeout(()=>setCopied(false),2500); };

  const connect = async () => {
    if (!url.trim() || !key.trim()) { setErr("Both fields are required"); return; }
    setBusy(true); setErr("");
    try {
      initSB(url.trim(), key.trim());
      await DB.getAll("users");
      saveCfg(url.trim(), key.trim());
      onConnected();
    } catch(e) {
      setErr("Connection failed: " + e.message);
    }
    setBusy(false);
  };

  return (
    <div style={{minHeight:"100vh",background:C.dark,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="floatAnim" style={{marginBottom:24}}><NipponLogo size={80} glow={true}/></div>
      <h1 style={{fontSize:20,fontWeight:900,color:"#fff",marginBottom:4,letterSpacing:1}}>NIPPON ELECTRICALS</h1>
      <p style={{color:C.muted,marginBottom:28,fontSize:12}}>Smart POS — First Time Setup</p>
      <div style={{width:"100%",maxWidth:440}}>
        {step===1 && (
          <div style={{background:C.card,borderRadius:16,padding:22,border:"1px solid "+C.border,marginBottom:16}}>
            <h2 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Step 1 — Setup Supabase Database</h2>
            {[
              ["1","Go to supabase.com and create a New Project"],
              ["2","Open SQL Editor and click New Query"],
              ["3","Paste the SQL script below and click RUN"],
              ["4","Go to Project Settings → API and copy URL and Anon Key"]
            ].map(([n,t]) => (
              <div key={n} style={{display:"flex",gap:10,marginBottom:10}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:C.red,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0}}>{n}</div>
                <p style={{fontSize:13,color:C.text,lineHeight:1.5,paddingTop:3}}>{t}</p>
              </div>
            ))}
            <div style={{background:"#0d1117",borderRadius:10,padding:12,border:"1px solid "+C.border,marginTop:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>SQL Script</span>
                <button onClick={copySQL} style={{background:copied?C.green:C.border,border:"none",borderRadius:6,padding:"4px 10px",color:"#fff",fontSize:11,cursor:"pointer",fontWeight:700}}>
                  {copied ? "Copied!" : "Copy SQL"}
                </button>
              </div>
              <pre style={{fontSize:9,color:"#7ee787",overflow:"auto",maxHeight:140,margin:0,lineHeight:1.6,whiteSpace:"pre-wrap",fontFamily:'"Space Mono",monospace'}}>{SQL}</pre>
            </div>
          </div>
        )}
        {step===1 && <Btn ch="Done — Next Step" onClick={() => setStep(2)} full sz="lg"/>}
        {step===2 && (
          <>
            <div style={{background:C.card,borderRadius:16,padding:22,border:"1px solid "+C.border,marginBottom:16}}>
              <h2 style={{fontSize:15,fontWeight:700,marginBottom:4}}>Step 2 — Connect to Supabase</h2>
              <p style={{fontSize:12,color:C.muted,marginBottom:16,lineHeight:1.6}}>
                Find these in: Supabase Project Settings → API
              </p>
              <Inp lbl="Project URL" val={url} set={setUrl} ph="https://xxxx.supabase.co" req/>
              <Inp lbl="Anon / Public Key" val={key} set={setKey} ph="eyJhbGciOi..." req onEnter={connect}/>
              {err && (
                <div style={{background:"#3a1a1a",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#ff8888",lineHeight:1.5,marginTop:4}}>{err}</div>
              )}
            </div>
            <div style={{display:"flex",gap:10}}>
              <Btn ch="Back" col="#252525" onClick={() => setStep(1)} sz="lg"/>
              <Btn ch={busy ? "Connecting..." : "Connect & Launch"} onClick={connect} dis={busy} st={{flex:1}} sz="lg"/>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  LOGIN PAGE
// ═══════════════════════════════════════════════════════════════════════
function LoginPage() {
  const {users, login, toast2} = useApp();
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const doLogin = () => {
    const u = username.trim();
    const p = password;
    if (!u || !p) {
      setErr("Please enter your username and password");
      return;
    }
    setBusy(true);
    setErr("");
    setTimeout(() => {
      // Search in DB users
      let found = null;
      if (users && users.length > 0) {
        found = users.find(x => x.username === u && x.password === p && x.active !== false);
      }
      // Built-in fallback admin (works even if DB is empty)
      if (!found && u === "admin" && p === "admin123") {
        found = {id:1, name:"Admin", username:"admin", role:"admin", active:true, avatar:"A"};
      }
      if (found) {
        login(found);
      } else {
        setErr("Incorrect username or password. Try: admin / admin123");
        toast2("Login failed", "error");
      }
      setBusy(false);
    }, 150);
  };

  const handleKey = e => { if (e.key === "Enter") doLogin(); };

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,background:"linear-gradient(160deg,#1a0000 0%,#0f0f0f 60%)"}}>
      <div className="floatAnim" style={{marginBottom:20}}>
        <NipponLogo size={88} glow={true}/>
      </div>
      <h1 style={{fontSize:22,fontWeight:900,letterSpacing:1,marginBottom:6,color:"#fff"}}>NIPPON ELECTRICALS</h1>
      <p style={{color:C.muted,marginBottom:32,fontSize:12}}>Smart Point of Sale System</p>
      <div style={{width:"100%",maxWidth:360,background:C.card,borderRadius:18,padding:28,border:"1px solid "+C.border,boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
        <h2 style={{fontSize:16,fontWeight:700,marginBottom:22,color:C.text}}>Sign In</h2>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,color:C.muted,marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>Username</label>
          <input
            type="text"
            value={username}
            placeholder="Enter username"
            autoComplete="username"
            autoCapitalize="none"
            autoCorrect="off"
            spellCheck="false"
            onChange={e => { setUsername(e.target.value); setErr(""); }}
            onKeyDown={handleKey}
            style={{width:"100%",background:"#242424",border:"1.5px solid "+C.border,borderRadius:10,padding:"13px 15px",color:C.text,fontSize:15,outline:"none",boxSizing:"border-box",transition:"border-color 0.2s",fontFamily:"inherit"}}
            onFocus={e => e.target.style.borderColor=C.red}
            onBlur={e => e.target.style.borderColor=C.border}
          />
        </div>
        <div style={{marginBottom:20}}>
          <label style={{display:"block",fontSize:11,color:C.muted,marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>Password</label>
          <input
            type="password"
            value={password}
            placeholder="Enter password"
            autoComplete="current-password"
            onChange={e => { setPassword(e.target.value); setErr(""); }}
            onKeyDown={handleKey}
            style={{width:"100%",background:"#242424",border:"1.5px solid "+C.border,borderRadius:10,padding:"13px 15px",color:C.text,fontSize:15,outline:"none",boxSizing:"border-box",transition:"border-color 0.2s",fontFamily:"inherit"}}
            onFocus={e => e.target.style.borderColor=C.red}
            onBlur={e => e.target.style.borderColor=C.border}
          />
        </div>
        {err && (
          <div style={{background:"#3a1a1a",border:"1px solid #cc000055",borderRadius:8,padding:"10px 14px",marginBottom:18}}>
            <p style={{color:"#ff8888",fontSize:13,textAlign:"center",margin:0}}>{err}</p>
          </div>
        )}
        <button
          onClick={doLogin}
          disabled={busy}
          style={{width:"100%",background:busy?"#555":C.red,border:"none",borderRadius:10,padding:"14px",color:"#fff",fontSize:15,fontWeight:700,cursor:busy?"not-allowed":"pointer",letterSpacing:0.3,transition:"background 0.2s, transform 0.1s",fontFamily:"inherit"}}
          onMouseDown={e => { if(!busy) e.currentTarget.style.transform="scale(0.98)"; }}
          onMouseUp={e => e.currentTarget.style.transform="scale(1)"}
        >
          {busy ? "Signing in..." : "Login"}
        </button>
        <div style={{marginTop:18,background:"#242424",borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
          <p style={{color:C.muted,fontSize:11,marginBottom:4}}>Default credentials</p>
          <p style={{color:C.text,fontSize:13,fontFamily:'"Space Mono",monospace',fontWeight:700}}>admin / admin123</p>
        </div>
      </div>
    </div>
  );
}

      <div style={{padding:"14px 14px 0"}}>
        <p style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Performance</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <StatBox lbl="Today Revenue" val={lkrK(todayRev)} col={C.green} icon="coin"/>
          <StatBox lbl="Today Sales" val={todaySales.length} col={C.blue} icon="pos"/>
          <StatBox lbl="Month Revenue" val={lkrK(monthRev)} col={C.gold} icon="coin"/>
          <StatBox lbl="Low Stock Items" val={lowStock.length} col={lowStock.length>0?C.orange:C.muted} icon="warn"/>
        </div>
        {pendCheques.length>0 && (
          <div style={{background:"#1a1500",border:"1px solid "+C.gold+"44",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
            <Ic n="chq" s={18} c={C.gold}/><span style={{fontSize:13,color:C.gold}}><strong>{pendCheques.length}</strong> pending cheques</span>
          </div>
        )}
        {lowStock.length>0 && (
          <div style={{background:"#1a0e00",border:"1px solid "+C.orange+"44",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
            <p style={{fontSize:12,color:C.orange,fontWeight:700,marginBottom:6}}>Low Stock Alert</p>
            {lowStock.slice(0,4).map(p => <p key={p.id} style={{fontSize:12,marginBottom:2}}>{p.name} — {p.stock} {p.unit}</p>)}
            {lowStock.length>4 && <p style={{fontSize:11,color:C.muted}}>+{lowStock.length-4} more</p>}
          </div>
        )}
        <div style={{background:C.card,borderRadius:12,padding:"12px 14px",border:"1px solid "+C.border}}>
          <p style={{fontSize:11,color:C.muted,letterSpacing:0.5,textTransform:"uppercase",marginBottom:10}}>Recent Sales</p>
          {sales.length===0
            ? <p style={{color:C.muted,fontSize:12,textAlign:"center",padding:10}}>No sales yet</p>
            : sales.slice(-5).reverse().map(s => (
              <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:8,marginBottom:8,borderBottom:"1px solid "+C.border}}>
                <div>
                  <p style={{fontSize:13,fontWeight:700}}>{s.customer}</p>
                  <p style={{fontSize:10,color:C.muted}}>{s.invoiceNo} &bull; {s.date}</p>
                </div>
                <span style={{fontFamily:'"Space Mono",monospace',fontWeight:900,color:C.green,fontSize:13}}>{lkr(s.total)}</span>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  POS PAGE
// ═══════════════════════════════════════════════════════════════════════
function POSPage() {
  const {products, user, onSaleComplete, toast2} = useApp();
  const [cart, setCart] = useState([]);
  const [srch, setSrch] = useState("");
  const [cust, setCust] = useState("Walk-in Customer");
  const [pay, setPay] = useState("cash");
  const [disc, setDisc] = useState("");
  const [paid, setPaid] = useState("");
  const [tab, setTab] = useState("products");
  const [catFlt, setCatFlt] = useState("All");
  const [chqNo, setChqNo] = useState("");
  const [chqBk, setChqBk] = useState("");
  const [busy, setBusy] = useState(false);
  const [badge, setBadge] = useState(0);
  const [catSupFlt, setCatSupFlt] = useState("All");
  const [catSrch, setCatSrch] = useState("");

  const allCats = ["All",...CATS];
  const myProds = products.filter(p =>
    p.active &&
    (catFlt==="All" || p.category===catFlt) &&
    (!srch || p.name.toLowerCase().includes(srch.toLowerCase()))
  );
  const catalogProds = SUPPLIER_CATALOG.filter(i =>
    (catSupFlt==="All" || i.sup===catSupFlt) &&
    (!catSrch || i.name.toLowerCase().includes(catSrch.toLowerCase()) || i.sup.toLowerCase().includes(catSrch.toLowerCase()))
  );

  const discN = Math.max(0, parseFloat(disc)||0);
  const sub = cart.reduce((a,i) => a+i.price*i.qty, 0);
  const tax = cart.reduce((a,i) => a+(i.price*i.qty*(i.tax||0)/100), 0);
  const total = Math.max(0, sub+tax-discN);
  const change = parseFloat(paid||0) - total;
  const cnt = cart.reduce((a,i) => a+i.qty, 0);

  const addToCart = item => {
    setCart(prev => {
      const ex = prev.find(i => i.pid===item.pid);
      if (ex) {
        if (item.maxStock && ex.qty>=item.maxStock) { toast2("Max stock reached!","error"); return prev; }
        return prev.map(i => i.pid===item.pid ? {...i,qty:i.qty+1} : i);
      }
      return [...prev, item];
    });
    setBadge(k => k+1);
  };

  const addMyProd = p => {
    if (p.stock<=0) { toast2("Out of stock!","error"); return; }
    addToCart({pid:p.id, name:p.name, price:p.price, qty:1, tax:p.taxRate||0, sku:p.sku||"", maxStock:p.stock});
    toast2(p.name.slice(0,22)+" added","success");
  };

  const addCatItem = item => {
    addToCart({pid:"cat_"+item.id, name:item.name, price:Math.ceil(item.cost*1.25/10)*10, qty:1, tax:0, sku:item.id});
    toast2(item.name.slice(0,22)+" added","success");
  };

  const updQty = (pid,d) => setCart(prev => prev.map(i => i.pid===pid ? {...i,qty:Math.max(1,i.qty+d)} : i));
  const remItem = pid => setCart(prev => prev.filter(i => i.pid!==pid));
  const clearCart = () => {
    setCart([]); setDisc(""); setPaid(""); setChqNo(""); setChqBk("");
    setCust("Walk-in Customer"); setPay("cash");
  };
  const newBill = () => {
    if (!cart.length || window.confirm("Clear cart and start new bill?")) clearCart();
  };

  const checkout = async () => {
    if (!cart.length) { toast2("Cart is empty!","error"); return; }
    if (pay==="cash" && parseFloat(paid||0)<total) { toast2("Amount paid is less than total!","error"); return; }
    if (pay==="cheque" && (!chqNo||!chqBk)) { toast2("Enter cheque details!","error"); return; }
    setBusy(true);
    try {
      const inv = {
        id: uid(), date: today(),
        customer: cust.trim()||"Walk-in Customer",
        items: [...cart], subtotal: sub, taxAmount: tax, total, discount: discN,
        paid: parseFloat(paid||total), change: Math.max(0,change),
        paymentMode: pay, cashier: user.username, status: "completed",
        invoiceNo: "NE-"+today().replace(/-/g,"").slice(2)+"-"+String(uid()).slice(-4),
        chqDet: pay==="cheque" ? {no:chqNo,bank:chqBk} : null,
        createdAt: new Date().toISOString()
      };
      await onSaleComplete(inv);
    } catch(e) {
      toast2("Checkout failed: "+e.message,"error");
      setBusy(false);
    }
  };

  const fmtRs = n => "Rs."+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",paddingBottom:70}}>
      <div style={{background:C.card,padding:"10px 12px",borderBottom:"1px solid "+C.border,display:"flex",gap:8,alignItems:"center"}}>
        <NipponLogo size={30}/>
        <div style={{flex:1,fontWeight:900,fontSize:14}}>Point of Sale</div>
        <button onClick={newBill} style={{background:"#1a3a1a",border:"1px solid "+C.green+"55",borderRadius:8,padding:"7px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,color:C.green,fontSize:12,fontWeight:700}}>
          <Ic n="plus" s={14} c={C.green}/>New Bill
        </button>
        <button onClick={() => setTab(t => t==="cart"?"products":"cart")}
          style={{position:"relative",background:tab==="cart"?C.red:C.border,border:"none",borderRadius:8,padding:"7px 10px",cursor:"pointer"}}>
          <Ic n="cart" s={17} c="#fff"/>
          {cnt>0 && <span key={badge} className="badgeAnim" style={{background:"#fff",color:C.red,borderRadius:"50%",width:16,height:16,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",position:"absolute",top:-5,right:-5}}>{cnt}</span>}
        </button>
      </div>
      <Tabs tabs={[["products","My Products"],["catalog","Catalog"],["cart",cnt>0?"Cart ("+cnt+")":"Cart"]]} active={tab} setActive={setTab}/>

      {tab==="products" && (
        <div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"9px 12px",background:"#0f0f0f",borderBottom:"1px solid "+C.border}}>
            <div style={{position:"relative",marginBottom:8}}>
              <div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}><Ic n="srch" s={13} c={C.muted}/></div>
              <input value={srch} onChange={e => setSrch(e.target.value)} placeholder="Search products..."
                style={{width:"100%",background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"8px 10px 8px 30px",color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
            </div>
            <div style={{display:"flex",gap:5,overflow:"auto"}}>
              {allCats.map(c => (
                <button key={c} onClick={() => setCatFlt(c)}
                  style={{background:catFlt===c?C.red:C.border,border:"none",borderRadius:16,padding:"4px 11px",color:"#fff",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontWeight:catFlt===c?700:400,flexShrink:0}}>
                  {c}
                </button>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflow:"auto",padding:"8px 10px"}}>
            {myProds.length===0 && (
              <div style={{textAlign:"center",color:C.muted,padding:40}}>
                <Ic n="box" s={44} c={C.muted}/>
                <p style={{marginTop:12,fontSize:13}}>No products found</p>
                <p style={{fontSize:11,marginTop:6}}>Add products in Products tab, or browse Catalog</p>
              </div>
            )}
            {myProds.map((p,i) => {
              const inCart = cart.find(c => c.pid===p.id);
              return (
                <div key={p.id} className="fadeUp" onClick={() => addMyProd(p)}
                  style={{background:inCart?"#1a1000":C.card,borderRadius:10,padding:"10px 12px",marginBottom:7,border:"1px solid "+(inCart?C.gold+"88":C.border),display:"flex",alignItems:"center",gap:10,cursor:"pointer",animationDelay:Math.min(i,20)*0.025+"s"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{p.name}</div>
                    <div style={{display:"flex",gap:7,alignItems:"center"}}>
                      <span style={{fontSize:13,fontWeight:900,color:C.red,fontFamily:'"Space Mono",monospace'}}>{lkr(p.price)}</span>
                      <span style={{fontSize:10,color:p.stock<=(p.minStock||10)?C.orange:C.muted}}>Stk: {p.stock}</span>
                    </div>
                  </div>
                  <div style={{background:inCart?C.gold:C.red,borderRadius:8,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:16,flexShrink:0}}>
                    {inCart ? inCart.qty : "+"}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab==="catalog" && (
        <div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"9px 12px 6px",background:"#0f0f0f",borderBottom:"1px solid "+C.border}}>
            <div style={{position:"relative",marginBottom:7}}>
              <div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}><Ic n="srch" s={13} c={C.muted}/></div>
              <input value={catSrch} onChange={e => setCatSrch(e.target.value)} placeholder="Search catalog..."
                style={{width:"100%",background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"8px 10px 8px 30px",color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
            </div>
            <div style={{display:"flex",gap:5,overflow:"auto"}}>
              {SSUPS.map(s => (
                <button key={s} onClick={() => setCatSupFlt(s)}
                  style={{background:catSupFlt===s?C.red:C.border,border:"none",borderRadius:14,padding:"4px 10px",color:"#fff",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontWeight:catSupFlt===s?700:400,flexShrink:0}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
          <div style={{padding:"5px 12px",fontSize:10,color:C.muted,background:"#0f0f0f",borderBottom:"1px solid "+C.border}}>
            {catalogProds.length} items &mdash; added at 25% markup over cost
          </div>
          <div style={{flex:1,overflow:"auto",padding:"8px 10px"}}>
            {catalogProds.map((item,i) => {
              const inCart = cart.find(c => c.pid==="cat_"+item.id);
              const sc = SUP_COL[item.sup]||C.muted;
              return (
                <div key={item.id} className="fadeUp"
                  style={{background:inCart?"#1a1000":C.card,borderRadius:10,padding:"10px 12px",marginBottom:6,border:"1px solid "+(inCart?C.gold+"88":C.border),display:"flex",alignItems:"center",gap:10,animationDelay:Math.min(i,20)*0.02+"s"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:700,lineHeight:1.3,marginBottom:3}}>{item.name}</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{background:sc+"22",color:sc,border:"1px solid "+sc+"44",borderRadius:3,padding:"1px 6px",fontSize:9,fontWeight:700}}>{item.sup}</span>
                      <span style={{fontSize:10,color:C.muted}}>MRP: {lkr(item.cost)}</span>
                    </div>
                  </div>
                  <button onClick={() => addCatItem(item)}
                    style={{background:inCart?C.gold:C.red,border:"none",borderRadius:8,width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:16,flexShrink:0}}>
                    {inCart ? inCart.qty : "+"}
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab==="cart" && (
        <div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>
          <div style={{flex:1,overflow:"auto",padding:12}}>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:11,color:C.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>Customer Name</label>
              <input value={cust} onChange={e => setCust(e.target.value)}
                style={{width:"100%",background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"10px 13px",color:C.text,fontSize:14,outline:"none",fontFamily:"inherit"}}/>
            </div>
            {cart.length===0 ? (
              <div style={{textAlign:"center",color:C.muted,padding:40}}>
                <Ic n="cart" s={44} c={C.muted}/>
                <p style={{marginTop:12,fontSize:13}}>Cart is empty</p>
                <button onClick={() => setTab("products")} style={{marginTop:14,background:"#252525",border:"none",borderRadius:10,padding:"10px 18px",color:"#fff",fontSize:13,cursor:"pointer",fontWeight:700}}>Browse Products</button>
              </div>
            ) : (
              cart.map((item,i) => (
                <div key={item.pid} className="fadeUp" style={{background:C.card,borderRadius:12,padding:12,marginBottom:8,border:"1px solid "+C.border,animationDelay:i*0.03+"s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700}}>{item.name}</div>
                      <div style={{fontSize:11,color:C.muted}}>{lkr(item.price)} each{item.tax>0?" +"+item.tax+"% Tax":""}</div>
                    </div>
                    <button onClick={() => remItem(item.pid)} style={{background:"#3a1a1a",border:"none",borderRadius:6,padding:"5px 7px",cursor:"pointer"}}>
                      <Ic n="del" s={14} c={C.red}/>
                    </button>
                  </div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",background:"#242424",borderRadius:10,overflow:"hidden"}}>
                      <button onClick={() => updQty(item.pid,-1)} style={{background:"none",border:"none",padding:"7px 14px",cursor:"pointer",color:C.red,fontSize:18,fontWeight:700}}>-</button>
                      <span style={{fontFamily:'"Space Mono",monospace',fontWeight:700,minWidth:24,textAlign:"center",fontSize:15}}>{item.qty}</span>
                      <button onClick={() => updQty(item.pid,1)} style={{background:"none",border:"none",padding:"7px 14px",cursor:"pointer",color:C.green,fontSize:18,fontWeight:700}}>+</button>
                    </div>
                    <div style={{fontFamily:'"Space Mono",monospace',fontWeight:700,fontSize:14}}>{lkr(item.price*item.qty)}</div>
                  </div>
                </div>
              ))
            )}
          </div>
          {cart.length>0 && (
            <div style={{background:"#141414",padding:14,borderTop:"1px solid "+C.border}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:13}}>
                <span style={{color:C.muted}}>Subtotal</span>
                <span style={{fontFamily:'"Space Mono",monospace'}}>{lkr(sub)}</span>
              </div>
              {tax>0 && (
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:13}}>
                  <span style={{color:C.muted}}>Tax</span>
                  <span style={{fontFamily:'"Space Mono",monospace'}}>{lkr(tax)}</span>
                </div>
              )}
              <input value={disc} onChange={e => setDisc(e.target.value)} type="number" min="0" placeholder="Discount (Rs.)"
                style={{width:"100%",background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"8px 12px",color:C.text,fontSize:13,outline:"none",marginBottom:8,fontFamily:"inherit"}}/>
              <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid "+C.border,paddingTop:8,marginBottom:10}}>
                <span style={{fontWeight:700,fontSize:15}}>TOTAL</span>
                <span style={{fontFamily:'"Space Mono",monospace',fontWeight:900,fontSize:20,color:C.red}}>{lkr(total)}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
                {["cash","card","upi","cheque"].map(m => (
                  <button key={m} onClick={() => setPay(m)}
                    style={{background:pay===m?C.red:C.border,border:"none",borderRadius:8,padding:"7px 2px",color:"#fff",fontSize:10,cursor:"pointer",fontWeight:pay===m?700:400,textTransform:"uppercase",transform:pay===m?"scale(1.05)":"scale(1)"}}>
                    {m}
                  </button>
                ))}
              </div>
              {pay==="cash" && (
                <div style={{marginBottom:10}}>
                  <input value={paid} onChange={e => setPaid(e.target.value)} type="number" placeholder="Amount paid (Rs.)"
                    style={{width:"100%",background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:14,outline:"none",marginBottom:4,fontFamily:"inherit"}}/>
                  {paid && <div style={{fontSize:12,color:change>=0?C.green:C.red,fontWeight:700}}>
                    Change: {lkr(Math.abs(change))}{change<0?" (Short)":""}
                  </div>}
                </div>
              )}
              {pay==="cheque" && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                  <input value={chqNo} onChange={e => setChqNo(e.target.value)} placeholder="Cheque No."
                    style={{background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
                  <select value={chqBk} onChange={e => setChqBk(e.target.value)}
                    style={{background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"9px 12px",color:chqBk?C.text:C.muted,fontSize:13,outline:"none"}}>
                    <option value="">Select Bank</option>
                    {BANKS.map(b => <option key={b} value={b}>{b}</option>)}
                  </select>
                </div>
              )}
              <div style={{display:"flex",gap:8}}>
                <Btn ch="Clear" col="#252525" onClick={clearCart} st={{flex:1}}/>
                <Btn ch={busy ? "Processing..." : <><Ic n="ok" s={14} c="#fff"/>Checkout</>}
                  onClick={checkout} dis={busy} col={C.green} st={{flex:2}}/>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  BILL VIEW
// ═══════════════════════════════════════════════════════════════════════
function BillView({sale, onNewSale}) {
  const printBill = () => {
    const el = document.getElementById("bill-print");
    el.style.display = "block";
    el.innerHTML =
      "<div style='text-align:center;margin-bottom:14px'>" +
      "<b style='font-size:16px'>NIPPON ELECTRICALS</b><br/><small>Smart POS System</small>" +
      "<hr style='margin:8px 0'/></div>" +
      "<div style='display:flex;justify-content:space-between;margin-bottom:4px'><span>Invoice:</span><b>" + sale.invoiceNo + "</b></div>" +
      "<div style='display:flex;justify-content:space-between;margin-bottom:4px'><span>Date:</span><span>" + sale.date + "</span></div>" +
      "<div style='display:flex;justify-content:space-between;margin-bottom:12px'><span>Customer:</span><span>" + sale.customer + "</span></div>" +
      "<hr style='margin-bottom:8px'/>" +
      sale.items.map(i => "<div style='display:flex;justify-content:space-between;margin:4px 0'><span>" + i.name + " x" + i.qty + "</span><span>Rs." + (i.price*i.qty).toFixed(2) + "</span></div>").join("") +
      "<hr style='margin:8px 0'/>" +
      "<div style='display:flex;justify-content:space-between'><span>Subtotal</span><span>Rs." + sale.subtotal.toFixed(2) + "</span></div>" +
      (sale.discount>0 ? "<div style='display:flex;justify-content:space-between'><span>Discount</span><span>- Rs." + sale.discount.toFixed(2) + "</span></div>" : "") +
      "<div style='display:flex;justify-content:space-between;font-size:16px;font-weight:bold;margin-top:8px'><span>TOTAL</span><span>Rs." + sale.total.toFixed(2) + "</span></div>" +
      "<hr style='margin:8px 0'/>" +
      "<div style='display:flex;justify-content:space-between'><span>Payment</span><span>" + sale.paymentMode.toUpperCase() + "</span></div>" +
      (sale.paymentMode==="cash" && sale.change>0 ? "<div style='display:flex;justify-content:space-between'><span>Change</span><span>Rs." + sale.change.toFixed(2) + "</span></div>" : "") +
      "<div style='text-align:center;margin-top:16px;font-size:11px'>Thank you for shopping at Nippon Electricals!</div>";
    window.print();
    setTimeout(() => { el.style.display="none"; el.innerHTML=""; }, 1000);
  };
  return (
    <div style={{maxWidth:420,margin:"0 auto",padding:"20px 14px",paddingBottom:90}}>
      <div className="popIn" style={{textAlign:"center",marginBottom:22}}>
        <div style={{width:64,height:64,borderRadius:"50%",background:C.green+"22",border:"2px solid "+C.green,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>
          <Ic n="ok" s={30} c={C.green}/>
        </div>
        <h2 style={{fontSize:18,fontWeight:900,color:C.green}}>Sale Complete!</h2>
        <p style={{fontSize:12,color:C.muted,marginTop:4}}>{sale.invoiceNo}</p>
      </div>
      <Card st={{marginBottom:14,borderTop:"3px solid "+C.red}} ch={
        <>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"1px solid "+C.border}}>
            <span style={{fontSize:11,color:C.muted}}>Customer</span>
            <span style={{fontWeight:700}}>{sale.customer}</span>
          </div>
          {sale.items.map((item,i) => (
            <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:13}}>{item.name} <span style={{color:C.muted}}>x{item.qty}</span></span>
              <span style={{fontFamily:'"Space Mono",monospace',fontSize:13}}>{lkr(item.price*item.qty)}</span>
            </div>
          ))}
          <div style={{borderTop:"1px solid "+C.border,marginTop:10,paddingTop:10}}>
            {sale.discount>0 && <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:4}}><span>Discount</span><span>-{lkr(sale.discount)}</span></div>}
            <div style={{display:"flex",justifyContent:"space-between",fontWeight:900,fontSize:18,marginTop:4}}>
              <span>TOTAL</span>
              <span style={{fontFamily:'"Space Mono",monospace',color:C.red}}>{lkr(sale.total)}</span>
            </div>
            {sale.paymentMode==="cash" && sale.change>0 && (
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:C.green,marginTop:6}}><span>Change</span><span>{lkr(sale.change)}</span></div>
            )}
            <div style={{marginTop:10}}><Badge ch={sale.paymentMode.toUpperCase()} col={C.green}/></div>
          </div>
        </>
      }/>
      <div style={{display:"flex",gap:10}}>
        <Btn ch={<><Ic n="print" s={14} c="#fff"/>Print</>} onClick={printBill} st={{flex:1}}/>
        <Btn ch={<><Ic n="plus" s={14} c="#fff"/>New Sale</>} onClick={onNewSale} col={C.green} st={{flex:1}}/>
      </div>
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════════════
//  PRODUCTS PAGE
// ═══════════════════════════════════════════════════════════════════════
function ProductsPage() {
  const {products, upsertProduct, deleteProduct, toast2, user, companies} = useApp();
  const [srch, setSrch] = useState("");
  const [catFlt, setCatFlt] = useState("All");
  const [pgTab, setPgTab] = useState("mine");
  const [supFlt, setSupFlt] = useState("All");
  const [catSrch, setCatSrch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [ed, setEd] = useState(null);
  const [saving, setSaving] = useState(false);
  const blank = {name:"",sku:"",category:"Lighting",price:"",costPrice:"",stock:"",unit:"pcs",taxRate:"0",minStock:"10",barcode:"",active:true,supplierId:"",supplierName:""};
  const [f, setF] = useState(blank);

  const allCats = ["All",...CATS];
  const myList = products.filter(p =>
    (catFlt==="All" || p.category===catFlt) &&
    (!srch || p.name.toLowerCase().includes(srch.toLowerCase()) || (p.sku||"").toLowerCase().includes(srch.toLowerCase()))
  );
  const catList = SUPPLIER_CATALOG.filter(i =>
    (supFlt==="All" || i.sup===supFlt) &&
    (!catSrch || i.name.toLowerCase().includes(catSrch.toLowerCase()) || i.sup.toLowerCase().includes(catSrch.toLowerCase()))
  );

  const openAdd = () => { setEd(null); setF(blank); setShowForm(true); };
  const openEdit = p => { setEd(p); setF({...blank,...p,price:String(p.price||""),costPrice:String(p.costPrice||""),stock:String(p.stock||""),taxRate:String(p.taxRate||"0"),minStock:String(p.minStock||"10")}); setShowForm(true); };
  const openFromCatalog = ci => {
    setEd(null);
    const mp = CATS.includes(ci.cat) ? ci.cat : "Accessories";
    setF({...blank, name:ci.name, category:mp, costPrice:String(ci.cost), price:String(Math.ceil(ci.cost*1.25/10)*10), unit:ci.unit, supplierName:ci.sup});
    setShowForm(true); setPgTab("mine");
  };
  const chgSupplier = v => { const co=companies.find(c=>String(c.id)===v); setF(p=>({...p,supplierId:v,supplierName:co?co.name:""})); };

  const save = async () => {
    if (!f.name.trim()) { toast2("Product name required!","error"); return; }
    if (!f.price || isNaN(parseFloat(f.price))) { toast2("Valid sale price required!","error"); return; }
    if (!f.stock || isNaN(parseInt(f.stock))) { toast2("Stock quantity required!","error"); return; }
    setSaving(true);
    try {
      const p = {...f, id:ed?ed.id:uid(), name:f.name.trim(), price:parseFloat(f.price), costPrice:parseFloat(f.costPrice||0), stock:parseInt(f.stock), taxRate:parseFloat(f.taxRate||0), minStock:parseInt(f.minStock||10), supplierId:f.supplierId?parseInt(f.supplierId):null, active:f.active!==false};
      await upsertProduct(p);
      toast2(ed?"Product updated!":"Product added!","success");
      setShowForm(false);
    } catch(e) { toast2("Save failed: "+e.message,"error"); }
    setSaving(false);
  };
  const toggle = async p => { await upsertProduct({...p,active:!p.active}); toast2(p.active?"Deactivated":"Activated","info"); };
  const del = async id => { if (confirm("Delete this product?")) { await deleteProduct(id); toast2("Deleted","info"); } };
  const canEdit = user.role==="admin" || user.role==="manager";

  return (
    <div style={{paddingBottom:90}}>
      <Tabs tabs={[["mine","My Products ("+products.length+")"],["catalog","Supplier Catalog"]]} active={pgTab} setActive={setPgTab}/>

      {pgTab==="catalog" && (
        <div>
          <div style={{padding:"10px 12px 6px",background:"#141414",borderBottom:"1px solid "+C.border}}>
            <div style={{position:"relative",marginBottom:8}}>
              <div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}><Ic n="srch" s={13} c={C.muted}/></div>
              <input value={catSrch} onChange={e => setCatSrch(e.target.value)} placeholder="Search catalog..."
                style={{width:"100%",background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"8px 10px 8px 28px",color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
            </div>
            <div style={{display:"flex",gap:5,overflow:"auto"}}>
              {SSUPS.map(s => (
                <button key={s} onClick={() => setSupFlt(s)}
                  style={{background:supFlt===s?C.red:C.border,border:"none",borderRadius:14,padding:"4px 10px",color:"#fff",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontWeight:supFlt===s?700:400,flexShrink:0}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
          <div style={{padding:"5px 13px",fontSize:10,color:C.muted,background:"#141414",borderBottom:"1px solid "+C.border}}>
            {catList.length} items {canEdit && "— tap Add to save to My Products"}
          </div>
          <div style={{padding:"8px 10px"}}>
            {catList.map((item,i) => {
              const sc = SUP_COL[item.sup]||C.muted;
              return (
                <div key={item.id} className="fadeUp" style={{background:C.card,borderRadius:10,padding:"10px 12px",marginBottom:7,border:"1px solid "+C.border,display:"flex",alignItems:"center",gap:10,animationDelay:Math.min(i,20)*0.025+"s"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:700,lineHeight:1.3,marginBottom:3}}>{item.name}</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:2}}>
                      <span style={{background:sc+"22",color:sc,border:"1px solid "+sc+"44",borderRadius:3,padding:"1px 6px",fontSize:9,fontWeight:700}}>{item.sup}</span>
                      <span style={{fontSize:9,color:C.muted}}>{item.cat}</span>
                    </div>
                    <span style={{fontSize:11,color:C.muted}}>MRP: <b style={{fontFamily:'"Space Mono",monospace',color:C.text}}>Rs.{item.cost.toLocaleString()}</b> / {item.unit}</span>
                  </div>
                  {canEdit && (
                    <button onClick={() => openFromCatalog(item)}
                      style={{background:C.green,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,color:"#fff",fontSize:11,fontWeight:700,flexShrink:0}}>
                      <Ic n="plus" s={12} c="#fff"/>Add
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {pgTab==="mine" && (
        <div style={{padding:14}}>
          <SectionHeader title="My Products" right={<>
            {canEdit && <Btn ch={<><Ic n="plus" s={14} c="#fff"/>Add</>} onClick={openAdd} sz="sm"/>}
            <ExportMenu
              onXLSX={() => xlsxExp(products.map(x=>({SKU:x.sku,Name:x.name,Category:x.category,"Sale Price":x.price,"Cost Price":x.costPrice,Stock:x.stock,Status:x.active?"Active":"Inactive"})),"Products","NE_Products")}
              onPDF={() => pdfExp("Products Report",[{h:"Name",k:"n"},{h:"Category",k:"c"},{h:"Price",k:"p"},{h:"Stock",k:"s"}],products.map(x=>({n:x.name,c:x.category,p:lkr(x.price),s:x.stock+" "+x.unit})),"NE_Products")}
            />
          </>}/>
          <div style={{position:"relative",marginBottom:10}}>
            <div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}><Ic n="srch" s={13} c={C.muted}/></div>
            <input value={srch} onChange={e => setSrch(e.target.value)} placeholder="Search products..."
              style={{width:"100%",background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"8px 10px 8px 30px",color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"flex",gap:5,overflow:"auto",marginBottom:14}}>
            {allCats.map(c => (
              <button key={c} onClick={() => setCatFlt(c)}
                style={{background:catFlt===c?C.red:C.border,border:"none",borderRadius:14,padding:"4px 10px",color:"#fff",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontWeight:catFlt===c?700:400,flexShrink:0}}>
                {c}
              </button>
            ))}
          </div>
          {myList.length===0 && (
            <div style={{textAlign:"center",color:C.muted,padding:40}}>
              <Ic n="box" s={44} c={C.muted}/>
              <p style={{marginTop:12,fontSize:13}}>No products yet</p>
              {canEdit && <Btn ch="Add Product" onClick={openAdd} st={{marginTop:16}}/>}
              <p style={{fontSize:11,marginTop:10,color:C.muted}}>Or browse Supplier Catalog tab</p>
            </div>
          )}
          {myList.map((p,i) => (
            <div key={p.id} className="fadeUp" style={{background:C.card,borderRadius:12,padding:13,marginBottom:8,border:"1px solid "+C.border,opacity:p.active?1:0.55,animationDelay:i*0.03+"s"}}>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,fontWeight:700}}>{p.name}</span>
                    {!p.active && <Badge ch="Inactive" col={C.muted}/>}
                    {p.stock<=(p.minStock||10) && <Badge ch="Low Stock" col={C.orange}/>}
                  </div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{p.sku||"—"} &bull; {p.category}</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:14,fontWeight:900,color:C.red,fontFamily:'"Space Mono",monospace'}}>{lkr(p.price)}</span>
                    <span style={{fontSize:11,color:C.muted}}>Cost: {lkr(p.costPrice)}</span>
                    <span style={{fontSize:11,color:p.stock<=(p.minStock||10)?C.orange:C.muted}}>Stk: {p.stock} {p.unit}</span>
                  </div>
                </div>
                {canEdit && (
                  <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}>
                    <button onClick={() => openEdit(p)} style={{background:C.border,border:"none",borderRadius:6,padding:"6px 8px",cursor:"pointer"}}><Ic n="edit" s={13}/></button>
                    <button onClick={() => toggle(p)} style={{background:p.active?"#1a3a1a":"#3a1a1a",border:"none",borderRadius:6,padding:"6px 8px",cursor:"pointer"}}><Ic n={p.active?"eye":"eyeoff"} s={13} c={p.active?C.green:C.red}/></button>
                    <button onClick={() => del(p.id)} style={{background:"#3a1a1a",border:"none",borderRadius:6,padding:"6px 8px",cursor:"pointer"}}><Ic n="del" s={13} c={C.red}/></button>
                  </div>
                )}
              </div>
            </div>
          ))}
          <Modal open={showForm} onClose={() => setShowForm(false)} title={ed?"Edit Product":"Add Product"} ch={
            <>
              <Inp lbl="Product Name" val={f.name} set={v => setF(p=>({...p,name:v}))} req/>
              <Inp lbl="SKU / Item Code" val={f.sku} set={v => setF(p=>({...p,sku:v}))} ph="NE-LT-001"/>
              <Sel lbl="Category" val={f.category} set={v => setF(p=>({...p,category:v}))} opts={CATS}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Inp lbl="Sale Price (Rs.)" val={f.price} set={v => setF(p=>({...p,price:v}))} type="number" req/>
                <Inp lbl="Cost Price (Rs.)" val={f.costPrice} set={v => setF(p=>({...p,costPrice:v}))} type="number"/>
                <Inp lbl="Stock Qty" val={f.stock} set={v => setF(p=>({...p,stock:v}))} type="number" req/>
                <Inp lbl="Min Stock Alert" val={f.minStock} set={v => setF(p=>({...p,minStock:v}))} type="number"/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Sel lbl="Unit" val={f.unit} set={v => setF(p=>({...p,unit:v}))} opts={["pcs","roll","box","kg","meter","set","pair"]}/>
                <Inp lbl="Tax %" val={f.taxRate} set={v => setF(p=>({...p,taxRate:v}))} type="number"/>
              </div>
              {companies.length>0 && <Sel lbl="Supplier" val={f.supplierId} set={chgSupplier} opts={[{v:"",l:"No Supplier"},...companies.map(c=>({v:String(c.id),l:c.name}))]}/>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,padding:"10px 13px",background:"#242424",borderRadius:8}}>
                <span style={{fontSize:13}}>Active (visible in POS)</span>
                <button onClick={() => setF(p=>({...p,active:!p.active}))} style={{background:f.active?C.green:C.border,border:"none",borderRadius:12,width:44,height:24,cursor:"pointer",position:"relative",transition:"background 0.2s"}}>
                  <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:f.active?23:3,transition:"left 0.2s"}}/>
                </button>
              </div>
              <Btn ch={saving?"Saving...":(ed?"Update Product":"Add Product")} onClick={save} dis={saving} full sz="lg"/>
            </>
          }/>
        </div>
      )}
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════════════
//  CHEQUES PAGE
// ═══════════════════════════════════════════════════════════════════════
function ChequesPage() {
  const {cheques, upsertCheque, deleteCheque, toast2} = useApp();
  const [showForm, setShowForm] = useState(false);
  const [ed, setEd] = useState(null);
  const [flt, setFlt] = useState("all");
  const [catFlt, setCatFlt] = useState("all");
  const [viewImg, setViewImg] = useState(null);
  const blank = {category:"received",customerName:"",companyName:"",chequeNo:"",bank:"",branch:"",amount:"",chequeDate:today(),dueDate:"",givenDate:today(),billNumber:"",invoiceRef:"",chequeImage:null,status:"pending",notes:""};
  const [f, setF] = useState(blank);
  const [imgBusy, setImgBusy] = useState(false);

  let list = [...cheques];
  if (catFlt!=="all") list = list.filter(c => c.category===catFlt);
  if (flt!=="all") list = list.filter(c => c.status===flt);
  list.sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));

  const pendIn = cheques.filter(c => c.status==="pending" && c.category==="received").reduce((a,c) => a+c.amount, 0);
  const pendOut = cheques.filter(c => c.status==="pending" && c.category==="given").reduce((a,c) => a+c.amount, 0);
  const statusCol = {pending:C.gold, cleared:C.green, bounced:C.red, cancelled:C.muted};

  const openForm = (c=null) => {
    if (c) { setEd(c); setF({...blank,...c,amount:String(c.amount)}); }
    else { setEd(null); setF(blank); }
    setShowForm(true);
  };
  const handleImg = async e => {
    const file = e.target.files[0];
    if (!file) return;
    setImgBusy(true);
    try { const img = await compressImg(file); setF(p => ({...p,chequeImage:img})); }
    catch(err) { toast2("Image failed","error"); }
    setImgBusy(false);
  };
  const save = async () => {
    if (!f.chequeNo || !f.bank || !f.amount) { toast2("Fill required fields!","error"); return; }
    if (f.category==="received" && !f.customerName) { toast2("Customer name required!","error"); return; }
    if (f.category==="given" && !f.companyName) { toast2("Company name required!","error"); return; }
    const c = {...f, amount:parseFloat(f.amount), id:ed?ed.id:uid(), createdAt:ed?ed.createdAt:new Date().toISOString(), clearedDate:f.status==="cleared"?(ed?.clearedDate||today()):null};
    await upsertCheque(c);
    toast2(ed?"Updated!":"Added!","success");
    setShowForm(false);
  };
  const setStatus = async (c,status) => { await upsertCheque({...c,status,clearedDate:status==="cleared"?today():c.clearedDate}); toast2("Marked as "+status,"success"); };
  const del = async id => { if (confirm("Delete this cheque?")) { await deleteCheque(id); toast2("Deleted","info"); } };

  return (
    <div style={{paddingBottom:90}}>
      <div style={{padding:"14px 14px 10px",background:"#0f0f0f",borderBottom:"1px solid "+C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <h1 style={{fontSize:17,fontWeight:900}}>Cheques</h1>
          <div style={{display:"flex",gap:8}}>
            <ExportMenu
              onXLSX={() => xlsxExp(cheques.map(x=>({Party:x.customerName||x.companyName,"Cheque No":x.chequeNo,Bank:x.bank,Amount:x.amount,Date:x.chequeDate,Status:x.status})),"Cheques","NE_Cheques")}
              onPDF={() => pdfExp("Cheques",[{h:"Party",k:"party"},{h:"No",k:"no"},{h:"Amount",k:"amt"},{h:"Status",k:"st"}],cheques.map(x=>({party:x.customerName||x.companyName,no:x.chequeNo,amt:lkr(x.amount),st:x.status})),"NE_Cheques")}
            />
            <Btn ch={<><Ic n="plus" s={14} c="#fff"/>Add</>} onClick={() => openForm()} sz="sm"/>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <StatBox lbl="Pending Received" val={lkrK(pendIn)} col={C.gold} icon="coin"/>
          <StatBox lbl="Pending Given" val={lkrK(pendOut)} col={C.red} icon="coin"/>
        </div>
        <div style={{display:"flex",gap:5,overflow:"auto",marginBottom:8}}>
          {[["all","All"],["received","Received"],["given","Given"]].map(([v,l]) => (
            <button key={v} onClick={() => setCatFlt(v)}
              style={{background:catFlt===v?C.red:C.border,border:"none",borderRadius:14,padding:"4px 12px",color:"#fff",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",fontWeight:catFlt===v?700:400,flexShrink:0}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:5,overflow:"auto"}}>
          {[["all","All"],["pending","Pending"],["cleared","Cleared"],["bounced","Bounced"]].map(([v,l]) => (
            <button key={v} onClick={() => setFlt(v)}
              style={{background:flt===v?(statusCol[v]||C.blue):C.border,border:"none",borderRadius:14,padding:"4px 12px",color:"#fff",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",fontWeight:flt===v?700:400,flexShrink:0}}>
              {l}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"10px 14px"}}>
        {list.length===0 && <div style={{textAlign:"center",color:C.muted,padding:40}}><Ic n="chq" s={44} c={C.muted}/><p style={{marginTop:12}}>No cheques found</p></div>}
        {list.map((c,i) => (
          <div key={c.id} className="fadeUp" style={{background:C.card,borderRadius:12,padding:13,marginBottom:9,border:"1px solid "+(statusCol[c.status]||C.muted)+"44",animationDelay:i*0.03+"s"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div>
                <span style={{fontWeight:700,fontSize:13}}>{c.category==="received"?c.customerName:c.companyName}</span>
                <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                  <Badge ch={c.category.toUpperCase()} col={c.category==="received"?C.green:C.red}/>
                  <Badge ch={c.status.toUpperCase()} col={statusCol[c.status]||C.muted}/>
                </div>
              </div>
              <span style={{fontFamily:'"Space Mono",monospace',fontWeight:900,fontSize:16,color:statusCol[c.status]||C.text}}>{lkr(c.amount)}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,fontSize:11,color:C.muted,marginBottom:10}}>
              <span>No: <b style={{color:C.text}}>{c.chequeNo}</b></span>
              <span>Bank: <b style={{color:C.text}}>{c.bank}</b></span>
              <span>Date: {c.chequeDate}</span>
              {c.billNumber && <span>Bill: {c.billNumber}</span>}
            </div>
            {c.chequeImage && (
              <img src={c.chequeImage} onClick={() => setViewImg(c.chequeImage)} alt="Cheque"
                style={{width:"100%",maxHeight:80,objectFit:"cover",borderRadius:6,marginBottom:8,cursor:"pointer"}}/>
            )}
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {c.status==="pending" && <>
                <Btn ch="Clear" col={C.green} sz="sm" onClick={() => setStatus(c,"cleared")}/>
                <Btn ch="Bounce" sz="sm" st={{background:"#3a1a1a",color:C.red}} onClick={() => setStatus(c,"bounced")}/>
              </>}
              <Btn ch={<Ic n="edit" s={12}/>} col="#252525" sz="sm" onClick={() => openForm(c)}/>
              <Btn ch={<Ic n="del" s={12} c={C.red}/>} sz="sm" st={{background:"#3a1a1a"}} onClick={() => del(c.id)}/>
            </div>
          </div>
        ))}
      </div>
      {viewImg && (
        <div onClick={() => setViewImg(null)}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <img src={viewImg} style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:8}}/>
        </div>
      )}
      <Modal open={showForm} onClose={() => setShowForm(false)} title={ed?"Edit Cheque":"Add Cheque"} ch={
        <div>
          <Sel lbl="Category" val={f.category} set={v => setF(p=>({...p,category:v}))} opts={["received","given"]}/>
          {f.category==="received" && <Inp lbl="Customer Name" val={f.customerName} set={v => setF(p=>({...p,customerName:v}))} req/>}
          {f.category==="given" && <Inp lbl="Company Name" val={f.companyName} set={v => setF(p=>({...p,companyName:v}))} req/>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp lbl="Cheque No" val={f.chequeNo} set={v => setF(p=>({...p,chequeNo:v}))} req/>
            <Inp lbl="Amount" val={f.amount} set={v => setF(p=>({...p,amount:v}))} type="number" req/>
          </div>
          <Sel lbl="Bank" val={f.bank} set={v => setF(p=>({...p,bank:v}))} opts={["",...BANKS]}/>
          <Inp lbl="Branch" val={f.branch} set={v => setF(p=>({...p,branch:v}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp lbl="Cheque Date" val={f.chequeDate} set={v => setF(p=>({...p,chequeDate:v}))} type="date"/>
            <Inp lbl="Due Date" val={f.dueDate} set={v => setF(p=>({...p,dueDate:v}))} type="date"/>
          </div>
          <Inp lbl="Bill / Invoice Number" val={f.billNumber} set={v => setF(p=>({...p,billNumber:v}))}/>
          <Sel lbl="Status" val={f.status} set={v => setF(p=>({...p,status:v}))} opts={["pending","cleared","bounced","cancelled"]}/>
          <Field lbl="Cheque Image">
            <input type="file" accept="image/*" onChange={handleImg}
              style={{width:"100%",background:"#242424",border:"1.5px dashed "+C.border,borderRadius:8,padding:10,color:C.muted,fontSize:13,cursor:"pointer"}}/>
            {imgBusy && <p style={{fontSize:11,color:C.muted,marginTop:4}}>Loading image...</p>}
            {f.chequeImage && <img src={f.chequeImage} style={{width:"100%",maxHeight:80,objectFit:"cover",borderRadius:6,marginTop:6}}/>}
          </Field>
          <Textarea lbl="Notes" val={f.notes} set={v => setF(p=>({...p,notes:v}))}/>
          <Btn ch={ed?"Update Cheque":"Add Cheque"} onClick={save} full sz="lg"/>
        </div>
      }/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  COMPANIES PAGE
// ═══════════════════════════════════════════════════════════════════════
function CompaniesPage() {
  const {companies, products, upsertCompany, deleteCompany, upsertProduct, toast2, user} = useApp();
  const [showForm, setShowForm] = useState(false);
  const [ed, setEd] = useState(null);
  const [detail, setDetail] = useState(null);
  const [coTab, setCoTab] = useState("info");
  const [srch, setSrch] = useState("");
  const [editPId, setEditPId] = useState(null);
  const [tmp, setTmp] = useState({cost:"",sale:""});
  const blank = {name:"",type:"Supplier",contactPerson:"",phone:"",email:"",address:"",website:"",paymentTerms:"30 days",taxNo:"",notes:"",active:true};
  const [f, setF] = useState(blank);
  const types = ["Supplier","Dealer","Manufacturer","Distributor","Importer"];
  const tc = {Supplier:C.green,Dealer:C.blue,Manufacturer:C.orange,Distributor:C.purple,Importer:C.gold};
  const filtered = companies.filter(c => c.name.toLowerCase().includes(srch.toLowerCase()) || (c.contactPerson||"").toLowerCase().includes(srch.toLowerCase()));
  const coProd = co => products.filter(p => p.supplierId===co.id);
  const canEdit = user.role==="admin" || user.role==="manager";
  const margin = p => p.costPrice>0 ? ((p.price-p.costPrice)/p.costPrice*100).toFixed(0)+"%" : "N/A";
  const mCol = p => { if(!p.costPrice) return C.muted; const m=(p.price-p.costPrice)/p.costPrice*100; return m>=30?C.green:m>=15?C.gold:C.red; };

  const openForm = (c=null) => {
    if (c) { setEd(c); setF({...blank,...c}); }
    else { setEd(null); setF(blank); }
    setShowForm(true);
  };
  const save = async () => {
    if (!f.name.trim()) { toast2("Company name required!","error"); return; }
    const c = {...f, id:ed?ed.id:uid(), createdAt:ed?ed.createdAt:today()};
    await upsertCompany(c);
    toast2(ed?"Updated!":"Added!","success");
    setShowForm(false);
    if (detail && ed && detail.id===ed.id) setDetail(c);
  };
  const del = async id => {
    const lp = products.filter(p => p.supplierId===id);
    if (lp.length) { toast2(lp.length+" products linked — unlink first!","error"); return; }
    if (confirm("Delete this company?")) { await deleteCompany(id); toast2("Deleted","info"); setDetail(null); }
  };
  const savePrice = async p => {
    await upsertProduct({...p, costPrice:parseFloat(tmp.cost)||p.costPrice, price:parseFloat(tmp.sale)||p.price});
    setEditPId(null); toast2("Price updated!","success");
  };

  if (detail) {
    const co = companies.find(c => c.id===detail.id)||detail;
    const prods = coProd(co);
    return (
      <div style={{paddingBottom:90}}>
        <div style={{background:C.card,borderBottom:"1px solid "+C.border,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
          <button onClick={() => setDetail(null)} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Ic n="back" s={22} c={C.muted}/></button>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:16}}>{co.name}</div>
            <div style={{fontSize:11,color:C.muted}}>{co.type}</div>
          </div>
          {canEdit && <Btn ch={<><Ic n="edit" s={13}/>Edit</>} col="#252525" sz="sm" onClick={() => openForm(co)}/>}
        </div>
        <Tabs tabs={[["info","Info"],["products","Products ("+prods.length+")"],["prices","Prices"]]} active={coTab} setActive={setCoTab}/>
        {coTab==="info" && (
          <div style={{padding:"14px"}}>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <StatBox lbl="Products" val={prods.length} col={C.blue} icon="box"/>
              <StatBox lbl="Stock Value" val={lkrK(prods.reduce((a,p)=>a+p.costPrice*p.stock,0))} col={C.green} icon="coin"/>
            </div>
            <Card ch={
              <div style={{display:"grid",gap:12}}>
                {[["Contact",co.contactPerson,"users"],["Phone",co.phone,"phone"],["Email",co.email,"srch"],["Address",co.address,"bldg"],["Terms",co.paymentTerms,"coin"],["Tax No",co.taxNo,"tag"]].filter(([,v])=>v).map(([l,v,ic]) => (
                  <div key={l} style={{display:"flex",gap:10}}>
                    <Ic n={ic} s={14} c={C.muted}/>
                    <div>
                      <div style={{fontSize:10,color:C.muted,textTransform:"uppercase"}}>{l}</div>
                      <div style={{fontSize:13}}>{v}</div>
                    </div>
                  </div>
                ))}
              </div>
            }/>
            {co.notes && <Card st={{marginTop:12}} ch={<p style={{fontSize:13,lineHeight:1.5,color:C.muted}}>{co.notes}</p>}/>}
            {canEdit && (
              <div style={{marginTop:14,display:"flex",gap:10}}>
                <Btn ch={co.active?"Deactivate":"Activate"} col="#252525" onClick={() => upsertCompany({...co,active:!co.active})} st={{flex:1}}/>
                <Btn ch="Delete Company" st={{flex:1,background:"#3a1a1a",color:C.red}} onClick={() => del(co.id)}/>
              </div>
            )}
          </div>
        )}
        {coTab==="products" && (
          <div style={{padding:"14px",paddingBottom:90}}>
            {prods.length===0
              ? <div style={{textAlign:"center",color:C.muted,padding:40}}>No products linked</div>
              : prods.map(p => (
                <Card key={p.id} st={{marginBottom:8}} ch={
                  <>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{p.name}</div>
                    <div style={{fontSize:11,color:C.muted,marginBottom:6}}>{p.sku} &bull; {p.category}</div>
                    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                      <div><div style={{fontSize:9,color:C.muted}}>SALE</div><div style={{fontFamily:'"Space Mono",monospace',fontWeight:700,color:C.red,fontSize:12}}>{lkr(p.price)}</div></div>
                      <div><div style={{fontSize:9,color:C.muted}}>COST</div><div style={{fontFamily:'"Space Mono",monospace',fontWeight:700,color:C.green,fontSize:12}}>{lkr(p.costPrice)}</div></div>
                      <div><div style={{fontSize:9,color:C.muted}}>MARGIN</div><div style={{fontFamily:'"Space Mono",monospace',fontWeight:700,color:mCol(p),fontSize:12}}>{margin(p)}</div></div>
                    </div>
                  </>
                }/>
              ))
            }
          </div>
        )}
        {coTab==="prices" && (
          <div style={{padding:"14px",paddingBottom:90}}>
            {prods.length===0
              ? <div style={{textAlign:"center",color:C.muted,padding:40}}>No products linked</div>
              : prods.map(p => (
                <Card key={p.id} st={{marginBottom:10,borderLeft:"3px solid "+(editPId===p.id?C.gold:C.border)}} ch={
                  <>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
                        <div style={{fontSize:11,color:C.muted}}>{p.sku}</div>
                      </div>
                      {canEdit && (editPId===p.id
                        ? <div style={{display:"flex",gap:6}}>
                            <Btn ch="Save" col={C.green} sz="sm" onClick={() => savePrice(p)}/>
                            <Btn ch="Cancel" col="#252525" sz="sm" onClick={() => setEditPId(null)}/>
                          </div>
                        : <Btn ch="Edit Prices" col="#252525" sz="sm" onClick={() => { setEditPId(p.id); setTmp({cost:String(p.costPrice),sale:String(p.price)}); }}/>
                      )}
                    </div>
                    {editPId===p.id
                      ? <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                          <Inp lbl="Cost Price" val={tmp.cost} set={v => setTmp(t=>({...t,cost:v}))} type="number"/>
                          <Inp lbl="Sale Price" val={tmp.sale} set={v => setTmp(t=>({...t,sale:v}))} type="number"/>
                        </div>
                      : <div style={{display:"flex",gap:14}}>
                          <div><div style={{fontSize:9,color:C.muted}}>COST</div><div style={{fontFamily:'"Space Mono",monospace',fontWeight:700,color:C.green}}>{lkr(p.costPrice)}</div></div>
                          <div><div style={{fontSize:9,color:C.muted}}>SALE</div><div style={{fontFamily:'"Space Mono",monospace',fontWeight:700,color:C.red}}>{lkr(p.price)}</div></div>
                          <div><div style={{fontSize:9,color:C.muted}}>MARGIN</div><div style={{fontFamily:'"Space Mono",monospace',fontWeight:700,color:mCol(p)}}>{margin(p)}</div></div>
                        </div>
                    }
                  </>
                }/>
              ))
            }
          </div>
        )}
        <Modal open={showForm} onClose={() => setShowForm(false)} title="Edit Company" ch={
          <>
            <Inp lbl="Company Name" val={f.name} set={v => setF(p=>({...p,name:v}))} req/>
            <Sel lbl="Type" val={f.type} set={v => setF(p=>({...p,type:v}))} opts={types}/>
            <Inp lbl="Contact Person" val={f.contactPerson} set={v => setF(p=>({...p,contactPerson:v}))}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Inp lbl="Phone" val={f.phone} set={v => setF(p=>({...p,phone:v}))} type="tel"/>
              <Inp lbl="Email" val={f.email} set={v => setF(p=>({...p,email:v}))} type="email"/>
            </div>
            <Inp lbl="Address" val={f.address} set={v => setF(p=>({...p,address:v}))}/>
            <Inp lbl="Payment Terms" val={f.paymentTerms} set={v => setF(p=>({...p,paymentTerms:v}))} ph="30 days"/>
            <Textarea lbl="Notes" val={f.notes} set={v => setF(p=>({...p,notes:v}))}/>
            <Btn ch={f.id?"Update Company":"Add Company"} onClick={save} full sz="lg"/>
          </>
        }/>
      </div>
    );
  }

  return (
    <div style={{paddingBottom:90}}>
      <div style={{padding:"14px"}}>
        <SectionHeader title="Companies & Suppliers" right={<>
          <ExportMenu
            onXLSX={() => xlsxExp(companies.map(c=>({Name:c.name,Type:c.type,Contact:c.contactPerson,Phone:c.phone,Status:c.active?"Active":"Inactive"})),"Companies","NE_Companies")}
            onPDF={() => pdfExp("Companies",[{h:"Name",k:"n"},{h:"Type",k:"t"},{h:"Contact",k:"c"}],companies.map(c=>({n:c.name,t:c.type,c:c.contactPerson})),"NE_Companies")}
          />
          {canEdit && <Btn ch={<><Ic n="plus" s={14} c="#fff"/>Add</>} onClick={() => openForm()} sz="sm"/>}
        </>}/>
        <div style={{position:"relative",marginBottom:14}}>
          <div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}><Ic n="srch" s={13} c={C.muted}/></div>
          <input value={srch} onChange={e => setSrch(e.target.value)} placeholder="Search companies..."
            style={{width:"100%",background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"8px 10px 8px 30px",color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
        </div>
        {filtered.length===0 && <div style={{textAlign:"center",color:C.muted,padding:40}}><Ic n="bldg" s={44} c={C.muted}/><p style={{marginTop:12}}>No companies yet</p></div>}
        {filtered.map((co,i) => (
          <div key={co.id} className="fadeUp" onClick={() => setDetail(co)}
            style={{background:C.card,borderRadius:12,padding:13,marginBottom:8,border:"1px solid "+C.border,cursor:"pointer",opacity:co.active?1:0.55,animationDelay:i*0.03+"s"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:40,height:40,borderRadius:10,background:(tc[co.type]||C.muted)+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Ic n="bldg" s={20} c={tc[co.type]||C.muted}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,marginBottom:2}}>{co.name}</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  <Badge ch={co.type} col={tc[co.type]||C.muted}/>
                  <span style={{fontSize:11,color:C.muted}}>{coProd(co).length} products</span>
                </div>
              </div>
              <Ic n="back" s={16} c={C.muted}/>
            </div>
          </div>
        ))}
      </div>
      <Modal open={showForm} onClose={() => setShowForm(false)} title="Add Company" ch={
        <>
          <Inp lbl="Company Name" val={f.name} set={v => setF(p=>({...p,name:v}))} req/>
          <Sel lbl="Type" val={f.type} set={v => setF(p=>({...p,type:v}))} opts={types}/>
          <Inp lbl="Contact Person" val={f.contactPerson} set={v => setF(p=>({...p,contactPerson:v}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp lbl="Phone" val={f.phone} set={v => setF(p=>({...p,phone:v}))} type="tel"/>
            <Inp lbl="Email" val={f.email} set={v => setF(p=>({...p,email:v}))} type="email"/>
          </div>
          <Inp lbl="Address" val={f.address} set={v => setF(p=>({...p,address:v}))}/>
          <Inp lbl="Payment Terms" val={f.paymentTerms} set={v => setF(p=>({...p,paymentTerms:v}))} ph="30 days"/>
          <Textarea lbl="Notes" val={f.notes} set={v => setF(p=>({...p,notes:v}))}/>
          <Btn ch="Add Company" onClick={save} full sz="lg"/>
        </>
      }/>
    </div>
  );
}

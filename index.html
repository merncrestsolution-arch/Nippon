<meta name="theme-color" content="#CC0000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#CC0000;border-radius:2px}
select option{background:#1a1a1a;color:#f0f0f0}
input[type=number]::-webkit-inner-spin-button{opacity:0.4}
@media print{body *{visibility:hidden}#bill-print,#bill-print *{visibility:visible}#bill-print{position:fixed;top:0;left:0;width:100%;background:#fff;color:#000;padding:20px;font-family:Arial,sans-serif;font-size:12px}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(0.82)}70%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 18px #CC000066}50%{box-shadow:0 0 40px #CC0000bb}}
@keyframes bulbPulse{0%,100%{filter:brightness(1) drop-shadow(0 0 6px #FFD70099)}50%{filter:brightness(1.18) drop-shadow(0 0 22px #FFD700ff)}}
@keyframes badgePop{0%{transform:scale(0)}60%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.anim-fadeUp{animation:fadeUp .32s ease both}
.anim-fadeIn{animation:fadeIn .22s ease both}
.anim-slideDown{animation:slideDown .3s ease both}
.anim-popIn{animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both}
.anim-float{animation:float 3s ease-in-out infinite}
.logo-glow{animation:glow 2.8s ease-in-out infinite;border-radius:20px}
.bulb-anim{animation:bulbPulse 2.2s ease-in-out infinite}
.cart-badge{animation:badgePop .3s cubic-bezier(.34,1.56,.64,1) both}
.card-tap{transition:transform .14s,box-shadow .14s}
.card-tap:active{transform:scale(0.97)}
</style>

let _sb=null;
const getSB=()=>{
  if(_sb)return _sb;
  const cfg=getCfg();
  if(!cfg)return null;
  _sb=supabase.createClient(cfg.url,cfg.key);
  return _sb;
};
const DB={
  getAll:async store=>{
    const sb=getSB();if(!sb)return[];
    const{data,error}=await sb.from(store).select('id,data');
    if(error)throw error;
    return(data||[]).map(r=>({...r.data,id:r.id}));
  },
  put:async(store,item)=>{
    const sb=getSB();if(!sb)throw new Error('No DB');
    const{error}=await sb.from(store).upsert({id:item.id,data:item},{onConflict:'id'});
    if(error)throw error;
  },
  del:async(store,id)=>{
    const sb=getSB();if(!sb)throw new Error('No DB');
    const{error}=await sb.from(store).delete().eq('id',id);
    if(error)throw error;
  },
  seed:async(store,items)=>{
    const sb=getSB();if(!sb)return;
    const{count}=await sb.from(store).select('id',{count:'exact',head:true});
    if(count===0&&items.length>0){
      for(const it of items)await DB.put(store,it);
    }
  }
};

CREATE TABLE IF NOT EXISTS products (id TEXT PRIMARY KEY, data JSONB);
CREATE TABLE IF NOT EXISTS sales (id TEXT PRIMARY KEY, data JSONB);
CREATE TABLE IF NOT EXISTS cheques (id TEXT PRIMARY KEY, data JSONB);
CREATE TABLE IF NOT EXISTS companies (id TEXT PRIMARY KEY, data JSONB);
ALTER TABLE users ENABLE ROW LEVEL SECURITY;
ALTER TABLE products ENABLE ROW LEVEL SECURITY;
ALTER TABLE sales ENABLE ROW LEVEL SECURITY;
ALTER TABLE cheques ENABLE ROW LEVEL SECURITY;
ALTER TABLE companies ENABLE ROW LEVEL SECURITY;
CREATE POLICY "allow_all" ON users FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON products FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON sales FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON cheques FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON companies FOR ALL USING (true) WITH CHECK (true);`;

function SetupScreen({onConnected}) {
  const [step,setStep]=useState(1);
  const [url,setUrl]=useState('');
  const [key,setKey]=useState('');
  const [err,setErr]=useState('');
  const [testing,setTesting]=useState(false);
  const [copied,setCopied]=useState(false);
  const copySQL=()=>{navigator.clipboard.writeText(SQL).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};
  const connect=async()=>{
    if(!url.trim()||!key.trim()){setErr('Both URL and key are required.');return;}
    setTesting(true);setErr('');
    try{
      const sb=supabase.createClient(url.trim(),key.trim());
      const{error}=await sb.from('users').select('id').limit(1);
      if(error)throw error;
      setCfg({url:url.trim(),key:key.trim()});
      _sb=null;
      onConnected();
    }catch(e){setErr('Connection failed: '+e.message);}
    setTesting(false);
  };
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,gap:20}}>
      <div className="anim-float"><NipponLogo size={80} glow={true}/></div>
      <h1 style={{fontSize:20,fontWeight:900,letterSpacing:1,color:C.red}}>NIPPON ELECTRICALS</h1>
      <p style={{fontSize:12,color:C.muted,textAlign:'center'}}>First-time Setup — Connect your Supabase database</p>
      <div style={{width:'100%',maxWidth:440}}>
        {step===1&&(
          <Card st={{marginBottom:14}}>
            <h2 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Step 1 — Database Setup</h2>
            {[['1','Go to supabase.com → create free account'],['2','New Project → name "nippon-pos" → Create'],['3','SQL Editor → New Query → paste SQL below → Run']].map(([n,t])=>(
              <div key={n} style={{display:'flex',gap:10,marginBottom:10}}>
                <div style={{width:20,height:20,borderRadius:'50%',background:C.red,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#fff',flexShrink:0}}>{n}</div>
                <p style={{fontSize:12,lineHeight:1.5}}>{t}</p>
              </div>
            ))}
            <div style={{background:'#0d1117',borderRadius:8,padding:12,border:`1px solid ${C.border}`,marginTop:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:10,color:C.muted}}>SQL Setup Script</span>
                <button onClick={copySQL} style={{background:copied?C.green:C.border,border:'none',borderRadius:5,padding:'3px 9px',color:'#fff',fontSize:10,cursor:'pointer',fontWeight:700}}>{copied?'✓ Copied':'Copy SQL'}</button>
              </div>
              <pre style={{fontSize:8,color:'#7ee787',fontFamily:"'Space Mono'",overflow:'auto',maxHeight:120,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{SQL}</pre>
            </div>
          </Card>
        )}
        {step===1&&<Btn ch="SQL is done — Next Step →" onClick={()=>setStep(2)} full sz="lg"/>}
        {step===2&&(
          <>
            <Card st={{marginBottom:14}}>
              <h2 style={{fontSize:14,fontWeight:700,marginBottom:4}}>Step 2 — Enter Credentials</h2>
              <p style={{fontSize:11,color:C.muted,marginBottom:14}}>Supabase → Project Settings → API</p>
              <Inp lbl="Project URL" val={url} set={setUrl} ph="https://xxxxxxxxxxxx.supabase.co" req/>
              <Inp lbl="Anon / Public Key" val={key} set={setKey} ph="eyJhbGci…" req/>
              {err&&<div style={{background:'#3a1a1a',borderRadius:8,padding:'9px 12px',fontSize:12,color:'#ff8888'}}>{err}</div>}
            </Card>
            <div style={{display:'flex',gap:10}}>
              <Btn ch="← Back" v="dk" onClick={()=>setStep(1)} sz="lg"/>
              <Btn ch={testing?'Connecting…':'Connect & Start'} onClick={connect} dis={testing} st={{flex:1}} sz="lg"/>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── POS PAGE ──────────────────────────────────────────────────────────────────
function POSPage() {
  const {products,user,onSaleComplete,toast2}=useApp();
  const [cart,setCart]=useState([]);
  const [srch,setSrch]=useState('');
  const [cust,setCust]=useState('Walk-in Customer');
  const [pay,setPay]=useState('cash');
  const [disc,setDisc]=useState('');
  const [paid,setPaid]=useState('');
  const [tab,setTab]=useState('grid');
  const [pcat,setPcat]=useState('All');
  const [chqNo,setChqNo]=useState('');
  const [chqBk,setChqBk]=useState('');
  const [busy,setBusy]=useState(false);
  const [flashId,setFlashId]=useState(null);
  const [badgeK,setBadgeK]=useState(0);

  const cats=['All',...CATS];
  const filtered=products.filter(p=>p.active&&(pcat==='All'||p.category===pcat)&&p.name.toLowerCase().includes(srch.toLowerCase()));

  const addToCart=(pid,name,price,sku='',tax=0,stock=999)=>{
    if(stock<=0){toast2('Out of stock!','error');return;}
    setCart(prev=>{
      const ex=prev.find(i=>i.pid===pid);
      if(ex){if(ex.qty>=stock){toast2('Max stock reached!','error');return prev;}return prev.map(i=>i.pid===pid?{...i,qty:i.qty+1}:i);}
      return[...prev,{pid,name,price,qty:1,tax,sku}];
    });
    setBadgeK(k=>k+1);
    toast2(name.slice(0,25)+' added ✓','success');
  };
  const addProduct=p=>{setFlashId(p.id);setTimeout(()=>setFlashId(null),380);addToCart(p.id,p.name,p.price,p.sku||'',p.taxRate||0,p.stock);};
  const addCatalogItem=item=>addToCart(item.id,item.name,Math.ceil(item.cost*1.25/10)*10,item.id,0,999);
  const updQty=(pid,d)=>setCart(prev=>prev.map(i=>i.pid===pid?{...i,qty:Math.max(1,i.qty+d)}:i));
  const rem=pid=>setCart(prev=>prev.filter(i=>i.pid!==pid));
  const newBill=()=>{if(cart.length===0||confirm('Clear cart and start new bill?')){setCart([]);setDisc('');setPaid('');setChqNo('');setChqBk('');setCust('Walk-in Customer');setPay('cash');setTab('grid');}};

  const discN=Math.max(0,parseFloat(disc)||0);
  const sub=cart.reduce((a,i)=>a+i.price*i.qty,0);
  const tax=cart.reduce((a,i)=>a+(i.price*i.qty*(i.tax||0)/100),0);
  const total=Math.max(0,sub+tax-discN);
  const chng=parseFloat(paid||0)-total;
  const cnt=cart.reduce((a,i)=>a+i.qty,0);

  const checkout=async()=>{
    if(!cart.length){toast2('Cart is empty!','error');return;}
    if(pay==='cash'&&parseFloat(paid||0)<total){toast2('Insufficient payment!','error');return;}
    if(pay==='cheque'&&(!chqNo||!chqBk)){toast2('Enter cheque details!','error');return;}
    setBusy(true);
    try{
      const inv={id:uid(),date:today(),customer:cust.trim()||'Walk-in Customer',items:[...cart],subtotal:sub,taxAmount:tax,total,discount:discN,paid:parseFloat(paid||total),change:Math.max(0,chng),paymentMode:pay,cashier:user.username,status:'completed',invoiceNo:'NE-'+today().replace(/-/g,'').slice(2)+'-'+String(uid()).slice(-4),chqDet:pay==='cheque'?{no:chqNo,bank:chqBk}:null,createdAt:new Date().toISOString()};
      await onSaleComplete(inv);
    }catch(e){toast2('Checkout failed: '+e.message,'error');setBusy(false);}
  };

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',paddingBottom:70}}>
      {/* Header */}
      <div style={{background:C.card,padding:'9px 12px',borderBottom:`1px solid ${C.border}`,display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
        <NipponLogo size={30}/>
        <div style={{flex:1,position:'relative'}}>
          <div style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)'}}><Ic n="srch" s={13} c={C.muted}/></div>
          <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Search products…"
            style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'7px 10px 7px 29px',color:C.text,fontSize:12,fontFamily:"'Noto Sans JP'",outline:'none'}}
            onFocus={e=>e.target.style.borderColor=C.red} onBlur={e=>e.target.style.borderColor=C.border}/>
        </div>
        {/* NEW BILL BUTTON */}
        <button onClick={newBill} style={{background:'#1a3a1a',border:`1px solid ${C.green}55`,borderRadius:8,padding:'7px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:4,color:C.green,fontSize:11,fontWeight:700,flexShrink:0,whiteSpace:'nowrap'}}>
          <Ic n="add" s={14} c={C.green}/>New
        </button>
        {/* CART BUTTON */}
        <button onClick={()=>setTab(t=>t==='cart'?'grid':t==='catalog'?'grid':'cart')}
          style={{position:'relative',background:tab==='cart'?C.red:'#333',border:'none',borderRadius:8,padding:'7px 10px',cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',transition:'background 0.2s'}}>
          <Ic n="cart" s={17} c="#fff"/>
          {cnt>0&&<span key={badgeK} className="cart-badge" style={{background:'#fff',color:C.red,borderRadius:'50%',width:16,height:16,fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',position:'absolute',top:-5,right:-5}}>{cnt}</span>}
        </button>
      </div>

      {/* 3-TAB BAR */}
      <div style={{display:'flex',background:'#141414',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        {[['grid','box','My Products'],['catalog','tag','Catalog'],['cart','cart',cnt>0?`Cart (${cnt})`:'Cart']].map(([v,ic,lb])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:'9px 4px',background:'none',border:'none',cursor:'pointer',color:tab===v?C.red:C.muted,fontWeight:tab===v?700:400,fontSize:11,borderBottom:tab===v?`2px solid ${C.red}`:'2px solid transparent',display:'flex',alignItems:'center',justifyContent:'center',gap:5,transition:'color 0.2s'}}>
            <Ic n={ic} s={13} c={tab===v?C.red:C.muted}/>{lb}
          </button>
        ))}
      </div>

      {/* MY PRODUCTS TAB */}
      {tab==='grid'&&(
        <div style={{flex:1,overflow:'auto'}}>
          <div style={{display:'flex',gap:5,padding:'8px 10px',overflow:'auto',borderBottom:`1px solid ${C.border}`}}>
            {cats.map(c=>(
              <button key={c} onClick={()=>setPcat(c)} style={{background:pcat===c?C.red:'#333',border:'none',borderRadius:20,padding:'4px 12px',color:'#fff',fontSize:9,cursor:'pointer',whiteSpace:'nowrap',fontWeight:pcat===c?700:400,flexShrink:0,transition:'background 0.15s'}}>
                {c}
              </button>
            ))}
          </div>
          <div style={{padding:'8px 10px'}}>
            {filtered.length===0&&<div style={{textAlign:'center',color:C.muted,padding:32,fontSize:13}}>No products found.<br/>Add products in the Products tab or browse the Catalog tab.</div>}
            {filtered.map((p,i)=>(
              <div key={p.id} className="card-tap" onClick={()=>addProduct(p)}
                style={{background:flashId===p.id?'#3a0a0a':C.card,borderRadius:10,padding:'11px 13px',marginBottom:7,border:`1px solid ${flashId===p.id?C.red:C.border}`,display:'flex',alignItems:'center',gap:10,cursor:'pointer',transition:'background 0.15s,border-color 0.15s',animationDelay:`${Math.min(i,20)*0.03}s`}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{p.name}</div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{fontSize:12,fontFamily:"'Space Mono'",fontWeight:700,color:C.green}}>{lkr(p.price)}</span>
                    <Badge ch={p.category} col={C.muted}/>
                    {p.stock<=p.minStock&&<Badge ch="Low Stock" col={C.orange}/>}
                  </div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>Stock: {p.stock} {p.unit||'pcs'}</div>
                </div>
                {cart.find(c2=>c2.pid===p.id)&&(
                  <span style={{background:C.red+'22',color:C.red,borderRadius:6,padding:'3px 8px',fontSize:11,fontWeight:700}}>×{cart.find(c2=>c2.pid===p.id).qty}</span>
                )}
                <div style={{background:C.red,borderRadius:8,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <Ic n="add" s={16} c="#fff"/>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* CATALOG TAB IN POS */}
      {tab==='catalog'&&(
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <CatalogBrowser onAdd={item=>{addCatalogItem(item);}} addLabel="+"/>
        </div>
      )}

      {/* CART TAB */}
      {tab==='cart'&&(
        <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column'}}>
          <div style={{flex:1,overflow:'auto',padding:12}}>
            <Inp lbl="Customer Name" val={cust} set={setCust} ph="Customer name"/>
            {!cart.length?(
              <div style={{textAlign:'center',color:C.muted,padding:40}}>
                <Ic n="cart" s={40} c={C.muted}/>
                <p style={{marginTop:12,fontSize:13}}>Cart is empty</p>
                <Btn ch="Browse Products" v="out" onClick={()=>setTab('grid')} st={{marginTop:14}}/>
              </div>
            ):cart.map((item,i)=>(
              <div key={item.pid} className="anim-fadeUp" style={{background:C.card,borderRadius:11,padding:12,marginBottom:8,border:`1px solid ${C.border}`,animationDelay:`${i*0.04}s`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{item.name}</div><div style={{fontSize:11,color:C.muted}}>{lkr(item.price)}{item.tax>0?` +${item.tax}%`:''}</div></div>
                  <button onClick={()=>rem(item.pid)} style={{background:'#3a1a1a',border:'none',borderRadius:6,padding:'5px 7px',cursor:'pointer'}}><Ic n="del" s={13} c={C.red}/></button>
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{display:'flex',alignItems:'center',background:'#242424',borderRadius:9,overflow:'hidden'}}>
                    <button onClick={()=>updQty(item.pid,-1)} style={{background:'none',border:'none',padding:'6px 12px',cursor:'pointer',color:C.red,fontSize:17,fontWeight:700}}>−</button>
                    <span style={{fontFamily:"'Space Mono'",fontWeight:700,minWidth:22,textAlign:'center',fontSize:14}}>{item.qty}</span>
                    <button onClick={()=>updQty(item.pid,1)} style={{background:'none',border:'none',padding:'6px 12px',cursor:'pointer',color:C.green,fontSize:17,fontWeight:700}}>+</button>
                  </div>
                  <div style={{fontFamily:"'Space Mono'",fontWeight:700,fontSize:14}}>{lkr(item.price*item.qty)}</div>
                </div>
              </div>
            ))}
          </div>
          {cart.length>0&&(
            <div style={{background:'#141414',padding:14,borderTop:`1px solid ${C.border}`,flexShrink:0}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:13}}><span style={{color:C.muted}}>Subtotal</span><span style={{fontFamily:"'Space Mono'"}}>{lkr(sub)}</span></div>
              {tax>0&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:13}}><span style={{color:C.muted}}>Tax</span><span style={{fontFamily:"'Space Mono'"}}>{lkr(tax)}</span></div>}
              <input value={disc} onChange={e=>setDisc(e.target.value)} placeholder="Discount (Rs.)" type="number" min="0"
                style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 12px',color:C.text,fontSize:13,marginBottom:8,fontFamily:"'Noto Sans JP'",outline:'none'}}/>
              <div style={{display:'flex',justifyContent:'space-between',borderTop:`1px solid ${C.border}`,paddingTop:8,marginBottom:10}}>
                <span style={{fontWeight:700,fontSize:15}}>TOTAL</span>
                <span style={{fontFamily:"'Space Mono'",fontWeight:900,fontSize:20,color:C.red}}>{lkr(total)}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:10}}>
                {['cash','card','upi','cheque'].map(m=>(
                  <button key={m} onClick={()=>setPay(m)} style={{background:pay===m?C.red:'#333',border:'none',borderRadius:8,padding:'7px 4px',color:'#fff',fontSize:10,cursor:'pointer',fontWeight:pay===m?700:400,textTransform:'uppercase',transition:'all 0.15s',transform:pay===m?'scale(1.05)':'scale(1)'}}>
                    {m}
                  </button>
                ))}
              </div>
              {pay==='cash'&&(
                <div style={{marginBottom:10}}>
                  <input value={paid} onChange={e=>setPaid(e.target.value)} placeholder="Amount paid (Rs.)" type="number"
                    style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:14,fontFamily:"'Noto Sans JP'",outline:'none',marginBottom:4}}/>
                  {paid&&<div style={{fontSize:12,color:chng>=0?C.green:C.red,fontWeight:700}}>Change: {lkr(Math.abs(chng))}{chng<0?' ⚠ Short':''}</div>}
                </div>
              )}
              {pay==='cheque'&&(
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
                  <input value={chqNo} onChange={e=>setChqNo(e.target.value)} placeholder="Cheque No."
                    style={{background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 10px',color:C.text,fontSize:12,outline:'none'}}/>
                  <select value={chqBk} onChange={e=>setChqBk(e.target.value)}
                    style={{background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 10px',color:chqBk?C.text:C.muted,fontSize:12,outline:'none'}}>
                    <option value="">Select Bank…</option>
                    {SL_BANKS.map(b=><option key={b} value={b}>{b}</option>)}
                  </select>
                </div>
              )}
              <div style={{display:'flex',gap:8}}>
                <Btn ch="Clear" v="dk" onClick={newBill} st={{flex:1}}/>
                <Btn ch={busy?<span style={{animation:'spin 0.6s linear infinite',display:'inline-block'}}>↻</span>:<><Ic n="ok" s={14} c="#fff"/>Checkout</>}
                  onClick={checkout} dis={busy} st={{flex:2,background:C.green,border:'none'}}/>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── BILL VIEW ─────────────────────────────────────────────────────────────────
function BillView({sale,onNewSale}) {
  const print=()=>{
    const el=document.getElementById('bill-print');
    el.style.display='block';
    el.innerHTML=`<div style="text-align:center;margin-bottom:12px"><b style="font-size:16px">NIPPON ELECTRICALS</b><br/><small>Smart POS System · Sri Lanka</small><hr/></div><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span>Invoice:</span><b>${sale.invoiceNo}</b></div><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span>Date:</span><span>${sale.date}</span></div><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span>Customer:</span><span>${sale.customer}</span></div><hr/>${sale.items.map(i=>`<div style="display:flex;justify-content:space-between;margin:3px 0"><span>${i.name} ×${i.qty}</span><span>Rs.${(i.price*i.qty).toFixed(2)}</span></div>`).join('')}<hr/><div style="display:flex;justify-content:space-between"><span>Subtotal</span><span>Rs.${sale.subtotal.toFixed(2)}</span></div>${sale.discount>0?`<div style="display:flex;justify-content:space-between"><span>Discount</span><span>-Rs.${sale.discount.toFixed(2)}</span></div>`:''}<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:bold;margin-top:6px;border-top:1px solid #000;padding-top:6px"><span>TOTAL</span><span>Rs.${sale.total.toFixed(2)}</span></div><hr/><div style="display:flex;justify-content:space-between"><span>Payment</span><span>${sale.paymentMode.toUpperCase()}</span></div>${sale.paymentMode==='cash'&&sale.change>0?`<div style="display:flex;justify-content:space-between"><span>Change</span><span>Rs.${sale.change.toFixed(2)}</span></div>`:''}<div style="text-align:center;margin-top:14px;font-size:10px">Thank you for shopping with Nippon Electricals!<br/>No exchange after 7 days.</div>`;
    window.print();
    setTimeout(()=>el.style.display='none',1000);
  };
  return(
    <div style={{padding:'20px 14px 100px'}}>
      <div className="anim-popIn" style={{textAlign:'center',marginBottom:24}}>
        <div style={{width:64,height:64,borderRadius:'50%',background:C.green+'22',border:`2px solid ${C.green}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
          <Ic n="ok" s={30} c={C.green}/>
        </div>
        <h2 style={{fontSize:18,fontWeight:900,color:C.green}}>Sale Complete!</h2>
        <p style={{fontSize:12,color:C.muted,marginTop:4}}>{sale.invoiceNo}</p>
      </div>
      <Card st={{marginBottom:12,borderTop:`3px solid ${C.red}`}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontSize:11,color:C.muted}}>Customer</span><span style={{fontWeight:700}}>{sale.customer}</span>
        </div>
        {sale.items.map((item,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{fontSize:13}}>{item.name} <span style={{color:C.muted}}>×{item.qty}</span></span>
            <span style={{fontFamily:"'Space Mono'",fontSize:13}}>{lkr(item.price*item.qty)}</span>
          </div>
        ))}
        <div style={{borderTop:`1px solid ${C.border}`,marginTop:10,paddingTop:10}}>
          {sale.discount>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.muted,marginBottom:4}}><span>Discount</span><span>−{lkr(sale.discount)}</span></div>}
          <div style={{display:'flex',justifyContent:'space-between',fontWeight:900,fontSize:18,marginTop:6}}>
            <span>TOTAL</span><span style={{fontFamily:"'Space Mono'",color:C.red}}>{lkr(sale.total)}</span>
          </div>
          {sale.paymentMode==='cash'&&sale.change>0&&(
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:C.green,marginTop:6}}>
              <span>Change</span><span style={{fontFamily:"'Space Mono'"}}>{lkr(sale.change)}</span>
            </div>
          )}
          <div style={{marginTop:10}}><Badge ch={sale.paymentMode.toUpperCase()} col={C.green}/></div>
        </div>
      </Card>
      <div style={{display:'flex',gap:10}}>
        <Btn ch={<><Ic n="print" s={14} c="#fff"/>Print Bill</>} onClick={print} st={{flex:1}}/>
        <Btn ch={<><Ic n="add" s={14} c="#fff"/>New Sale</>} onClick={onNewSale} st={{flex:1,background:C.green,border:'none'}}/>
      </div>
    </div>
  );
}

// ── PRODUCTS PAGE ─────────────────────────────────────────────────────────────
function ProductsPage() {
  const {products,upsertProduct,deleteProduct,toast2,user,companies}=useApp();
  const [srch,setSrch]=useState('');
  const [cat,setCat]=useState('All');
  const [pgTab,setPgTab]=useState('mine');
  const [showForm,setShowForm]=useState(false);
  const [ed,setEd]=useState(null);
  const blank={name:'',sku:'',category:'Lighting',price:'',costPrice:'',stock:'',unit:'pcs',taxRate:'0',minStock:'10',active:true,supplierName:''};
  const [f,setF]=useState(blank);
  const [saving,setSaving]=useState(false);
  const canEdit=user.role==='admin'||user.role==='manager';
  const cats=['All',...CATS];
  const list=products.filter(p=>(cat==='All'||p.category===cat)&&(p.name.toLowerCase().includes(srch.toLowerCase())||String(p.sku||'').toLowerCase().includes(srch.toLowerCase())));

  const openAdd=()=>{setEd(null);setF(blank);setShowForm(true);};
  const openEdit=p=>{setEd(p);setF({...blank,...p,price:String(p.price||''),costPrice:String(p.costPrice||''),stock:String(p.stock||''),taxRate:String(p.taxRate||'0'),minStock:String(p.minStock||'10')});setShowForm(true);};
  const openAddFromCatalog=ci=>{setEd(null);setF({...blank,name:ci.name,category:CATS.find(c=>c.toLowerCase()===ci.cat.toLowerCase())||'Accessories',costPrice:String(ci.cost),price:String(Math.ceil(ci.cost*1.25/10)*10),unit:ci.unit,supplierName:ci.sup});setShowForm(true);setPgTab('mine');};

  const save=async()=>{
    if(!f.name.trim()){toast2('Product name required!','error');return;}
    if(!f.price||isNaN(parseFloat(f.price))){toast2('Valid sale price required!','error');return;}
    if(!f.stock||isNaN(parseInt(f.stock))){toast2('Stock quantity required!','error');return;}
    setSaving(true);
    try{
      const p={...f,id:ed?ed.id:uid(),name:f.name.trim(),price:parseFloat(f.price),costPrice:parseFloat(f.costPrice||0),stock:parseInt(f.stock),taxRate:parseFloat(f.taxRate||0),minStock:parseInt(f.minStock||10),active:f.active!==false};
      await upsertProduct(p);
      toast2(ed?'Product updated!':'Product added!','success');
      setShowForm(false);
    }catch(e){toast2('Save failed: '+e.message,'error');}
    setSaving(false);
  };
  const toggle=async p=>{await upsertProduct({...p,active:!p.active});toast2(p.active?'Deactivated':'Activated','info');};
  const del=async id=>{if(confirm('Delete this product?')){await deleteProduct(id);toast2('Deleted','info');}};

  if(showForm) return(
    <div style={{paddingBottom:90}}>
      <div style={{background:C.card,padding:'12px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
        <button onClick={()=>setShowForm(false)} style={{background:'#333',border:'none',borderRadius:8,padding:'7px 12px',cursor:'pointer',color:C.text,fontSize:12,fontWeight:700}}>← Back</button>
        <h2 style={{fontSize:14,fontWeight:900,flex:1}}>{ed?'Edit Product':'Add Product'}</h2>
        <Btn ch={saving?'Saving…':'Save'} onClick={save} dis={saving} sz="sm"/>
      </div>
      <div style={{padding:14}}>
        <Inp lbl="Product Name" val={f.name} set={v=>setF(p=>({...p,name:v}))} ph="e.g. MCB 16A 1P" req/>
        <Inp lbl="SKU / Barcode" val={f.sku} set={v=>setF(p=>({...p,sku:v}))} ph="Optional"/>
        <div style={{marginBottom:12}}>
          <label style={{display:'block',fontSize:10,color:C.muted,letterSpacing:0.5,textTransform:'uppercase',marginBottom:5}}>Category</label>
          <select value={f.category} onChange={e=>setF(p=>({...p,category:e.target.value}))}
            style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,outline:'none'}}>
            {CATS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <Inp lbl="Sale Price (Rs.)" val={f.price} set={v=>setF(p=>({...p,price:v}))} type="number" req/>
          <Inp lbl="Cost Price (Rs.)" val={f.costPrice} set={v=>setF(p=>({...p,costPrice:v}))} type="number"/>
          <Inp lbl="Stock Qty" val={f.stock} set={v=>setF(p=>({...p,stock:v}))} type="number" req/>
          <Inp lbl="Min Stock Alert" val={f.minStock} set={v=>setF(p=>({...p,minStock:v}))} type="number"/>
        </div>
        <Inp lbl="Unit" val={f.unit} set={v=>setF(p=>({...p,unit:v}))} ph="pcs / roll / m"/>
        <Inp lbl="Supplier Name" val={f.supplierName} set={v=>setF(p=>({...p,supplierName:v}))} ph="e.g. Kevilton"/>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
          <label style={{fontSize:12,color:C.text}}>Active</label>
          <button onClick={()=>setF(p=>({...p,active:!p.active}))} style={{width:42,height:22,borderRadius:11,background:f.active?C.green:'#444',border:'none',cursor:'pointer',position:'relative',transition:'background 0.2s'}}>
            <div style={{width:18,height:18,borderRadius:'50%',background:'#fff',position:'absolute',top:2,left:f.active?22:2,transition:'left 0.2s'}}/>
          </button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{paddingBottom:90,display:'flex',flexDirection:'column',height:'100vh'}}>
      {/* Tab bar */}
      <div style={{display:'flex',background:'#0f0f0f',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        {[['mine','box',`My Products (${products.length})`],['catalog','tag','Supplier Catalog']].map(([v,ic,lb])=>(
          <button key={v} onClick={()=>setPgTab(v)} style={{flex:1,padding:'11px 4px',background:'none',border:'none',cursor:'pointer',color:pgTab===v?C.red:C.muted,fontWeight:pgTab===v?700:400,fontSize:12,borderBottom:pgTab===v?`2px solid ${C.red}`:'2px solid transparent',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
            <Ic n={ic} s={13} c={pgTab===v?C.red:C.muted}/>{lb}
          </button>
        ))}
      </div>

      {/* SUPPLIER CATALOG TAB */}
      {pgTab==='catalog'&&(
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <CatalogBrowser onAdd={openAddFromCatalog} addLabel="+ Add"/>
        </div>
      )}

      {/* MY PRODUCTS TAB */}
      {pgTab==='mine'&&(
        <div style={{flex:1,overflow:'auto',padding:14}}>
          <SectionHeader title="My Products" right={canEdit&&<Btn ch={<><Ic n="add" s={13} c="#fff"/>Add Product</>} onClick={openAdd} sz="sm"/>}/>
          {/* Search */}
          <div style={{position:'relative',marginBottom:10}}>
            <div style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)'}}><Ic n="srch" s={13} c={C.muted}/></div>
            <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Search products…"
              style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 10px 8px 28px',color:C.text,fontSize:13,fontFamily:"'Noto Sans JP'",outline:'none'}}
              onFocus={e=>e.target.style.borderColor=C.red} onBlur={e=>e.target.style.borderColor=C.border}/>
          </div>
          {/* Category filter */}
          <div style={{display:'flex',gap:5,overflow:'auto',marginBottom:12}}>
            {cats.map(c=>(
              <button key={c} onClick={()=>setCat(c)} style={{background:cat===c?C.red:'#333',border:'none',borderRadius:14,padding:'4px 10px',color:'#fff',fontSize:9,cursor:'pointer',whiteSpace:'nowrap',fontWeight:cat===c?700:400,flexShrink:0}}>{c}</button>
            ))}
          </div>
          {list.length===0&&(
            <div style={{textAlign:'center',color:C.muted,padding:40}}>
              <Ic n="box" s={44} c={C.muted}/>
              <p style={{marginTop:12,fontSize:13}}>No products yet.</p>
              {canEdit&&<Btn ch="Add First Product" v="out" onClick={openAdd} st={{marginTop:14}}/>}
              <Btn ch="Browse Supplier Catalog" v="dk" onClick={()=>setPgTab('catalog')} st={{marginTop:10}}/>
            </div>
          )}
          {list.map((p,i)=>(
            <div key={p.id} className="anim-fadeUp" style={{background:C.card,borderRadius:10,padding:12,marginBottom:8,border:`1px solid ${C.border}`,animationDelay:`${Math.min(i,20)*0.03}s`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4}}>
                    <span style={{fontSize:13,fontWeight:700}}>{p.name}</span>
                    {!p.active&&<Badge ch="Inactive" col={C.muted}/>}
                    {p.stock<=p.minStock&&<Badge ch="Low" col={C.orange}/>}
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontSize:13,fontFamily:"'Space Mono'",fontWeight:700,color:C.green}}>{lkr(p.price)}</span>
                    <Badge ch={p.category} col={C.muted}/>
                    <span style={{fontSize:10,color:C.muted}}>Stock: {p.stock}</span>
                    {p.supplierName&&<Badge ch={p.supplierName} col={SUP_COLORS[p.supplierName]||C.muted}/>}
                  </div>
                </div>
                {canEdit&&(
                  <div style={{display:'flex',gap:6,flexShrink:0}}>
                    <button onClick={()=>toggle(p)} style={{background:'#242424',border:'none',borderRadius:7,padding:'6px 9px',cursor:'pointer'}}><Ic n={p.active?'ok':'warn'} s={13} c={p.active?C.green:C.muted}/></button>
                    <button onClick={()=>openEdit(p)} style={{background:'#242424',border:'none',borderRadius:7,padding:'6px 9px',cursor:'pointer'}}><Ic n="edit" s={13} c={C.blue}/></button>

  const {user,toast2}=useApp();

  const addItem=cat=>{
    const ex=items.find(i=>i.id===cat.id);
    if(ex){setItems(prev=>prev.map(i=>i.id===cat.id?{...i,qty:i.qty+1}:i));toast2(cat.name.slice(0,25)+' qty updated','success');return;}
    setItems(prev=>[...prev,{...cat,qty:1,sellPrice:Math.ceil(cat.cost*1.25/10)*10}]);

  const remItem=id=>setItems(prev=>prev.filter(i=>i.id!==id));
  const clearAll=()=>{if(confirm('Clear all items?'))setItems([]);};

  const discN=parseFloat(discount||0);

    const rows=items.map((item,n)=>`<tr style="border-bottom:1px solid #eee"><td style="padding:5px 3px;font-size:11px">${n+1}</td><td style="padding:5px 3px;font-size:11px">${item.name}</td><td style="padding:5px 3px;font-size:11px;text-align:center">${item.qty} ${item.unit}</td><td style="padding:5px 3px;font-size:11px;text-align:right">Rs.${item.sellPrice.toLocaleString()}</td><td style="padding:5px 3px;font-size:11px;text-align:right;font-weight:700">Rs.${(item.sellPrice*item.qty).toLocaleString()}</td></tr>`).join('');
    el.innerHTML=`<div style="font-family:Arial,sans-serif;max-width:700px;margin:0 auto;padding:20px"><div style="display:flex;justify-content:space-between;border-bottom:3px solid #CC0000;padding-bottom:12px;margin-bottom:14px"><div><div style="font-size:20px;font-weight:900;color:#CC0000">NIPPON ELECTRICALS</div><div style="font-size:10px;color:#666">Electrical Supplies · Sri Lanka</div></div><div style="text-align:right"><div style="font-size:16px;font-weight:700">QUOTATION</div><div style="font-size:10px">No: <b>${qNum}</b></div><div style="font-size:10px">Date: <b>${today()}</b></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;background:#f5f5f5;padding:10px;border-radius:4px"><div><div style="font-size:9px;color:#999;text-transform:uppercase;margin-bottom:3px">Bill To</div><div style="font-size:13px;font-weight:700">${cust}</div>${phone?`<div style="font-size:10px;color:#555">Tel: ${phone}</div>`:''} ${project?`<div style="font-size:10px;color:#555">Project: ${project}</div>`:''}</div><div style="text-align:right"><div style="font-size:9px;color:#999;text-transform:uppercase;margin-bottom:3px">Prepared By</div><div style="font-size:11px;font-weight:600">${user.name}</div><div style="font-size:10px;color:#777">Valid 30 days</div></div></div><table style="width:100%;border-collapse:collapse"><thead><tr style="background:#CC0000;color:#fff"><th style="padding:7px 3px;font-size:10px;text-align:left">#</th><th style="padding:7px 3px;font-size:10px;text-align:left">Description</th><th style="padding:7px 3px;font-size:10px;text-align:center">Qty</th><th style="padding:7px 3px;font-size:10px;text-align:right">Unit Price</th><th style="padding:7px 3px;font-size:10px;text-align:right">Total</th></tr></thead><tbody>${rows}</tbody></table><div style="margin-top:14px;display:flex;justify-content:flex-end"><div style="min-width:220px"><div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;font-size:11px"><span>Subtotal</span><span>Rs.${subtotal.toLocaleString()}</span></div>${discN>0?`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:11px;color:#CC0000"><span>Discount</span><span>-Rs.${discN.toLocaleString()}</span></div>`:''}<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:15px;font-weight:900;border-top:2px solid #CC0000;margin-top:4px"><span>TOTAL</span><span style="color:#CC0000">Rs.${totalAmt.toLocaleString()}</span></div></div></div><div style="margin-top:24px;font-size:9px;color:#aaa;text-align:center;border-top:1px solid #eee;padding-top:10px">All prices are MRP and subject to change. Thank you for choosing Nippon Electricals.</div></div>`;
    window.print();
    setTimeout(()=>el.style.display='none',1000);
  };

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',paddingBottom:70}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.red},#7A0000)`,padding:'10px 13px',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <NipponLogo size={30}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:14,color:'#fff'}}>Quotation Builder</div>
          <div style={{fontSize:9,color:'#ffcccc'}}>{qNum}</div>
        </div>
        <Btn ch={<><Ic n="print" s={13} c="#fff"/>Print</>} onClick={printQuotation} sz="sm" st={{background:'rgba(255,255,255,0.2)',border:'1px solid rgba(255,255,255,0.3)'}}/>
      </div>
      {/* 3 tabs */}
      <div style={{display:'flex',background:'#141414',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        {[['catalog','tag','Catalog'],['items','cart',items.length>0?`Items (${items.length})`:'Items'],['info','users','Customer']].map(([v,ic,lb])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:'9px 4px',background:'none',border:'none',cursor:'pointer',color:tab===v?C.red:C.muted,fontWeight:tab===v?700:400,fontSize:11,borderBottom:tab===v?`2px solid ${C.red}`:'2px solid transparent',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
            <Ic n={ic} s={13} c={tab===v?C.red:C.muted}/>{lb}
          </button>
        ))}
      </div>

      {/* CATALOG TAB */}
      {tab==='catalog'&&(
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <CatalogBrowser onAdd={addItem} addLabel={item=>items.find(i=>i.id===item.id)?String(items.find(i=>i.id===item.id).qty):'+'} showAddButton={true}/>
        </div>
      )}

      {/* ITEMS TAB */}
      {tab==='items'&&(
        <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column'}}>
          <div style={{flex:1,overflow:'auto',padding:'10px 12px'}}>
            {!items.length?(
              <div style={{textAlign:'center',color:C.muted,padding:48}}>
                <Ic n="cart" s={40} c={C.muted}/>
                <p style={{marginTop:12,fontSize:13}}>No items added yet</p>
                <Btn ch="Browse Catalog" v="out" onClick={()=>setTab('catalog')} st={{marginTop:14}}/>
              </div>
            ):items.map((item,i)=>{
              const col=SUP_COLORS[item.sup]||C.muted;
              return(
                <div key={item.id} className="anim-fadeUp" style={{background:C.card,borderRadius:10,padding:11,marginBottom:8,border:`1px solid ${C.border}`,animationDelay:`${i*0.04}s`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                    <div style={{flex:1,paddingRight:6}}>
                      <div style={{fontSize:12,fontWeight:700,lineHeight:1.3,marginBottom:2}}>{item.name}</div>
                      <span style={{background:col+'22',color:col,border:`1px solid ${col}44`,borderRadius:3,padding:'1px 6px',fontSize:8,fontWeight:700}}>{item.sup}</span>
                      <div style={{fontSize:10,color:C.muted,marginTop:2}}>Cost: Rs.{item.cost.toLocaleString()}</div>
                    </div>
                    <button onClick={()=>remItem(item.id)} style={{background:'#3a1a1a',border:'none',borderRadius:6,padding:'5px 7px',cursor:'pointer'}}><Ic n="del" s={12} c={C.red}/></button>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:8,alignItems:'center'}}>
                    <div style={{display:'flex',alignItems:'center',background:'#242424',borderRadius:8,overflow:'hidden'}}>
                      <button onClick={()=>updQty(item.id,-1)} style={{background:'none',border:'none',padding:'6px 10px',cursor:'pointer',color:C.red,fontSize:16,fontWeight:700}}>−</button>
                      <span style={{fontFamily:"'Space Mono'",fontWeight:700,fontSize:13,minWidth:20,textAlign:'center'}}>{item.qty}</span>
                      <button onClick={()=>updQty(item.id,1)} style={{background:'none',border:'none',padding:'6px 10px',cursor:'pointer',color:C.green,fontSize:16,fontWeight:700}}>+</button>
                    </div>
                    <div>
                      <div style={{fontSize:9,color:C.muted,marginBottom:2,textTransform:'uppercase'}}>Sell Price</div>
                      <input type="number" value={item.sellPrice} onChange={e=>updPrice(item.id,e.target.value)}
                        style={{width:'100%',background:'#1a1a00',border:`1.5px solid ${C.gold}66`,borderRadius:7,padding:'5px 8px',color:C.text,fontSize:13,fontFamily:"'Space Mono'",fontWeight:700,outline:'none'}}
                        onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.gold+'66'}/>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:9,color:C.muted,marginBottom:2}}>Total</div>
                      <div style={{fontFamily:"'Space Mono'",fontWeight:900,fontSize:13,color:C.red}}>Rs.{(item.sellPrice*item.qty).toLocaleString()}</div>
                    </div>
                  </div>
                  {item.cost>0&&<div style={{marginTop:5,fontSize:10,color:item.sellPrice>=item.cost?C.green:C.red}}>
                    Margin: {((item.sellPrice-item.cost)/item.cost*100).toFixed(0)}% · Rs.{((item.sellPrice-item.cost)*item.qty).toLocaleString()}
                  </div>}
                </div>
              );
            })}
          </div>
          {items.length>0&&(
            <div style={{background:'#141414',padding:14,borderTop:`1px solid ${C.border}`,flexShrink:0}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13}}><span style={{color:C.muted}}>Subtotal</span><span style={{fontFamily:"'Space Mono'",fontWeight:700}}>Rs.{subtotal.toLocaleString()}</span></div>
              <input value={discount} onChange={e=>setDiscount(e.target.value)} placeholder="Discount (Rs.)" type="number"
                style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 12px',color:C.text,fontSize:13,marginBottom:8,outline:'none'}}/>
              <div style={{display:'flex',justifyContent:'space-between',borderTop:`1px solid ${C.border}`,paddingTop:8,marginBottom:12}}>
                <span style={{fontWeight:700,fontSize:15}}>TOTAL</span>
                <span style={{fontFamily:"'Space Mono'",fontWeight:900,fontSize:20,color:C.red}}>Rs.{totalAmt.toLocaleString()}</span>
              </div>
              <div style={{display:'flex',gap:8}}>
                <Btn ch="Clear All" v="dk" onClick={clearAll} st={{flex:1}}/>
                <Btn ch={<><Ic n="print" s={13} c="#fff"/>Print Quote</>} onClick={printQuotation} st={{flex:2,background:C.green,border:'none'}}/>
              </div>
            </div>
          )}
        </div>
      )}

      {/* CUSTOMER INFO TAB */}
      {tab==='info'&&(
        <div style={{flex:1,overflow:'auto',padding:14}}>
          <Card st={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:0.5,textTransform:'uppercase',marginBottom:12}}>Quotation Details</div>
            <div style={{background:'#242424',borderRadius:8,padding:'8px 12px',marginBottom:12,fontSize:11,color:C.muted}}>
              No: <span style={{fontFamily:"'Space Mono'",fontWeight:700,color:C.gold}}>{qNum}</span>
            </div>
            <Inp lbl="Customer / Client Name" val={cust} set={setCust} ph="Full name or company" req/>
            <Inp lbl="Phone Number" val={phone} set={setPhone} ph="07X XXXXXXX" type="tel"/>
            <Inp lbl="Project / Site Name" val={project} set={setProject} ph="e.g. House wiring – Kandy"/>
          </Card>
          <Card st={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
              <div style={{textAlign:'center',flex:1}}>
                <div style={{fontSize:22,fontWeight:900,color:C.blue}}>{items.length}</div>
                <div style={{fontSize:10,color:C.muted}}>Items</div>
              </div>
              <div style={{textAlign:'center',flex:1}}>
                <div style={{fontSize:18,fontWeight:900,color:C.green}}>Rs.{Math.round(totalAmt/1000)}K</div>
                <div style={{fontSize:10,color:C.muted}}>Total</div>
              </div>
            </div>
            <Btn ch={<><Ic n="print" s={13} c="#fff"/>Print Quotation</>} onClick={printQuotation} full sz="lg" dis={!cust.trim()||!items.length} st={{background:C.green,border:'none'}}/>
            {(!cust||!items.length)&&<p style={{fontSize:11,color:C.muted,textAlign:'center',marginTop:8}}>{!cust?'Enter customer name above':''}{!items.length?' · Add items from Catalog':''}</p>}
          </Card>
          <div style={{background:'#1a1000',border:`1px solid ${C.gold}33`,borderRadius:10,padding:'10px 14px',fontSize:11,color:C.gold,lineHeight:1.6}}>
            💡 Default markup is 25% over supplier MRP. Edit sell prices in the Items tab.
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [configured,setConfigured]=useState(!!getCfg());
  const [ready,setReady]=useState(false);
  const [dbErr,setDbErr]=useState('');
  const [me,setMe]=useState(null);
  const [pg,setPg]=useState('dash');
  const [users,setUsers]=useState([]);
  const [products,setProducts]=useState([]);
  const [sales,setSales]=useState([]);
  const [cheques,setCheques]=useState([]);
  const [companies,setCompanies]=useState([]);
  const [bill,setBill]=useState(null);
  const [posKey,setPosKey]=useState(0);
  const [toast,setToast]=useState(null);
  const toastRef=useRef(null);

  const toast2=(text,type='info')=>{
    setToast({text,type});
    clearTimeout(toastRef.current);
    toastRef.current=setTimeout(()=>setToast(null),2200);
  };

  const merge=(set,item)=>set(prev=>{const ex=prev.find(x=>x.id===item.id);return ex?prev.map(x=>x.id===item.id?item:x):[...prev,item];});
  const remove=(set,id)=>set(prev=>prev.filter(x=>x.id!==id));

  useEffect(()=>{
    if(!configured)return;
    setReady(false);setDbErr('');
    (async()=>{
      try{
        const[u,p,s,ch,co]=await Promise.all([DB.getAll('users'),DB.getAll('products'),DB.getAll('sales'),DB.getAll('cheques'),DB.getAll('companies')]);
        setUsers(u);setProducts(p);setSales(s);setCheques(ch);setCompanies(co);
        await DB.seed('users',SEED_USERS);
        if(u.length===0){const fresh=await DB.getAll('users');setUsers(fresh);}
        setReady(true);
        // Realtime
        const sb=getSB();
        if(sb){
          const ch2=sb.channel('ne-realtime');
          [['users',setUsers],['products',setProducts],['sales',setSales],['cheques',setCheques],['companies',setCompanies]].forEach(([tbl,set])=>{
            ch2.on('postgres_changes',{event:'*',schema:'public',table:tbl},payload=>{
              if(payload.eventType==='DELETE')remove(set,payload.old.id);
              else if(payload.new?.data)merge(set,{...payload.new.data,id:payload.new.id});
            });
          });
          ch2.subscribe();
        }
      }catch(e){setDbErr(e.message);}
    })();
  },[configured]);

  const login=u=>{setMe(u);setPg('dash');};
  const logout=()=>{setMe(null);setPg('dash');setBill(null);};
  const reconfigure=()=>{clearCfg();_sb=null;setConfigured(false);setMe(null);setReady(false);};
  const upsertProduct=async p=>{await DB.put('products',p);merge(setProducts,p);};
  const deleteProduct=async id=>{await DB.del('products',id);remove(setProducts,id);};
  const upsertCheque=async c=>{await DB.put('cheques',c);merge(setCheques,c);};
  const deleteCheque=async id=>{await DB.del('cheques',id);remove(setCheques,id);};
  const upsertUser=async u=>{await DB.put('users',u);merge(setUsers,u);};
  const upsertCompany=async c=>{await DB.put('companies',c);merge(setCompanies,c);};
  const deleteCompany=async id=>{await DB.del('companies',id);remove(setCompanies,id);};
  const onSaleComplete=async sale=>{await DB.put('sales',sale);setSales(prev=>[...prev,sale]);setBill(sale);setPosKey(k=>k+1);};
  const onNewSale=()=>setBill(null);

  if(!configured)return <SetupScreen onConnected={()=>{setConfigured(true);}}/>;
  if(!ready)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div className="anim-float"><NipponLogo size={72} glow={true}/></div>
      <div style={{color:C.muted,fontSize:13}}>Connecting to database…</div>
      {dbErr&&(
        <div style={{maxWidth:300,background:'#3a1a1a',border:`1px solid ${C.red}44`,borderRadius:10,padding:16,textAlign:'center'}}>
          <p style={{fontSize:12,color:'#ff8888',marginBottom:12,lineHeight:1.5}}>{dbErr}</p>
          <Btn ch="Reconfigure" v="out" onClick={reconfigure}/>
        </div>
      )}
    </div>
  );

  const pages={dash:Dashboard,prod:ProductsPage,comp:CompaniesPage,chq:ChequesPage,accts:AccountsPage,quot:QuotationPage};
  const renderPOS=()=>bill?<BillView sale={bill} onNewSale={onNewSale}/>:<POSPage key={posKey}/>;
  const ctx={user:me,users,products,sales,cheques,companies,toast2,login,logout,reconfigure,onSaleComplete,upsertProduct,deleteProduct,upsertCheque,deleteCheque,upsertUser,upsertCompany,deleteCompany};

  return(
    <Ctx.Provider value={ctx}>
      <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',position:'relative'}}>
        {!me?<LoginPage/>:(
          <>
            {pg==='pos'?renderPOS():React.createElement(pages[pg]||Dashboard)}
            {!(pg==='pos'&&bill)&&<Nav pg={pg} setPg={setPg} user={me}/>}
          </>
        )}
        <Toast t={toast}/>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

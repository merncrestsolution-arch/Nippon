function QuotationPage() {
  const {toast2}=useApp();
  const [qTab,setQTab]=useState("catalog");
  const [items,setItems]=useState([]);
  const [custSrch,setCustSrch]=useState("");
  const [catFlt,setCatFlt]=useState("All");
  const [markup,setMarkup]=useState(25);
  const [cableModal,setCableModal]=useState(null);
  const [cableM,setCableM]=useState("");
  const [showPrintPicker,setShowPrintPicker]=useState(false);
  const [showCustom,setShowCustom]=useState(false);
  const [custItem,setCustItem]=useState({name:"",price:"",qty:"1",unit:"pcs",notes:""});
  const [customer,setCustomer]=useState({name:"",address:"",phone:"",email:"",company:""});
  const qno=useState(()=>"QT-"+today().replace(/-/g,"").slice(2)+"-"+String(Math.floor(Math.random()*900)+100))[0];
  const total=items.reduce((a,i)=>a+i.price*i.qty,0);
  const catalogF=SUPPLIER_CATALOG.filter(i=>(catFlt==="All"||i.sup===catFlt)&&(!custSrch||i.name.toLowerCase().includes(custSrch.toLowerCase())));
  const sellPrice=item=>Math.ceil(item.cost*(1+markup/100)/10)*10;
  const addItem=item=>{
    if(isCable(item)){setCableModal({item});setCableM("");return;}
    setItems(prev=>{
      const ex=prev.find(x=>x.id===item.id);
      if(ex)return prev.map(x=>x.id===item.id?{...x,qty:x.qty+1}:x);
      return[...prev,{id:item.id,name:item.name,price:sellPrice(item),qty:1,unit:item.unit||"pcs",sup:item.sup,cost:item.cost}];
    });
  };
  const confirmCable=()=>{
    const m=parseFloat(cableM);
    if(!m||m<=0){toast2("Enter valid meters","error");return;}
    const {item}=cableModal;
    const sellPerM=Math.ceil(item.cost/100*(1+markup/100)*10)/10;
    const pid=item.id+"_"+m+"m";
    setItems(prev=>{
      const ex=prev.find(x=>x.id===pid);
      if(ex)return prev.map(x=>x.id===pid?{...x,qty:x.qty+1}:x);
      return[...prev,{id:pid,name:item.name+" ("+m+"m)",price:Math.ceil(sellPerM*m/10)*10,qty:1,unit:"m",sup:item.sup,meters:m}];
    });
    toast2(item.name.slice(0,20)+" "+m+"m added","success");
    setCableModal(null);
  };
  const addCustom=()=>{
    if(!custItem.name.trim()||!custItem.price){toast2("Name and price required","error");return;}
    setItems(prev=>[...prev,{id:"custom_"+uid(),name:custItem.name.trim(),price:parseFloat(custItem.price),qty:parseInt(custItem.qty)||1,unit:custItem.unit||"pcs",sup:"Custom",notes:custItem.notes,isCustom:true}]);
    toast2(custItem.name.slice(0,22)+" added","success");
    setCustItem({name:"",price:"",qty:"1",unit:"pcs",notes:""});
    setShowCustom(false);
  };
  const updQty=(id,d)=>setItems(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+d)}:i));
  const remItem=id=>setItems(prev=>prev.filter(i=>i.id!==id));

  const buildQuoteHTML=(size)=>{
    const isT=size==="thermal80"||size==="thermal58";
    const rows=items.map(i=>"<tr style='border-bottom:1px solid #eee'><td style='padding:5px 4px;font-size:"+(isT?"9":"11")+"px'>"+i.name+(i.isCustom?" *":"")+"</td><td style='text-align:center;padding:5px 4px;font-size:"+(isT?"9":"11")+"px'>"+i.qty+"</td><td style='text-align:right;padding:5px 4px;font-size:"+(isT?"9":"11")+"px'>Rs."+Number(i.price).toFixed(2)+"</td><td style='text-align:right;padding:5px 4px;font-size:"+(isT?"9":"11")+"px;font-weight:700'>Rs."+Number(i.price*i.qty).toFixed(2)+"</td></tr>").join("");
    const header=isT
      ? "<div style='text-align:center;border-bottom:2px solid #CC0000;padding-bottom:10px;margin-bottom:10px'><div style='font-size:16px;font-weight:900;letter-spacing:2px;color:#CC0000'>NIPPON ELECTRICALS</div><div style='font-size:10px;margin-top:2px'>QUOTATION</div><div style='font-size:9px;color:#555;margin-top:3px'>"+qno+" · "+today()+"</div></div>"
      : "<div style='background:linear-gradient(135deg,#CC0000,#7A0000);color:#fff;padding:22px;margin-bottom:0'><div style='display:flex;align-items:center;gap:14px;margin-bottom:14px'><div style='width:52px;height:52px;background:rgba(255,255,255,0.15);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px'>💡</div><div><div style='font-size:22px;font-weight:900;letter-spacing:1px'>NIPPON ELECTRICALS</div><div style='font-size:12px;opacity:0.85'>Quotation / Estimate</div></div></div><div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px'><div><span style='opacity:0.7'>Quotation No</span><br/><strong style='font-size:14px'>"+qno+"</strong></div><div><span style='opacity:0.7'>Date</span><br/><strong style='font-size:14px'>"+today()+"</strong></div>"+(customer.name?"<div><span style='opacity:0.7'>To</span><br/><strong>"+customer.name+"</strong>"+(customer.company?"<br/><span style='font-size:10px;opacity:0.8'>"+customer.company+"</span>":"")+"</div><div>"+(customer.phone?"<span style='opacity:0.7'>Phone</span><br/><strong>"+customer.phone+"</strong>":"")+"</div>":"")+"</div></div>";
    const tbl="<table style='width:100%;border-collapse:collapse;margin:18px 0 10px'><thead><tr style='background:#CC0000;color:#fff'><th style='padding:"+(isT?"4px 3px":"9px 12px")+";text-align:left;font-size:"+(isT?"9":"11")+"px'>Item</th><th style='padding:"+(isT?"4px 3px":"9px 12px")+";text-align:center;font-size:"+(isT?"9":"11")+"px'>Qty</th><th style='padding:"+(isT?"4px 3px":"9px 12px")+";text-align:right;font-size:"+(isT?"9":"11")+"px'>Unit Price</th><th style='padding:"+(isT?"4px 3px":"9px 12px")+";text-align:right;font-size:"+(isT?"9":"11")+"px'>Amount</th></tr></thead><tbody>"+rows+"</tbody></table>";
    const totRow="<div style='border-top:2px solid #CC0000;padding-top:10px;text-align:right'><div style='font-size:"+(isT?"13":"18")+"px;font-weight:900;color:#CC0000'>TOTAL: Rs."+Number(total).toFixed(2)+"</div><div style='font-size:"+(isT?"9":"11")+"px;color:#888;margin-top:4px'>All prices in LKR · Inclusive of markup</div></div>";
    const footer=isT?"<div style='text-align:center;margin-top:10px;font-size:9px;color:#888;border-top:1px dashed #ccc;padding-top:8px'>Valid for 7 days · Nippon Electricals Sri Lanka</div>":"<div style='margin-top:22px;padding:14px 18px;background:#fff5f5;border-radius:10px;border-left:4px solid #CC0000'><p style='font-size:12px;color:#CC0000;font-weight:700;margin-bottom:6px'>Terms & Conditions</p><p style='font-size:11px;color:#555;line-height:1.7'>• This quotation is valid for 7 days<br/>• Prices subject to change without notice<br/>• All prices in Sri Lankan Rupees (LKR)<br/>* Custom items are subject to availability</p></div>";
    return header+tbl+totRow+footer;
  };

  return (<div style={{height:"100vh",display:"flex",flexDirection:"column",paddingBottom:70}}>
    <div style={{background:"linear-gradient(135deg,"+C.red+" 0%,#7A0000 100%)",padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
      <NipponLogo size={34}/>
      <div style={{flex:1}}><div style={{fontWeight:900,fontSize:15,color:"#fff"}}>Quotation Builder</div><div style={{fontSize:10,color:"#ffcccc"}}>{qno}</div></div>
      <div style={{display:"flex",gap:7,alignItems:"center"}}>
        <button onClick={()=>setShowCustom(true)} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:8,padding:"7px 10px",cursor:"pointer",color:"#fff",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:5}}>
          <Ic n="plus" s={13} c="#fff"/>Custom
        </button>
        {items.length>0&&<button onClick={()=>setShowPrintPicker(true)} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"7px 12px",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
          <Ic n="print" s={14} c="#fff"/>Print
        </button>}
      </div>
    </div>
    <Tabs tabs={[["catalog","Catalog"],["items","Items"+(items.length>0?" ("+items.length+")":"")],["customer","Customer"]]} active={qTab} setActive={setQTab}/>

    {/* CATALOG TAB */}
    {qTab==="catalog"&&(<div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"8px 12px",background:"#0f0f0f",borderBottom:"1px solid #2a2a2a"}}>
        <div style={{display:"flex",gap:8,marginBottom:7,alignItems:"center"}}>
          <div style={{position:"relative",flex:1}}><div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}><Ic n="srch" s={13} c="#888"/></div><input value={custSrch} onChange={e=>setCustSrch(e.target.value)} placeholder="Search products..." style={{width:"100%",background:"#242424",border:"1px solid #2a2a2a",borderRadius:8,padding:"7px 10px 7px 30px",color:"#f0f0f0",fontSize:13,outline:"none",fontFamily:"inherit"}}/></div>
          <div style={{display:"flex",alignItems:"center",gap:5,background:"#242424",border:"1px solid #2a2a2a",borderRadius:8,padding:"5px 10px",flexShrink:0}}>
            <span style={{fontSize:10,color:"#888"}}>Markup</span>
            <input type="number" value={markup} onChange={e=>setMarkup(parseFloat(e.target.value)||0)} style={{width:40,background:"none",border:"none",color:C.gold,fontWeight:700,fontSize:12,outline:"none",textAlign:"center"}}/>
            <span style={{fontSize:10,color:"#888"}}>%</span>
          </div>
        </div>
        <div style={{display:"flex",gap:5,overflow:"auto"}}>{SSUPS.map(s=><button key={s} onClick={()=>setCatFlt(s)} style={{background:catFlt===s?C.red:"#2a2a2a",border:"none",borderRadius:14,padding:"4px 10px",color:"#fff",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontWeight:catFlt===s?700:400,flexShrink:0}}>{s}</button>)}</div>
      </div>
      <div style={{padding:"4px 12px",fontSize:10,color:"#888",background:"#0f0f0f",borderBottom:"1px solid #2a2a2a"}}>{catalogF.length} items · {markup}% markup · tap + to add · tap Custom to add unlisted item</div>
      <div style={{flex:1,overflow:"auto",padding:"8px 10px"}}>
        {catalogF.map((item,i)=>{
          const inQ=items.find(x=>x.id===item.id||x.id.startsWith(item.id+"_"));
          const sc=SUP_COL[item.sup]||"#888";
          const cable=isCable(item);
          return (<div key={item.id} className="fadeUp" style={{background:inQ?"#1a1000":"#1a1a1a",borderRadius:10,padding:"10px 12px",marginBottom:6,border:"1px solid "+(inQ?C.gold+"88":"#2a2a2a"),display:"flex",alignItems:"center",gap:10,animationDelay:Math.min(i,20)*0.02+"s"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,lineHeight:1.3,marginBottom:3}}>{item.name}</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{background:sc+"22",color:sc,border:"1px solid "+sc+"44",borderRadius:3,padding:"1px 6px",fontSize:9,fontWeight:700}}>{item.sup}</span>
                {cable&&<span style={{background:C.gold+"22",color:C.gold,border:"1px solid "+C.gold+"44",borderRadius:3,padding:"1px 5px",fontSize:9}}>📏 Cable</span>}
                <span style={{fontSize:10,color:"#888"}}>Cost: {lkr(item.cost)}</span>
                <span style={{fontSize:10,color:C.green,fontWeight:700}}>Sell: {lkr(sellPrice(item))}/{cable?"m":item.unit}</span>
              </div>
            </div>
            <button onClick={()=>addItem(item)} style={{background:inQ?C.gold:C.red,border:"none",borderRadius:8,width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:inQ?"#000":"#fff",fontSize:cable?12:16,flexShrink:0}}>{cable?"📏":(inQ?items.filter(x=>x.id===item.id||x.id.startsWith(item.id+"_")).reduce((a,x)=>a+x.qty,0):"+")} </button>
          </div>);
        })}
      </div>
    </div>)}

    {/* ITEMS TAB */}
    {qTab==="items"&&(<div style={{flex:1,overflow:"auto",padding:12}}>
      {items.length===0?(<div style={{textAlign:"center",color:"#888",padding:40}}>
        <Ic n="tag" s={44} c="#888"/><p style={{marginTop:12,fontSize:13}}>No items added</p>
        <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:14}}>
          <Btn ch="Browse Catalog" col={C.red} onClick={()=>setQTab("catalog")}/>
          <Btn ch={<><Ic n="plus" s={13} c="#fff"/>Custom Item</>} col={C.blue} onClick={()=>setShowCustom(true)}/>
        </div>
      </div>)
      :<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:12,color:"#888"}}>{items.length} items</span>
          <Btn ch={<><Ic n="plus" s={13} c="#fff"/>Custom Item</>} col={C.blue} sz="sm" onClick={()=>setShowCustom(true)}/>
        </div>
        {items.map((item,i)=>(<div key={item.id} className="fadeUp" style={{background:"#1a1a1a",borderRadius:12,padding:12,marginBottom:8,border:"1px solid #2a2a2a",animationDelay:i*0.03+"s"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:2,display:"flex",gap:6,alignItems:"center"}}>
                {item.name}
                {item.isCustom&&<span style={{background:C.blue+"22",color:C.blue,border:"1px solid "+C.blue+"44",borderRadius:3,padding:"1px 5px",fontSize:8,fontWeight:700}}>CUSTOM</span>}
              </div>
              <div style={{fontSize:11,color:"#888"}}>{lkr(item.price)} / {item.unit}{item.sup&&" · "+item.sup}</div>
            </div>
            <button onClick={()=>remItem(item.id)} style={{background:"#3a1a1a",border:"none",borderRadius:6,padding:"5px 7px",cursor:"pointer"}}><Ic n="del" s={14} c={C.red}/></button>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",background:"#242424",borderRadius:10,overflow:"hidden"}}>
              <button onClick={()=>updQty(item.id,-1)} style={{background:"none",border:"none",padding:"7px 14px",cursor:"pointer",color:C.red,fontSize:18,fontWeight:700}}>-</button>
              <span style={{fontFamily:'"Space Mono",monospace',fontWeight:700,minWidth:24,textAlign:"center"}}>{item.qty}</span>
              <button onClick={()=>updQty(item.id,1)} style={{background:"none",border:"none",padding:"7px 14px",cursor:"pointer",color:C.green,fontSize:18,fontWeight:700}}>+</button>
            </div>
            <div style={{fontFamily:'"Space Mono",monospace',fontWeight:700,fontSize:14}}>{lkr(item.price*item.qty)}</div>
          </div>
        </div>))}
        <div style={{background:"linear-gradient(135deg,"+C.red+"22,"+C.red+"11)",border:"1px solid "+C.red+"44",borderRadius:12,padding:"14px 16px",marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:700,fontSize:16}}>TOTAL</span>
          <span style={{fontFamily:'"Space Mono",monospace',fontWeight:900,fontSize:22,color:C.red}}>{lkr(total)}</span>
        </div>
      </>}
    </div>)}

    {/* CUSTOMER TAB */}
    {qTab==="customer"&&(<div style={{flex:1,overflow:"auto",padding:12}}>
      <Inp lbl="Customer Name" val={customer.name} set={v=>setCustomer(p=>({...p,name:v}))} ph="Full name"/>
      <Inp lbl="Company" val={customer.company} set={v=>setCustomer(p=>({...p,company:v}))} ph="Company name (optional)"/>
      <Inp lbl="Phone" val={customer.phone} set={v=>setCustomer(p=>({...p,phone:v}))} type="tel"/>
      <Inp lbl="Email" val={customer.email} set={v=>setCustomer(p=>({...p,email:v}))} type="email"/>
      <Textarea lbl="Address" val={customer.address} set={v=>setCustomer(p=>({...p,address:v}))}/>
      {items.length>0&&<Btn ch={<><Ic n="print" s={14} c="#fff"/>Print Quotation</>} onClick={()=>setShowPrintPicker(true)} col={C.red} full sz="lg" st={{marginTop:8}}/>}
    </div>)}

    {/* Cable Modal */}
    {cableModal&&(<div onClick={()=>setCableModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} className="slideUp" style={{background:"#1a1a1a",borderRadius:"22px 22px 0 0",width:"100%",maxWidth:480,padding:22,borderTop:"3px solid "+C.gold}}>
        <div style={{width:38,height:4,background:"#2a2a2a",borderRadius:2,margin:"0 auto 14px"}}/>
        <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>📏 {cableModal.item.name}</div>
        <div style={{fontSize:11,color:"#888",marginBottom:14}}>1 Roll = 100m · Sell: Rs.{Math.ceil(cableModal.item.cost/100*(1+markup/100)*10)/10}/m</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:14}}>
          {[10,20,50,60,100].map(m=><button key={m} onClick={()=>setCableM(String(m))} style={{background:cableM===String(m)?C.gold:"#252525",border:"1px solid "+(cableM===String(m)?C.gold:"#2a2a2a"),borderRadius:8,padding:"9px 2px",cursor:"pointer",color:cableM===String(m)?"#000":"#fff",fontWeight:700,fontSize:11}}>{m}m</button>)}
        </div>
        <input type="number" value={cableM} onChange={e=>setCableM(e.target.value)} placeholder="Custom meters..." style={{width:"100%",background:"#242424",border:"1.5px solid #2a2a2a",borderRadius:10,padding:"12px 14px",color:"#f0f0f0",fontSize:15,outline:"none",marginBottom:12,boxSizing:"border-box",fontFamily:"inherit"}}/>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setCableModal(null)} style={{flex:1,background:"#252525",border:"none",borderRadius:10,padding:"13px",color:"#fff",cursor:"pointer",fontWeight:700}}>Cancel</button>
          <button onClick={confirmCable} disabled={!cableM||parseFloat(cableM)<=0} style={{flex:2,background:(!cableM||parseFloat(cableM)<=0)?"#333":C.gold,border:"none",borderRadius:10,padding:"13px",color:(!cableM||parseFloat(cableM)<=0)?"#888":"#000",fontWeight:900,cursor:(!cableM||parseFloat(cableM)<=0)?"not-allowed":"pointer"}}>Add {cableM||"0"}m</button>
        </div>
      </div>
    </div>)}

    {/* Custom Item Modal */}
    {showCustom&&(<div onClick={()=>setShowCustom(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} className="slideUp" style={{background:"#1a1a1a",borderRadius:"22px 22px 0 0",width:"100%",maxWidth:480,padding:22,borderTop:"3px solid "+C.blue}}>
        <div style={{width:38,height:4,background:"#2a2a2a",borderRadius:2,margin:"0 auto 14px"}}/>
        <div style={{fontWeight:900,fontSize:16,marginBottom:4,display:"flex",alignItems:"center",gap:8}}><Ic n="pencil" s={18} c={C.blue}/>Add Custom Item</div>
        <p style={{fontSize:12,color:"#888",marginBottom:14}}>Add any item not in the catalog</p>
        <Inp lbl="Item Name *" val={custItem.name} set={v=>setCustItem(p=>({...p,name:v}))} ph="e.g. Special Conduit Fitting"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Inp lbl="Price (Rs.) *" val={custItem.price} set={v=>setCustItem(p=>({...p,price:v}))} type="number" ph="0.00"/>
          <Inp lbl="Qty" val={custItem.qty} set={v=>setCustItem(p=>({...p,qty:v}))} type="number" ph="1"/>
        </div>
        <Sel lbl="Unit" val={custItem.unit} set={v=>setCustItem(p=>({...p,unit:v}))} opts={["pcs","m","roll","kg","box","set","pair"]}/>
        <Textarea lbl="Notes (optional)" val={custItem.notes} set={v=>setCustItem(p=>({...p,notes:v}))} ph="Description or specifications"/>
        {custItem.name&&custItem.price&&<div style={{background:C.blue+"11",border:"1px solid "+C.blue+"33",borderRadius:8,padding:"8px 12px",marginBottom:12,display:"flex",justifyContent:"space-between"}}><span style={{color:"#888",fontSize:12}}>Total</span><span style={{fontFamily:'"Space Mono",monospace',fontWeight:900,color:C.blue}}>{lkr(parseFloat(custItem.price||0)*parseInt(custItem.qty||1))}</span></div>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setShowCustom(false)} style={{flex:1,background:"#252525",border:"none",borderRadius:10,padding:"13px",color:"#fff",cursor:"pointer",fontWeight:700}}>Cancel</button>
          <Btn ch={<><Ic n="plus" s={13} c="#fff"/>Add to Quote</>} onClick={addCustom} col={C.blue} st={{flex:2,padding:"13px"}} sz="lg"/>
        </div>
      </div>
    </div>)}

    <PrintSizePicker open={showPrintPicker} onClose={()=>setShowPrintPicker(false)} onSelect={sz=>{ printDoc(buildQuoteHTML(sz), sz); }}/>
  </div>);
}

// ═══════════════════════════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════════════════════════
function App(){
  const [configured,setConfigured]=useState(()=>!!getCfg());
  const [ready,setReady]=useState(false);
  const [dbErr,setDbErr]=useState("");
  const [me,setMe]=useState(null);
  const [pg,setPg]=useState("dash");
  const [toast,setToast]=useState(null);
  const tRef=useRef(null);
  const chanRef=useRef(null);
  const [bill,setBill]=useState(null);
  const cartRef=useRef([]);

  const [users,setUsers]=useState([]);
  const [products,setProducts]=useState([]);
  const [sales,setSales]=useState([]);
  const [cheques,setCheques]=useState([]);
  const [companies,setCompanies]=useState([]);
  const [expenses,setExpenses]=useState([]);

  const merge=(set,item)=>set(prev=>{const i=prev.findIndex(x=>x.id===item.id);return i>=0?prev.map(x=>x.id===item.id?item:x):[...prev,item];});
  const remove=(set,id)=>set(prev=>prev.filter(x=>x.id!==id));

  const subscribeRT=()=>{
    if(chanRef.current)_sb.removeChannel(chanRef.current);
    const ch=_sb.channel("realtime-all")
      .on("postgres_changes",{event:"*",schema:"public",table:"products"},p=>{if(p.eventType==="DELETE")remove(setProducts,p.old.id);else if(p.new)merge(setProducts,{...p.new.data,id:p.new.id});})
      .on("postgres_changes",{event:"*",schema:"public",table:"sales"},p=>{if(p.new)setSales(prev=>{if(prev.find(x=>x.id===p.new.id))return prev;return[...prev,{...p.new.data,id:p.new.id}];});})
      .on("postgres_changes",{event:"*",schema:"public",table:"cheques"},p=>{if(p.eventType==="DELETE")remove(setCheques,p.old.id);else if(p.new)merge(setCheques,{...p.new.data,id:p.new.id});})
      .on("postgres_changes",{event:"*",schema:"public",table:"companies"},p=>{if(p.eventType==="DELETE")remove(setCompanies,p.old.id);else if(p.new)merge(setCompanies,{...p.new.data,id:p.new.id});})
      .on("postgres_changes",{event:"*",schema:"public",table:"expenses"},p=>{if(p.eventType==="DELETE")remove(setExpenses,p.old.id);else if(p.new)merge(setExpenses,{...p.new.data,id:p.new.id});})
      .subscribe();
    chanRef.current=ch;
  };

  useEffect(()=>{
    if(!configured)return;
    const cfg=getCfg();
    initSB(cfg.url,cfg.key);
    Promise.all([DB.getAll("products"),DB.getAll("sales"),DB.getAll("cheques"),DB.getAll("companies"),DB.getAll("expenses")])
      .then(([p,s,c,co,e])=>{setProducts(p);setSales(s);setCheques(c);setCompanies(co);setExpenses(e);})
      .then(async()=>{await DB.seed("users",SEED_USERS);const u=await DB.getAll("users");setUsers(u);subscribeRT();})
      .catch(e=>{console.error(e);setDbErr("Connection failed: "+e.message);})
      .finally(()=>setReady(true));
    return()=>{if(chanRef.current)_sb.removeChannel(chanRef.current);};
  },[configured]);

  const toast2=(msg,type="info")=>{setToast({msg,type});clearTimeout(tRef.current);tRef.current=setTimeout(()=>setToast(null),2800);};
  const login=u=>{setMe(u);setPg("dash");};
  const logout=()=>{setMe(null);setPg("dash");setBill(null);};
  const reconfigure=()=>{clearCfg();setConfigured(false);setMe(null);setReady(false);};

  const upsertProduct=async p=>{await DB.put("products",p);merge(setProducts,p);};
  const deleteProduct=async id=>{await DB.del("products",id);remove(setProducts,id);};
  const upsertCheque=async c=>{await DB.put("cheques",c);merge(setCheques,c);};
  const deleteCheque=async id=>{await DB.del("cheques",id);remove(setCheques,id);};
  const upsertUser=async u=>{await DB.put("users",u);merge(setUsers,u);};
  const upsertCompany=async c=>{await DB.put("companies",c);merge(setCompanies,c);};
  const deleteCompany=async id=>{await DB.del("companies",id);remove(setCompanies,id);};
  const upsertExpense=async e=>{await DB.put("expenses",e);merge(setExpenses,e);};
  const deleteExpense=async id=>{await DB.del("expenses",id);remove(setExpenses,id);};

  const onSaleComplete=async sale=>{
    await DB.put("sales",sale);
    setSales(prev=>[...prev,sale]);
    if(sale.paymentMode==="cheque"&&sale.chqDet){
      const chq={id:uid(),party:sale.customer,amount:sale.total,bank:sale.chqDet.bank||"",chqNo:sale.chqDet.no||"",issueDate:sale.date,dueDate:"",type:"Received",status:"pending",notes:"Auto from Invoice "+sale.invoiceNo,saleInvoice:sale.invoiceNo,createdAt:new Date().toISOString()};
      try{await DB.put("cheques",chq);merge(setCheques,chq);}catch(e){}
    }
  };
  const onNewSale=()=>setBill(null);

  if(!configured)return <SetupScreen onConnected={()=>setConfigured(true)}/>;
  if(!ready)return (<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,background:"#0f0f0f"}}>
    <div className="floatAnim"><NipponLogo size={72} glow/></div>
    <div style={{color:"#888",fontSize:14}}>Connecting to database...</div>
    {dbErr&&(<div style={{maxWidth:320,background:"#3a1a1a",border:"1px solid #CC000044",borderRadius:10,padding:18,textAlign:"center"}}>
      <p style={{fontSize:12,color:"#ff8888",marginBottom:14,lineHeight:1.5}}>{dbErr}</p>
      <Btn ch="Reconfigure" col="#252525" onClick={reconfigure}/>
    </div>)}
  </div>);

  const ctx={user:me,users,products,sales,cheques,companies,expenses,toast2,login,logout,reconfigure,onSaleComplete,onNewSale,upsertProduct,deleteProduct,upsertCheque,deleteCheque,upsertUser,upsertCompany,deleteCompany,upsertExpense,deleteExpense};
  const pages={dash:Dashboard,prod:ProductsPage,comp:CompaniesPage,chq:ChequesPage,exp:ExpensesPage,accts:AccountsPage,quot:QuotationPage};

  const renderPOS=()=>(<>
    <POSPage cartRef={cartRef} onCheckoutDone={inv=>setBill(inv)}/>
    {bill&&<BillView sale={bill} onNewSale={onNewSale}/>}
  </>);

  return (<AppCtx.Provider value={ctx}>
    {!me
      ? <LoginPage/>
      : <div className="ne-app">
          <Nav pg={pg} setPg={setPg} user={me}/>
          <div className="ne-content">
            {pg==="pos"
              ? renderPOS()
              : <div className="ne-page">
                  {React.createElement(pages[pg]||Dashboard)}
                </div>
            }
          </div>
        </div>
    }
    <Toast t={toast}/>
  </AppCtx.Provider>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

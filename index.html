//  ACCOUNTS PAGE
// ═══════════════════════════════════════════════════════════════════════
function AccountsPage() {
  const {users, upsertUser, toast2, user, reconfigure} = useApp();
  const [showForm, setShowForm] = useState(false);
  const [ed, setEd] = useState(null);
  const blank = {name:"",username:"",password:"",role:"cashier",email:"",active:true};
  const [f, setF] = useState(blank);
  const [saving, setSaving] = useState(false);
  const roleCol = {admin:C.red, manager:C.blue, cashier:C.green};

  const openForm = (u=null) => {
    if (u) { setEd(u); setF({...blank,...u}); }
    else { setEd(null); setF(blank); }
    setShowForm(true);
  };
  const save = async () => {
    if (!f.name.trim() || !f.username.trim() || !f.password) { toast2("Fill all required fields!","error"); return; }
    if (!ed && users.find(u => u.username===f.username)) { toast2("Username already exists!","error"); return; }
    setSaving(true);
    try {
      await upsertUser({...f, id:ed?ed.id:uid(), avatar:f.name[0].toUpperCase(), createdAt:ed?ed.createdAt:today()});
      toast2(ed?"Updated!":"User added!","success");
      setShowForm(false);
    } catch(e) { toast2("Failed: "+e.message,"error"); }
    setSaving(false);
  };

  return (
    <div style={{paddingBottom:90}}>
      <div style={{padding:"14px"}}>
        <SectionHeader title="User Accounts" right={<Btn ch={<><Ic n="plus" s={14} c="#fff"/>Add User</>} onClick={() => openForm()} sz="sm"/>}/>
        {users.map((u,i) => (
          <div key={u.id} className="fadeUp" style={{background:C.card,borderRadius:12,padding:13,marginBottom:8,border:"1px solid "+C.border,animationDelay:i*0.04+"s",opacity:u.active?1:0.5}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:42,height:42,borderRadius:12,background:(roleCol[u.role]||C.muted)+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:roleCol[u.role]||C.muted,flexShrink:0}}>
                {u.avatar||u.name[0]}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700}}>{u.name}</div>
                <div style={{display:"flex",gap:6,marginTop:3}}>
                  <Badge ch={u.role.toUpperCase()} col={roleCol[u.role]||C.muted}/>
                  <span style={{fontSize:11,color:C.muted}}>@{u.username}</span>
                </div>
              </div>
              <button onClick={() => openForm(u)} style={{background:C.border,border:"none",borderRadius:8,padding:"7px 9px",cursor:"pointer"}}>
                <Ic n="edit" s={14}/>
              </button>
            </div>
          </div>
        ))}
        <div style={{background:"#1a0a0a",borderRadius:12,padding:14,border:"1px solid "+C.red+"44",marginTop:16}}>
          <p style={{fontSize:13,fontWeight:700,marginBottom:10,color:C.red}}>Database Settings</p>
          <Btn ch="Reconfigure Database Connection" col="#252525" onClick={() => { if(confirm("Disconnect from database? You will need to reconnect.")) reconfigure(); }} full/>
        </div>
      </div>
      <Modal open={showForm} onClose={() => setShowForm(false)} title={ed?"Edit User":"Add User"} ch={
        <>
          <Inp lbl="Full Name" val={f.name} set={v => setF(p=>({...p,name:v}))} req/>
          <Inp lbl="Username" val={f.username} set={v => setF(p=>({...p,username:v}))} req/>
          <Inp lbl="Password" val={f.password} set={v => setF(p=>({...p,password:v}))} type="password" req/>
          <Sel lbl="Role" val={f.role} set={v => setF(p=>({...p,role:v}))} opts={["admin","manager","cashier"]}/>
          <Inp lbl="Email" val={f.email} set={v => setF(p=>({...p,email:v}))} type="email"/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,padding:"10px 13px",background:"#242424",borderRadius:8}}>
            <span style={{fontSize:13}}>Active Account</span>
            <button onClick={() => setF(p=>({...p,active:!p.active}))} style={{background:f.active?C.green:C.border,border:"none",borderRadius:12,width:44,height:24,cursor:"pointer",position:"relative",transition:"background 0.2s"}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:f.active?23:3,transition:"left 0.2s"}}/>
            </button>
          </div>
          <Btn ch={saving?"Saving...":(ed?"Update User":"Add User")} onClick={save} dis={saving} full sz="lg"/>
        </>
      }/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  QUOTATION PAGE
// ═══════════════════════════════════════════════════════════════════════
function QuotationPage() {
  const {user, toast2} = useApp();
  const [items, setItems] = useState([]);
  const [cust, setCust] = useState("");
  const [phone, setPhone] = useState("");
  const [project, setProject] = useState("");
  const [discount, setDiscount] = useState("");
  const [srch, setSrch] = useState("");
  const [supFlt, setSupFlt] = useState("All");
  const [tab, setTab] = useState("catalog");
  const [qNum] = useState("QT-"+today().replace(/-/g,"")+"-"+String(uid()).slice(-3));

  const filtered = SUPPLIER_CATALOG.filter(i =>
    (supFlt==="All" || i.sup===supFlt) &&
    (!srch || i.name.toLowerCase().includes(srch.toLowerCase()) || i.sup.toLowerCase().includes(srch.toLowerCase()))
  );
  const discN = parseFloat(discount||0);
  const subtotal = items.reduce((a,i) => a+i.sellPrice*i.qty, 0);
  const totalAmt = Math.max(0, subtotal-discN);
  const inList = id => items.find(i => i.id===id);

  const addItem = cat => {
    const ex = items.find(i => i.id===cat.id);
    if (ex) { setItems(prev => prev.map(i => i.id===cat.id ? {...i,qty:i.qty+1} : i)); }
    else { setItems(prev => [...prev, {...cat, qty:1, sellPrice:Math.ceil(cat.cost*1.25/10)*10}]); }
    toast2(cat.name.slice(0,22)+" added","success");
  };
  const updQty = (id,d) => setItems(prev => prev.map(i => i.id===id ? {...i,qty:Math.max(1,i.qty+d)} : i));
  const updPrice = (id,v) => setItems(prev => prev.map(i => i.id===id ? {...i,sellPrice:parseFloat(v)||0} : i));
  const remItem = id => setItems(prev => prev.filter(i => i.id!==id));
  const clearAll = () => { if (confirm("Clear all items?")) setItems([]); };

  const printQuotation = () => {
    if (!cust.trim()) { toast2("Enter customer name first!","error"); setTab("info"); return; }
    if (!items.length) { toast2("Add items to quotation first!","error"); setTab("catalog"); return; }
    const el = document.getElementById("bill-print");
    el.style.display = "block";
    const rows = items.map((i,n) =>
      "<tr style='border-bottom:1px solid #eee'>" +
      "<td style='padding:6px 4px;font-size:11px'>" + (n+1) + "</td>" +
      "<td style='padding:6px 4px;font-size:11px'>" + i.name + "</td>" +
      "<td style='padding:6px 4px;font-size:11px;text-align:center'>" + i.qty + " " + i.unit + "</td>" +
      "<td style='padding:6px 4px;font-size:11px;text-align:right'>Rs." + i.sellPrice.toLocaleString("en",{minimumFractionDigits:2}) + "</td>" +
      "<td style='padding:6px 4px;font-size:11px;text-align:right;font-weight:700'>Rs." + (i.sellPrice*i.qty).toLocaleString("en",{minimumFractionDigits:2}) + "</td>" +
      "</tr>"
    ).join("");
    el.innerHTML =
      "<div style='font-family:Arial,sans-serif;max-width:720px;margin:0 auto;padding:20px'>" +
      "<div style='display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #CC0000;padding-bottom:14px;margin-bottom:16px'>" +
      "<div><div style='font-size:22px;font-weight:900;color:#CC0000'>NIPPON ELECTRICALS</div><div style='font-size:11px;color:#555'>Electrical Supplies and Solutions, Sri Lanka</div></div>" +
      "<div style='text-align:right'><div style='font-size:18px;font-weight:700'>QUOTATION</div><div style='font-size:11px;color:#777'>No: <b>" + qNum + "</b></div><div style='font-size:11px;color:#777'>Date: " + today() + "</div></div>" +
      "</div>" +
      "<div style='background:#f9f9f9;padding:12px;border-radius:6px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px'>" +
      "<div><div style='font-size:9px;color:#999;text-transform:uppercase;margin-bottom:4px'>Bill To</div><div style='font-size:14px;font-weight:700'>" + cust + "</div>" +
      (phone ? "<div style='font-size:11px;color:#555'>Tel: "+phone+"</div>" : "") +
      (project ? "<div style='font-size:11px;color:#555'>Project: "+project+"</div>" : "") + "</div>" +
      "<div style='text-align:right'><div style='font-size:9px;color:#999;text-transform:uppercase;margin-bottom:4px'>Prepared By</div><div style='font-size:12px;font-weight:600'>" + user.name + "</div><div style='font-size:11px;color:#777'>Valid for 30 days</div></div>" +
      "</div>" +
      "<table style='width:100%;border-collapse:collapse'><thead><tr style='background:#CC0000;color:#fff'><th style='padding:8px 4px;font-size:11px;text-align:left;width:28px'>#</th><th style='padding:8px 4px;font-size:11px;text-align:left'>Description</th><th style='padding:8px 4px;font-size:11px;text-align:center;width:70px'>Qty</th><th style='padding:8px 4px;font-size:11px;text-align:right;width:90px'>Unit Price</th><th style='padding:8px 4px;font-size:11px;text-align:right;width:90px'>Amount</th></tr></thead><tbody>" + rows + "</tbody></table>" +
      "<div style='margin-top:16px;display:flex;justify-content:flex-end'><div style='min-width:240px'>" +
      "<div style='display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:12px'><span>Subtotal</span><span>Rs." + subtotal.toLocaleString("en",{minimumFractionDigits:2}) + "</span></div>" +
      (discN>0 ? "<div style='display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:12px;color:#CC0000'><span>Discount</span><span>- Rs."+discN.toLocaleString("en",{minimumFractionDigits:2})+"</span></div>" : "") +
      "<div style='display:flex;justify-content:space-between;padding:10px 0;font-size:16px;font-weight:900;border-top:2px solid #CC0000'><span>TOTAL</span><span style='color:#CC0000'>Rs." + totalAmt.toLocaleString("en",{minimumFractionDigits:2}) + "</span></div>" +
      "</div></div>" +
      "<div style='margin-top:24px;padding-top:12px;border-top:1px solid #eee;font-size:10px;color:#999;text-align:center'>Thank you for choosing Nippon Electricals - Your trusted electrical supplier in Sri Lanka.</div>" +
      "</div>";
    window.print();
    setTimeout(() => { el.style.display="none"; el.innerHTML=""; }, 1000);
  };

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",paddingBottom:70}}>
      <div style={{background:"linear-gradient(135deg,"+C.red+",#7A0000)",padding:"11px 14px",display:"flex",alignItems:"center",gap:10}}>
        <NipponLogo size={30}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:14,color:"#fff"}}>Quotation Builder</div>
          <div style={{fontSize:10,color:"#ffcccc"}}>{qNum}</div>
        </div>
        <Btn ch={<><Ic n="print" s={13} c="#fff"/>Print</>} onClick={printQuotation} sz="sm"
          st={{background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)"}}/>
      </div>
      <Tabs tabs={[["catalog","Catalog"],["quote",items.length>0?"Items ("+items.length+")":"Items"],["info","Customer"]]} active={tab} setActive={setTab}/>

      {tab==="catalog" && (
        <div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"9px 12px 6px",background:"#141414",borderBottom:"1px solid "+C.border}}>
            <div style={{position:"relative",marginBottom:7}}>
              <div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}><Ic n="srch" s={12} c={C.muted}/></div>
              <input value={srch} onChange={e => setSrch(e.target.value)} placeholder="Search products..."
                style={{width:"100%",background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"7px 10px 7px 28px",color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
            </div>
            <div style={{display:"flex",gap:5,overflow:"auto"}}>
              {SSUPS.map(s => (
                <button key={s} onClick={() => setSupFlt(s)}
                  style={{background:supFlt===s?C.red:C.border,border:"none",borderRadius:14,padding:"3px 10px",color:"#fff",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontWeight:supFlt===s?700:400,flexShrink:0}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
          <div style={{padding:"5px 12px",fontSize:10,color:C.muted,background:"#141414",borderBottom:"1px solid "+C.border}}>
            {filtered.length} items - default markup 25% over cost
          </div>
          <div style={{flex:1,overflow:"auto",padding:"8px 10px"}}>
            {filtered.map((item,i) => {
              const ci = inList(item.id);
              const sc = SUP_COL[item.sup]||C.muted;
              return (
                <div key={item.id} className="fadeUp"
                  style={{background:ci?"#1a1000":C.card,borderRadius:10,padding:"9px 11px",marginBottom:6,border:"1px solid "+(ci?C.gold+"88":C.border),display:"flex",alignItems:"center",gap:9,animationDelay:Math.min(i,20)*0.02+"s"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11.5,fontWeight:700,lineHeight:1.3,marginBottom:2}}>{item.name}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{background:sc+"22",color:sc,border:"1px solid "+sc+"44",borderRadius:3,padding:"1px 5px",fontSize:9,fontWeight:700}}>{item.sup}</span>
                      <span style={{fontSize:10,color:C.muted}}>MRP: Rs.{item.cost.toLocaleString()}</span>
                    </div>
                  </div>
                  <button onClick={() => addItem(item)}
                    style={{background:ci?C.gold:C.red,border:"none",borderRadius:7,width:32,height:32,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:16,flexShrink:0}}>
                    {ci ? ci.qty : "+"}
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab==="quote" && (
        <div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>
          <div style={{flex:1,overflow:"auto",padding:"10px 12px"}}>
            {items.length===0
              ? <div style={{textAlign:"center",color:C.muted,padding:48}}>
                  <Ic n="cart" s={44} c={C.muted}/>
                  <p style={{marginTop:12,fontSize:13}}>No items added yet</p>
                  <button onClick={() => setTab("catalog")} style={{marginTop:16,background:"#252525",border:"none",borderRadius:10,padding:"10px 18px",color:"#fff",fontSize:13,cursor:"pointer",fontWeight:700}}>Browse Catalog</button>
                </div>
              : items.map((item,i) => {
                  const sc = SUP_COL[item.sup]||C.muted;
                  return (
                    <div key={item.id} className="fadeUp" style={{background:C.card,borderRadius:10,padding:11,marginBottom:8,border:"1px solid "+C.border,animationDelay:i*0.03+"s"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                        <div style={{flex:1,paddingRight:6}}>
                          <div style={{fontSize:12,fontWeight:700,lineHeight:1.3,marginBottom:2}}>{item.name}</div>
                          <span style={{background:sc+"22",color:sc,border:"1px solid "+sc+"44",borderRadius:3,padding:"1px 6px",fontSize:9,fontWeight:700}}>{item.sup}</span>
                          <div style={{fontSize:10,color:C.muted,marginTop:3}}>Cost: Rs.{item.cost.toLocaleString()}</div>
                        </div>
                        <button onClick={() => remItem(item.id)} style={{background:"#3a1a1a",border:"none",borderRadius:6,padding:"5px 7px",cursor:"pointer",flexShrink:0}}>
                          <Ic n="del" s={13} c={C.red}/>
                        </button>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"auto 1fr auto",gap:8,alignItems:"center"}}>
                        <div style={{display:"flex",alignItems:"center",background:"#242424",borderRadius:8,overflow:"hidden"}}>
                          <button onClick={() => updQty(item.id,-1)} style={{background:"none",border:"none",padding:"6px 11px",cursor:"pointer",color:C.red,fontSize:16,fontWeight:700}}>-</button>
                          <span style={{fontFamily:'"Space Mono",monospace',fontWeight:700,fontSize:13,minWidth:22,textAlign:"center"}}>{item.qty}</span>
                          <button onClick={() => updQty(item.id,1)} style={{background:"none",border:"none",padding:"6px 11px",cursor:"pointer",color:C.green,fontSize:16,fontWeight:700}}>+</button>
                        </div>
                        <div>
                          <div style={{fontSize:9,color:C.muted,marginBottom:2,textTransform:"uppercase"}}>Sell Price (Rs.)</div>
                          <input type="number" value={item.sellPrice} onChange={e => updPrice(item.id,e.target.value)}
                            style={{width:"100%",background:"#1a1a00",border:"1.5px solid "+C.gold+"66",borderRadius:7,padding:"6px 9px",color:C.text,fontSize:13,fontFamily:'"Space Mono",monospace',fontWeight:700,outline:"none"}}/>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:9,color:C.muted,marginBottom:2,textTransform:"uppercase"}}>Total</div>
                          <div style={{fontFamily:'"Space Mono",monospace',fontWeight:900,fontSize:13,color:C.red}}>Rs.{(item.sellPrice*item.qty).toLocaleString()}</div>
                        </div>
                      </div>
                      {item.cost>0 && (
                        <div style={{marginTop:5,fontSize:10,color:item.sellPrice>=item.cost?C.green:C.red}}>
                          Margin: Rs.{((item.sellPrice-item.cost)*item.qty).toLocaleString()} ({((item.sellPrice-item.cost)/item.cost*100).toFixed(0)}%)
                        </div>
                      )}
                    </div>
                  );
                })
            }
          </div>
          {items.length>0 && (
            <div style={{background:"#141414",padding:14,borderTop:"1px solid "+C.border}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}}>
                <span style={{color:C.muted}}>Subtotal</span>
                <span style={{fontFamily:'"Space Mono",monospace',fontWeight:700}}>Rs.{subtotal.toLocaleString("en",{minimumFractionDigits:2})}</span>
              </div>
              <input value={discount} onChange={e => setDiscount(e.target.value)} type="number" placeholder="Discount (Rs.)"
                style={{width:"100%",background:"#242424",border:"1px solid "+C.border,borderRadius:8,padding:"8px 12px",color:C.text,fontSize:13,outline:"none",marginBottom:8,fontFamily:"inherit"}}/>
              <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid "+C.border,paddingTop:8,marginBottom:12}}>
                <span style={{fontWeight:700,fontSize:15}}>TOTAL</span>
                <span style={{fontFamily:'"Space Mono",monospace',fontWeight:900,fontSize:20,color:C.red}}>Rs.{totalAmt.toLocaleString("en",{minimumFractionDigits:2})}</span>
              </div>
              <div style={{display:"flex",gap:8}}>
                <Btn ch="Clear All" col="#252525" onClick={clearAll} st={{flex:1}}/>
                <Btn ch={<><Ic n="print" s={14} c="#fff"/>Print Quotation</>} onClick={printQuotation} col={C.green} st={{flex:2}}/>
              </div>
            </div>
          )}
        </div>
      )}

      {tab==="info" && (
        <div style={{flex:1,overflow:"auto",padding:"14px 13px"}}>
          <Card st={{marginBottom:14}} ch={
            <>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:0.5,textTransform:"uppercase",marginBottom:12}}>Quotation Details</div>
              <div style={{background:"#242424",borderRadius:8,padding:"9px 13px",marginBottom:14,fontSize:11,color:C.muted}}>
                No: <span style={{fontFamily:'"Space Mono",monospace',fontWeight:700,color:C.gold}}>{qNum}</span>
              </div>
              <Inp lbl="Customer Name" val={cust} set={setCust} ph="Full name or company" req/>
              <Inp lbl="Phone Number" val={phone} set={setPhone} ph="07X XXXXXXX" type="tel"/>
              <Inp lbl="Project / Site" val={project} set={setProject} ph="e.g. House wiring Kandy"/>
            </>
          }/>
          <Card st={{marginBottom:14}} ch={
            <>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:0.5,textTransform:"uppercase",marginBottom:12}}>Summary</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <StatBox lbl="Total Items" val={items.length} col={C.blue} icon="box"/>
                <StatBox lbl="Quote Total" val={"Rs."+Math.round(totalAmt/1000)+"K"} col={C.green} icon="coin"/>
              </div>
              <Btn ch={<><Ic n="print" s={14} c="#fff"/>Print Quotation</>} onClick={printQuotation} dis={!cust.trim()||!items.length} col={C.green} full sz="lg"/>
              {(!cust||!items.length) && (
                <p style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:8}}>
                  {!cust ? "Enter customer name above" : "Add items from Catalog tab"}
                </p>
              )}
            </>
          }/>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════════════════════════
function App() {
  const [configured, setConfigured] = useState(() => !!getCfg());
  const [ready, setReady] = useState(false);
  const [dbErr, setDbErr] = useState("");
  const [me, setMe] = useState(null);
  const [pg, setPg] = useState("dash");
  const [toast, setToast] = useState(null);
  const [users, setUsers] = useState([]);
  const [products, setProducts] = useState([]);
  const [sales, setSales] = useState([]);
  const [cheques, setCheques] = useState([]);
  const [companies, setCompanies] = useState([]);
  const [posKey, setPosKey] = useState(0);
  const [bill, setBill] = useState(null);
  const tRef = useRef(null);
  const chanRef = useRef(null);

  const merge = (set,item) => set(prev => prev.find(x=>x.id===item.id) ? prev.map(x=>x.id===item.id?item:x) : [...prev,item]);
  const remove = (set,id) => set(prev => prev.filter(x => x.id!==id));

  const subscribeRT = () => {
    if (chanRef.current) _sb.removeChannel(chanRef.current);
    const tMap = {users:setUsers, products:setProducts, sales:setSales, cheques:setCheques, companies:setCompanies};
    const ch = _sb.channel("ne-rt-"+Math.random());
    Object.keys(tMap).forEach(t => ch.on("postgres_changes",{event:"*",schema:"public",table:t}, pl => {
      if (pl.eventType==="DELETE") remove(tMap[t], pl.old.id);
      else merge(tMap[t], {...pl.new.data, id:pl.new.id});
    }));
    ch.subscribe();
    chanRef.current = ch;
  };

  const loadAll = async () => {
    const [u,p,s,c,co] = await Promise.all([
      DB.getAll("users"), DB.getAll("products"), DB.getAll("sales"), DB.getAll("cheques"), DB.getAll("companies")
    ]);
    setUsers(u); setProducts(p); setSales(s); setCheques(c); setCompanies(co);
    return u;
  };

  useEffect(() => {
    if (!configured) return;
    const cfg = getCfg();
    if (!cfg) return;
    initSB(cfg.url, cfg.key);
    setReady(false); setDbErr("");
    loadAll()
      .then(async (users) => {
        await DB.seed("users", SEED_USERS);
        const fresh = await DB.getAll("users");
        setUsers(fresh);
        subscribeRT();
      })
      .catch(e => { console.error(e); setDbErr("Connection failed: "+e.message); })
      .finally(() => setReady(true));
    return () => { if (chanRef.current) _sb.removeChannel(chanRef.current); };
  }, [configured]);

  const toast2 = (msg, type="info") => {
    setToast({msg, type});
    clearTimeout(tRef.current);
    tRef.current = setTimeout(() => setToast(null), 2800);
  };
  const login = u => { setMe(u); setPg("dash"); };
  const logout = () => { setMe(null); setPg("dash"); setBill(null); };
  const reconfigure = () => { clearCfg(); setConfigured(false); setMe(null); setReady(false); };
  const upsertProduct = async p => { await DB.put("products",p); merge(setProducts,p); };
  const deleteProduct = async id => { await DB.del("products",id); remove(setProducts,id); };
  const upsertCheque = async c => { await DB.put("cheques",c); merge(setCheques,c); };
  const deleteCheque = async id => { await DB.del("cheques",id); remove(setCheques,id); };
  const upsertUser = async u => { await DB.put("users",u); merge(setUsers,u); };
  const upsertCompany = async c => { await DB.put("companies",c); merge(setCompanies,c); };
  const deleteCompany = async id => { await DB.del("companies",id); remove(setCompanies,id); };
  const onSaleComplete = async sale => { await DB.put("sales",sale); setSales(prev => [...prev,sale]); setBill(sale); setPosKey(k=>k+1); };
  const onNewSale = () => setBill(null);

  if (!configured) return <SetupScreen onConnected={() => setConfigured(true)}/>;

  if (!ready) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div className="floatAnim"><NipponLogo size={72} glow={true}/></div>
      <div style={{color:C.muted,fontSize:14}}>Connecting to database...</div>
      {dbErr && (
        <div style={{maxWidth:320,background:"#3a1a1a",border:"1px solid "+C.red+"44",borderRadius:10,padding:18,textAlign:"center"}}>
          <p style={{fontSize:12,color:"#ff8888",marginBottom:14,lineHeight:1.5}}>{dbErr}</p>
          <Btn ch="Reconfigure" col="#252525" onClick={reconfigure}/>
        </div>
      )}
    </div>
  );

  const ctx = {
    user:me, users, products, sales, cheques, companies,
    toast2, login, logout, reconfigure,
    onSaleComplete, onNewSale,
    upsertProduct, deleteProduct,
    upsertCheque, deleteCheque,
    upsertUser, upsertCompany, deleteCompany
  };

  const pages = {dash:Dashboard, prod:ProductsPage, comp:CompaniesPage, chq:ChequesPage, accts:AccountsPage, quot:QuotationPage};
  const renderPOS = () => bill ? <BillView sale={bill} onNewSale={onNewSale}/> : <POSPage key={posKey}/>;

  return (
    <AppCtx.Provider value={ctx}>
      <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",position:"relative",background:C.dark}}>
        {!me
          ? <LoginPage/>
          : <>
              {pg==="pos" ? renderPOS() : React.createElement(pages[pg]||Dashboard)}
              {!(pg==="pos" && bill) && <Nav pg={pg} setPg={setPg} user={me}/>}
            </>
        }
        <Toast t={toast}/>
      </div>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

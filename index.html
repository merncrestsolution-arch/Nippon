<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:"Noto Sans JP",sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CC0000;border-radius:2px}
select option{background:#1a1a1a;color:#f0f0f0}
@media print{body *{visibility:hidden}#bill-print,#bill-print *{visibility:visible}#bill-print{position:fixed;top:0;left:0;width:100%;background:#fff;color:#000;padding:0;font-family:Arial,sans-serif}}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(0.82)}70%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes glow{0%,100%{box-shadow:0 0 18px #CC000066,0 0 40px #CC000022}50%{box-shadow:0 0 40px #CC0000bb,0 0 80px #CC000044}}
@keyframes bulbPulse{0%,100%{filter:brightness(1) drop-shadow(0 0 6px #FFD70099)}50%{filter:brightness(1.18) drop-shadow(0 0 22px #FFD700ff)}}
@keyframes badgePop{0%{transform:scale(0)}60%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes navPop{0%{transform:scale(0.6) translateY(5px)}100%{transform:scale(1) translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fadeUp{animation:fadeUp 0.3s ease both}
.fadeIn{animation:fadeIn 0.22s ease both}
.slideDown{animation:slideDown 0.3s ease both}
.popIn{animation:popIn 0.3s cubic-bezier(.34,1.56,.64,1) both}
.slideUp{animation:slideUp 0.36s cubic-bezier(.22,1,.36,1) both}
.floatAnim{animation:float 3s ease-in-out infinite}
.glowAnim{animation:glow 2.8s ease-in-out infinite;border-radius:20px}
.bulbAnim{animation:bulbPulse 2.2s ease-in-out infinite}
.badgeAnim{animation:badgePop 0.28s cubic-bezier(.34,1.56,.64,1) both}
.navActive{animation:navPop 0.22s cubic-bezier(.34,1.56,.64,1) both}
.print-thermal{font-family:"Courier New",monospace!important;font-size:12px!important;max-width:300px!important;margin:0 auto!important}
.print-a5{max-width:148mm!important;font-size:11px!important}

/* ══════════════════════════════════════════
   RESPONSIVE LAYOUT
══════════════════════════════════════════ */

/* App shell — flex row, sidebar + content */
.ne-app{display:flex;min-height:100vh;background:#0f0f0f}

/* Sidebar nav */
.ne-sidebar{
  width:200px;flex-shrink:0;
  background:#141414;
  border-right:1px solid #2a2a2a;
  display:flex;flex-direction:column;
  height:100vh;position:sticky;top:0;
  overflow:hidden;z-index:100
}
.ne-sidebar .nb-brand{
  padding:16px 14px 14px;
  border-bottom:1px solid #2a2a2a;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0
}
.ne-sidebar .nb-list{flex:1;overflow-y:auto;padding:8px 0}
.ne-sidebar .nb-foot{border-top:1px solid #2a2a2a;padding:8px 0}
.nb-item{
  display:flex;align-items:center;gap:11px;
  width:100%;padding:11px 16px;
  background:none;border:none;border-left:3px solid transparent;
  cursor:pointer;color:#777;font-size:13px;
  font-family:inherit;font-weight:500;
  text-align:left;transition:all .15s;
  white-space:nowrap
}
.nb-item:hover{background:#1e1e1e;color:#e0e0e0}
.nb-item.on{background:#cc000012;color:#CC0000;font-weight:700;border-left-color:#CC0000}
.nb-item.danger{color:#ff6666}
.nb-item.danger:hover{background:#3a1a1a}

/* Main content area */
.ne-content{flex:1;min-width:0;overflow:auto;display:flex;flex-direction:column}

/* Bottom nav — mobile only */
.ne-botnav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:#141414;border-top:1px solid #2a2a2a;
  z-index:500;padding-bottom:env(safe-area-inset-bottom)
}

/* Page content wrapper */
.ne-page{padding:14px 16px}

/* POS two-column */
.pos-wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.pos-body{flex:1;display:flex;overflow:hidden;min-height:0}
.pos-left{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #2a2a2a}
.pos-right{flex-shrink:0;width:360px;display:flex;flex-direction:column;overflow:hidden;background:#141414}

/* Mobile overrides */
@media(max-width:767px){
  .ne-sidebar{display:none!important}
  .ne-botnav{display:flex!important}
  .ne-page{padding-bottom:80px}
  .pos-right{display:none}
  .pos-right.show{display:flex}
  .pos-left.hide{display:none}
  .mob-show{display:flex!important}
  .mob-hide{display:none!important}
}

/* Desktop overrides */
@media(min-width:768px){
  .ne-sidebar{display:flex!important}
  .ne-botnav{display:none!important}
  .ne-page{max-width:1100px;margin:0 auto;padding:20px 24px}
  .pos-right{display:flex!important}
  .pos-left{display:flex!important}
  .mob-show{display:none!important}
  .mob-hide{display:flex!important}
  .ne-content{height:100vh;overflow:hidden}
}
</style>

let _sb = null;
const initSB = (u,k) => { _sb = window.supabase.createClient(u,k); return _sb; };

// ─── DB ───────────────────────────────────────────────────────────────────────
const DB = {
  getAll: async (t) => {
    const {data,error} = await _sb.from(t).select("id,data").order("id");
    if (error) throw error;
    return (data||[]).map(r => ({...r.data, id:r.id}));
  },
  put: async (t,item) => {
    const {error} = await _sb.from(t).upsert({id:item.id,data:item},{onConflict:"id"});
    if (error) throw error;
  },
  del: async (t,id) => {
    const {error} = await _sb.from(t).delete().eq("id",id);
    if (error) throw error;
  },
  seed: async (t,rows) => {
    const {count,error} = await _sb.from(t).select("id",{count:"exact",head:true});
    if (!error && count===0) { for (const r of rows) await DB.put(t,r); }
  }
};

// ─── PRINT HELPER ─────────────────────────────────────────────────────────────
function printDoc(htmlContent, sizeMode) {
  const el = document.getElementById("bill-print");
  el.style.display = "block";
  let wrapStyle = "font-family:Arial,sans-serif;padding:16px;color:#000;background:#fff;";
  if(sizeMode==="thermal80") wrapStyle += "max-width:300px;margin:0 auto;font-family:'Courier New',monospace;font-size:12px;";
  else if(sizeMode==="thermal58") wrapStyle += "max-width:220px;margin:0 auto;font-family:'Courier New',monospace;font-size:10px;";
  else if(sizeMode==="a5") wrapStyle += "max-width:148mm;margin:0 auto;font-size:11px;";
  else wrapStyle += "max-width:210mm;margin:0 auto;"; // a4
  el.innerHTML = "<div style='" + wrapStyle + "'>" + htmlContent + "</div>";
  window.print();
  setTimeout(()=>{ el.style.display="none"; el.innerHTML=""; }, 1500);
}

//  SETUP SCREEN
// ═══════════════════════════════════════════════════════════════════════
function SetupScreen({onConnected}) {
  const [step,setStep]=useState(1), [url,setUrl]=useState(""), [key,setKey]=useState(""), [busy,setBusy]=useState(false), [err,setErr]=useState(""), [copied,setCopied]=useState(false);
  const SQL=["create table if not exists users(id bigint primary key,data jsonb not null);","create table if not exists products(id bigint primary key,data jsonb not null);","create table if not exists sales(id bigint primary key,data jsonb not null);","create table if not exists cheques(id bigint primary key,data jsonb not null);","create table if not exists companies(id bigint primary key,data jsonb not null);","create table if not exists expenses(id bigint primary key,data jsonb not null);","alter table users disable row level security;","alter table products disable row level security;","alter table sales disable row level security;","alter table cheques disable row level security;","alter table companies disable row level security;","alter table expenses disable row level security;"].join("\n");
  const copySQL=()=>{navigator.clipboard.writeText(SQL);setCopied(true);setTimeout(()=>setCopied(false),2500);};
  const connect=async()=>{
    if(!url.trim()||!key.trim()){setErr("Both fields required");return;}
    setBusy(true);setErr("");
    try{initSB(url.trim(),key.trim());await DB.getAll("users");saveCfg(url.trim(),key.trim());onConnected();}
    catch(e){setErr("Connection failed: "+e.message);}
    setBusy(false);
  };
  return (<div style={{minHeight:"100vh",background:"#0f0f0f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
    <div className="floatAnim" style={{marginBottom:24}}><NipponLogo size={80} glow={true}/></div>
    <h1 style={{fontSize:20,fontWeight:900,color:"#fff",marginBottom:4,letterSpacing:1}}>NIPPON ELECTRICALS</h1>
    <p style={{color:"#888",marginBottom:28,fontSize:12}}>Smart POS — First Time Setup</p>
    <div style={{width:"100%",maxWidth:440}}>
      {step===1&&(<div style={{background:"#1a1a1a",borderRadius:16,padding:22,border:"1px solid #2a2a2a",marginBottom:16}}>
        <h2 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Step 1 — Setup Supabase Database</h2>
        {[["1","Go to supabase.com and create a New Project"],["2","Open SQL Editor and click New Query"],["3","Paste the SQL script below and click RUN"],["4","Go to Project Settings → API and copy URL and Anon Key"]].map(([n,t])=>(<div key={n} style={{display:"flex",gap:10,marginBottom:10}}><div style={{width:24,height:24,borderRadius:"50%",background:C.red,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0}}>{n}</div><p style={{fontSize:13,lineHeight:1.5,paddingTop:3}}>{t}</p></div>))}
        <div style={{background:"#0d1117",borderRadius:10,padding:12,border:"1px solid #2a2a2a",marginTop:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:1}}>SQL Script</span><button onClick={copySQL} style={{background:copied?C.green:"#2a2a2a",border:"none",borderRadius:6,padding:"4px 10px",color:"#fff",fontSize:11,cursor:"pointer",fontWeight:700}}>{copied?"Copied!":"Copy SQL"}</button></div>
          <pre style={{fontSize:9,color:"#7ee787",overflow:"auto",maxHeight:140,margin:0,lineHeight:1.6,whiteSpace:"pre-wrap",fontFamily:'"Space Mono",monospace'}}>{SQL}</pre>
        </div>
      </div>)}
      {step===1&&<Btn ch="Done — Next Step" onClick={()=>setStep(2)} full sz="lg"/>}
      {step===2&&(<><div style={{background:"#1a1a1a",borderRadius:16,padding:22,border:"1px solid #2a2a2a",marginBottom:16}}>
        <h2 style={{fontSize:15,fontWeight:700,marginBottom:4}}>Step 2 — Connect to Supabase</h2>
        <p style={{fontSize:12,color:"#888",marginBottom:16,lineHeight:1.6}}>Find in: Supabase → Project Settings → API</p>
        <Inp lbl="Project URL" val={url} set={setUrl} ph="https://xxxx.supabase.co" req/>
        <Inp lbl="Anon / Public Key" val={key} set={setKey} ph="eyJhbGciOi..." req onEnter={connect}/>
        {err&&<div style={{background:"#3a1a1a",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#ff8888",lineHeight:1.5,marginTop:4}}>{err}</div>}
      </div>
      <div style={{display:"flex",gap:10}}><Btn ch="Back" col="#252525" onClick={()=>setStep(1)} sz="lg"/><Btn ch={busy?"Connecting...":"Connect & Launch"} onClick={connect} dis={busy} st={{flex:1}} sz="lg"/></div></>)}
    </div>
  </div>);
}

//  LOGIN PAGE
// ═══════════════════════════════════════════════════════════════════════
function LoginPage() {
  const {users,login,toast2}=useApp();
  const [username,setUsername]=useState(""), [password,setPassword]=useState(""), [err,setErr]=useState(""), [busy,setBusy]=useState(false);
  const doLogin=()=>{
    const u=username.trim(), p=password;
    if(!u||!p){setErr("Enter username and password");return;}
    setBusy(true);setErr("");
    setTimeout(()=>{
      let found=null;
      if(users&&users.length>0) found=users.find(x=>x.username===u&&x.password===p&&x.active!==false);
      if(!found&&u==="admin"&&p==="admin123") found={id:1,name:"Admin",username:"admin",role:"admin",active:true,avatar:"A"};
      if(found){login(found);}
      else{setErr("Incorrect username or password. Try: admin / admin123");toast2("Login failed","error");}
      setBusy(false);
    },150);
  };
  const hk=e=>{if(e.key==="Enter")doLogin();};
  return (<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,background:"linear-gradient(160deg,#1a0000 0%,#0f0f0f 60%)"}}>
    <div className="floatAnim" style={{marginBottom:20}}><NipponLogo size={88} glow={true}/></div>
    <h1 style={{fontSize:22,fontWeight:900,letterSpacing:1,marginBottom:6,color:"#fff"}}>NIPPON ELECTRICALS</h1>
    <p style={{color:"#888",marginBottom:32,fontSize:12}}>Smart Point of Sale System</p>
    <div style={{width:"100%",maxWidth:360,background:"#1a1a1a",borderRadius:18,padding:28,border:"1px solid #2a2a2a",boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
      <h2 style={{fontSize:16,fontWeight:700,marginBottom:22}}>Sign In</h2>
      <div style={{marginBottom:14}}>
        <label style={{display:"block",fontSize:11,color:"#888",marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>Username</label>
        <input type="text" value={username} placeholder="Enter username" autoComplete="username" autoCapitalize="none" autoCorrect="off" spellCheck="false"
          onChange={e=>{setUsername(e.target.value);setErr("");}} onKeyDown={hk}
          style={{width:"100%",background:"#242424",border:"1.5px solid #2a2a2a",borderRadius:10,padding:"13px 15px",color:"#f0f0f0",fontSize:15,outline:"none",boxSizing:"border-box",transition:"border-color 0.2s",fontFamily:"inherit"}}
          onFocus={e=>e.target.style.borderColor="#CC0000"} onBlur={e=>e.target.style.borderColor="#2a2a2a"}/>
      </div>
      <div style={{marginBottom:20}}>
        <label style={{display:"block",fontSize:11,color:"#888",marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>Password</label>
        <input type="password" value={password} placeholder="Enter password" autoComplete="current-password"
          onChange={e=>{setPassword(e.target.value);setErr("");}} onKeyDown={hk}
          style={{width:"100%",background:"#242424",border:"1.5px solid #2a2a2a",borderRadius:10,padding:"13px 15px",color:"#f0f0f0",fontSize:15,outline:"none",boxSizing:"border-box",transition:"border-color 0.2s",fontFamily:"inherit"}}
          onFocus={e=>e.target.style.borderColor="#CC0000"} onBlur={e=>e.target.style.borderColor="#2a2a2a"}/>
      </div>
      {err&&(<div style={{background:"#3a1a1a",border:"1px solid #cc000055",borderRadius:8,padding:"10px 14px",marginBottom:18}}><p style={{color:"#ff8888",fontSize:13,textAlign:"center",margin:0}}>{err}</p></div>)}
      <button onClick={doLogin} disabled={busy}
        style={{width:"100%",background:busy?"#555":C.red,border:"none",borderRadius:10,padding:"14px",color:"#fff",fontSize:15,fontWeight:700,cursor:busy?"not-allowed":"pointer",letterSpacing:0.3,transition:"background 0.2s",fontFamily:"inherit"}}
        onMouseDown={e=>{if(!busy)e.currentTarget.style.transform="scale(0.98)";}} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}>
        {busy?"Signing in...":"Login"}
      </button>
      <div style={{marginTop:18,background:"#242424",borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
        <p style={{color:"#888",fontSize:11,marginBottom:4}}>Default credentials</p>
        <p style={{color:"#f0f0f0",fontSize:13,fontFamily:'"Space Mono",monospace',fontWeight:700}}>admin / admin123</p>
      </div>
    </div>
  </div>);
}

// ═══════════════════════════════════════════════════════════════════════
function Nav({pg,setPg,user}){
  const {logout}=useApp();
  const doLogout=()=>{if(window.confirm("Log out of Nippon POS?"))logout();};
  const base=[["dash","home","Home"],["pos","pos","POS"],["prod","box","Products"]];
  const mgr=[["comp","bldg","Suppliers"],["chq","chq","Cheques"],["exp","exp","Expenses"],["quot","tag","Quote"]];
  const adm=[["accts","users","Users"]];
  const tabs=[...base,...(user.role!=="cashier"?mgr:[]),...(user.role==="admin"?adm:[])];
  return (<>
    {/* ── Sidebar (desktop) ── */}
    <aside className="ne-sidebar">
      <div className="nb-brand">
        <NipponLogo size={36}/>
        <div>
          <div style={{fontWeight:900,fontSize:13,color:"#fff",letterSpacing:.5}}>NIPPON</div>
          <div style={{fontSize:10,color:"#888"}}>Electricals POS</div>
        </div>
      </div>
      <div className="nb-list">
        {tabs.map(([id,ic,lb])=>(
          <button key={id} onClick={()=>setPg(id)} className={"nb-item"+(pg===id?" on":"")}>
            <Ic n={ic} s={17} c={pg===id?"#CC0000":"#777"}/>
            <span>{lb}</span>
          </button>
        ))}
      </div>
      <div className="nb-foot">
        <div style={{padding:"2px 16px 8px",fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:.5,fontWeight:600}}>
          {user.name} · {user.role}
        </div>
        <button onClick={doLogout} className="nb-item danger">
          <Ic n="logout" s={17} c="#ff6666"/><span>Logout</span>
        </button>
      </div>
    </aside>
    {/* ── Bottom nav (mobile) ── */}
    <nav className="ne-botnav">
      {tabs.map(([id,ic,lb])=>{
        const act=pg===id;
        return (
          <button key={id} onClick={()=>setPg(id)} style={{flex:1,padding:"9px 2px 7px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div className={act?"navActive":""}><Ic n={ic} s={18} c={act?"#CC0000":"#888"}/></div>
            <span style={{fontSize:8,color:act?"#CC0000":"#888",fontWeight:act?700:400}}>{lb}</span>
            {act&&<div style={{width:4,height:4,borderRadius:"50%",background:"#CC0000"}}/>}
          </button>
        );
      })}
      <button onClick={doLogout} style={{flex:1,padding:"9px 2px 7px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
        <Ic n="logout" s={18} c="#ff6666"/>
        <span style={{fontSize:8,color:"#ff6666"}}>Logout</span>
      </button>
    </nav>
  </>);
}

function Dashboard() {
  const {user,products,sales,cheques,expenses}=useApp();
  const todaySales=sales.filter(s=>s.date===today());
  const todayRev=todaySales.reduce((a,s)=>a+s.total,0);
  const month=today().slice(0,7);
  const monthRev=sales.filter(s=>s.date&&s.date.startsWith(month)).reduce((a,s)=>a+s.total,0);
  const monthExp=(expenses||[]).filter(e=>e.date&&e.date.startsWith(month)).reduce((a,e)=>a+e.amount,0);
  const lowStock=products.filter(p=>p.active&&p.stock<=(p.minStock||10));
  const pendCheques=cheques.filter(c=>c.status==="pending");
  return (<div style={{paddingBottom:90}}>
    <div className="slideDown" style={{background:"linear-gradient(135deg,"+C.red+" 0%,#7A0000 100%)",padding:"18px 16px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-8,right:-10,opacity:0.07}}><NipponLogo size={100}/></div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <NipponLogo size={48}/>
        <div>
          <p style={{fontSize:10,color:"#ffbbbb",letterSpacing:0.8}}>{new Date().toLocaleDateString("en-LK",{weekday:"long",day:"numeric",month:"short"})}</p>
          <h1 style={{fontSize:17,fontWeight:900,color:"#fff",letterSpacing:0.5}}>NIPPON ELECTRICALS</h1>
          <p style={{fontSize:11,color:"#ffcccc"}}>Hello {user.name} — {user.role.toUpperCase()}</p>
        </div>
      </div>
    </div>
    <div style={{padding:"14px 14px 0"}}>
      <p style={{fontSize:10,color:"#888",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Today</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <StatBox lbl="Today Revenue" val={lkrK(todayRev)} col={C.green} icon="coin"/>
        <StatBox lbl="Today Sales" val={todaySales.length} col={C.blue} icon="pos"/>
        <StatBox lbl="Month Revenue" val={lkrK(monthRev)} col={C.gold} icon="coin"/>
        <StatBox lbl="Month Expenses" val={lkrK(monthExp)} col={C.red} icon="exp"/>
      </div>
      {pendCheques.length>0&&(<div style={{background:"#1a1500",border:"1px solid "+C.gold+"44",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}><Ic n="chq" s={18} c={C.gold}/><span style={{fontSize:13,color:C.gold}}><strong>{pendCheques.length}</strong> pending cheques</span></div>)}
      {lowStock.length>0&&(<div style={{background:"#1a0e00",border:"1px solid "+C.orange+"44",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
        <p style={{fontSize:12,color:C.orange,fontWeight:700,marginBottom:6}}>Low Stock Alert</p>
        {lowStock.slice(0,4).map(p=><p key={p.id} style={{fontSize:12,marginBottom:2}}>{p.name} — {p.stock} {p.unit}</p>)}
        {lowStock.length>4&&<p style={{fontSize:11,color:"#888"}}>+{lowStock.length-4} more</p>}
      </div>)}
      <div style={{background:"#1a1a1a",borderRadius:12,padding:"12px 14px",border:"1px solid #2a2a2a"}}>
        <p style={{fontSize:11,color:"#888",letterSpacing:0.5,textTransform:"uppercase",marginBottom:10}}>Recent Sales</p>
        {sales.length===0?<p style={{color:"#888",fontSize:12,textAlign:"center",padding:10}}>No sales yet</p>
          :sales.slice(-5).reverse().map(s=>(<div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:8,marginBottom:8,borderBottom:"1px solid #2a2a2a"}}>
            <div><p style={{fontSize:13,fontWeight:700}}>{s.customer}</p><p style={{fontSize:10,color:"#888"}}>{s.invoiceNo} · {s.date}</p></div>
            <span style={{fontFamily:'"Space Mono",monospace',fontWeight:900,color:C.green,fontSize:13}}>{lkr(s.total)}</span>
          </div>))}
      </div>
    </div>
  </div>);
}

// ═══════════════════════════════════════════════════════════════════════
//  POS PAGE
// ═══════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════
//  POS PAGE  — Two-column on desktop, tabs on mobile
// ═══════════════════════════════════════════════════════════════════════
function POSPage({cartRef,onCheckoutDone}){
  const {products,user,onSaleComplete,toast2}=useApp();

  // ── Persistent saved custom products ──────────────────────────────
  const [savedCustoms,setSavedCustoms]=useState(()=>{try{return JSON.parse(localStorage.getItem("ne_custom_prods")||"[]");}catch{return[];}});
  const saveCustomProd=p=>{if(savedCustoms.find(c=>c.name.toLowerCase()===p.name.toLowerCase()))return;const u=[...savedCustoms,p];setSavedCustoms(u);localStorage.setItem("ne_custom_prods",JSON.stringify(u));};
  const removeCustomProd=id=>{const u=savedCustoms.filter(c=>c.id!==id);setSavedCustoms(u);localStorage.setItem("ne_custom_prods",JSON.stringify(u));};

  // ── Pinned catalog items ───────────────────────────────────────────
  const [favs,setFavs]=useState(()=>{try{return JSON.parse(localStorage.getItem("ne_favs")||"[]");}catch{return[];}});
  const toggleFav=id=>{const n=favs.includes(id)?favs.filter(x=>x!==id):[...favs,id];setFavs(n);localStorage.setItem("ne_favs",JSON.stringify(n));};

  // ── Cart (shared via ref so parent can read without remounting) ────
  const [cart,setCart]=useState(cartRef.current||[]);
  useEffect(()=>{cartRef.current=cart;},[cart]);

  const [srch,setSrch]=useState("");
  const [cust,setCust]=useState("Walk-in Customer");
  const [pay,setPay]=useState("cash");
  const [disc,setDisc]=useState("");
  const [paid,setPaid]=useState("");
  const [mobileTab,setMobileTab]=useState("products"); // mobile only
  const [prodTab,setProdTab]=useState("products");     // desktop product panel tabs
  const [catFlt,setCatFlt]=useState("All");
  const [chqNo,setChqNo]=useState("");
  const [chqBk,setChqBk]=useState("");
  const [busy,setBusy]=useState(false);
  const [badge,setBadge]=useState(0);
  const [supFlt,setSupFlt]=useState("All");
  const [catSrch,setCatSrch]=useState("");
  const [cableModal,setCableModal]=useState(null);
  const [cableM,setCableM]=useState("");
  const [showCustom,setShowCustom]=useState(false);
  const [custItem,setCustItem]=useState({name:"",price:"",qty:"1",unit:"pcs"});
  const [saveToList,setSaveToList]=useState(true);

  const dbProds=products.filter(p=>p.active&&(catFlt==="All"||p.category===catFlt)&&(!srch||p.name.toLowerCase().includes(srch.toLowerCase())));
  const favCatItems=SUPPLIER_CATALOG.filter(i=>favs.includes(i.id)&&(catFlt==="All"||i.cat===catFlt)&&(!srch||i.name.toLowerCase().includes(srch.toLowerCase())));
  const myCustomList=savedCustoms.filter(c=>!srch||c.name.toLowerCase().includes(srch.toLowerCase()));
  const catalogList=SUPPLIER_CATALOG.filter(i=>(supFlt==="All"||i.sup===supFlt)&&(!catSrch||i.name.toLowerCase().includes(catSrch.toLowerCase())));
  const hasProds=dbProds.length>0||favCatItems.length>0||myCustomList.length>0;

  const discN=Math.max(0,parseFloat(disc)||0);
  const sub=cart.reduce((a,i)=>a+i.price*i.qty,0);
  const total=Math.max(0,sub-discN);
  const change=parseFloat(paid||0)-total;
  const cnt=cart.reduce((a,i)=>a+i.qty,0);

  const addToCart=item=>{setCart(prev=>{const ex=prev.find(i=>i.pid===item.pid);if(ex)return prev.map(i=>i.pid===item.pid?{...i,qty:i.qty+1}:i);return[...prev,item];});setBadge(k=>k+1);};
  const addDbProd=p=>{if(p.stock<=0){toast2("Out of stock!","error");return;}addToCart({pid:p.id,name:p.name,price:p.price,qty:1,tax:p.taxRate||0,sku:p.sku||"",maxStock:p.stock});toast2(p.name.slice(0,22)+" added","success");};
  const addSavedCustom=c=>{addToCart({pid:"sc_"+c.id,name:c.name,price:c.price,qty:1,tax:0,unit:c.unit,isCustom:true});toast2(c.name.slice(0,22)+" added","success");};
  const addCatItem=item=>{
    if(isCable(item)){setCableModal({item,pricePerM:item.cost/100});setCableM("");return;}
    addToCart({pid:"cat_"+item.id,name:item.name,price:Math.ceil(item.cost*1.25/10)*10,qty:1,tax:0,sku:item.id,unit:item.unit||"pcs"});
    toast2(item.name.slice(0,22)+" added","success");
  };
  const confirmCable=m=>{
    const meters=parseFloat(m);if(!meters||meters<=0){toast2("Enter meters","error");return;}
    const{item,pricePerM}=cableModal;
    const pid="cat_"+item.id+"_"+meters+"m";
    const price=Math.ceil(Math.ceil(pricePerM*1.25*10)/10*meters/10)*10;
    setCart(prev=>{const ex=prev.find(i=>i.pid===pid);if(ex)return prev.map(i=>i.pid===pid?{...i,qty:i.qty+1}:i);return[...prev,{pid,name:item.name+" ("+meters+"m)",price,qty:1,tax:0,unit:"m"}];});
    setBadge(k=>k+1);toast2(item.name.slice(0,20)+" "+meters+"m added","success");setCableModal(null);
  };
  const addCustomItem=()=>{
    if(!custItem.name.trim()||!custItem.price){toast2("Name and price required","error");return;}
    const pid="custom_"+uid();
    setCart(prev=>[...prev,{pid,name:custItem.name.trim(),price:parseFloat(custItem.price),qty:parseInt(custItem.qty)||1,tax:0,unit:custItem.unit,isCustom:true}]);
    setBadge(k=>k+1);toast2(custItem.name.slice(0,22)+" added","success");
    if(saveToList)saveCustomProd({id:uid(),name:custItem.name.trim(),price:parseFloat(custItem.price),unit:custItem.unit,createdAt:today()});
    setCustItem({name:"",price:"",qty:"1",unit:"pcs"});setSaveToList(true);setShowCustom(false);
  };
  const updQty=(pid,d)=>setCart(prev=>prev.map(i=>i.pid===pid?{...i,qty:Math.max(1,i.qty+d)}:i));
  const remItem=pid=>setCart(prev=>prev.filter(i=>i.pid!==pid));
  const newBill=()=>{
    if(!cart.length){setMobileTab("products");setProdTab("products");return;}
    if(window.confirm("Clear cart for new bill?")){
      setCart([]);setDisc("");setPaid("");setChqNo("");setChqBk("");
      setCust("Walk-in Customer");setPay("cash");
      setMobileTab("products");setProdTab("products");
    }
  };
  const checkout=async()=>{
    if(!cart.length){toast2("Cart is empty!","error");return;}
    if(pay==="cash"&&parseFloat(paid||0)<total){toast2("Amount paid is less!","error");return;}
    if(pay==="cheque"&&(!chqNo||!chqBk)){toast2("Enter cheque details!","error");return;}
    setBusy(true);
    try{
      const inv={id:uid(),date:today(),customer:cust.trim()||"Walk-in Customer",items:[...cart],subtotal:sub,total,discount:discN,paid:parseFloat(paid||total),change:Math.max(0,change),paymentMode:pay,cashier:user.username,status:"completed",invoiceNo:"NE-"+today().replace(/-/g,"").slice(2)+"-"+String(uid()).slice(-4),chqDet:pay==="cheque"?{no:chqNo,bank:chqBk}:null,createdAt:new Date().toISOString()};
      await onSaleComplete(inv);
      setCart([]);setDisc("");setPaid("");setChqNo("");setChqBk("");
      setCust("Walk-in Customer");setPay("cash");
      onCheckoutDone(inv);
    }catch(e){toast2("Checkout failed: "+e.message,"error");}
    setBusy(false);
  };

  // ── Products list (shared by both panels) ─────────────────────────
  const ProductsList=()=>(<div style={{flex:1,overflow:"auto",padding:"8px 10px"}}>
    {!hasProds&&<div style={{textAlign:"center",color:"#888",padding:"28px 16px"}}>
      <Ic n="box" s={44} c="#888"/><p style={{marginTop:10,fontSize:14,fontWeight:700,color:"#f0f0f0"}}>No products yet</p>
      <p style={{fontSize:12,marginTop:8,lineHeight:1.9,color:"#888"}}>① Add in <b style={{color:"#fff"}}>Products</b> page<br/>② Pin items with ⭐ in <b style={{color:"#fff"}}>Catalog</b> tab<br/>③ Tap <b style={{color:"#1976D2"}}>Custom</b> to add any item</p>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:14,flexWrap:"wrap"}}>
        <Btn ch="Open Catalog" col={C.red} onClick={()=>{setProdTab("catalog");setMobileTab("catalog");}} sz="sm"/>
        <Btn ch={<><Ic n="pencil" s={12} c="#fff"/>Custom Item</>} col={C.blue} onClick={()=>setShowCustom(true)} sz="sm"/>
      </div>
    </div>}
    {myCustomList.length>0&&<div style={{marginBottom:8}}>
      <div style={{fontSize:9,color:C.blue,letterSpacing:1,textTransform:"uppercase",marginBottom:6,display:"flex",gap:5,alignItems:"center"}}><Ic n="pencil" s={10} c={C.blue}/>Custom Items</div>
      {myCustomList.map(c=>{const inCart=cart.find(x=>x.pid==="sc_"+c.id);return(<div key={c.id} className="fadeUp" style={{background:inCart?"#0d1a2a":"#1a1a2a",borderRadius:10,padding:"9px 12px",marginBottom:6,border:"1px solid "+(inCart?C.blue+"88":"#2a2a44"),display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{c.name}</div><div style={{display:"flex",gap:5,marginTop:2}}><span style={{background:C.blue+"22",color:C.blue,border:"1px solid "+C.blue+"44",borderRadius:3,padding:"1px 5px",fontSize:9,fontWeight:700}}>CUSTOM</span><span style={{fontSize:12,fontWeight:700,color:C.blue,fontFamily:'"Space Mono",monospace'}}>{lkr(c.price)}</span></div></div>
        <button onClick={()=>removeCustomProd(c.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#555",fontSize:14,padding:"2px 5px"}}>🗑</button>
        <div onClick={()=>addSavedCustom(c)} style={{background:inCart?C.blue:C.red,borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:16,cursor:"pointer",flexShrink:0}}>{inCart?inCart.qty:"+"}</div>
      </div>);})}
      {(favCatItems.length>0||dbProds.length>0)&&<div style={{borderBottom:"1px solid #2a2a2a",margin:"6px 0 10px"}}/>}
    </div>}
    {favCatItems.length>0&&<div style={{marginBottom:8}}>
      <div style={{fontSize:9,color:C.gold,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>⭐ Pinned Catalog</div>
      {favCatItems.map(item=>{const inCart=cart.find(c=>c.pid==="cat_"+item.id||c.pid.startsWith("cat_"+item.id+"_"));const sc=SUP_COL[item.sup]||"#888";const cable=isCable(item);return(<div key={item.id} className="fadeUp" onClick={()=>addCatItem(item)} style={{background:inCart?"#1a1000":"#1a1a1a",borderRadius:10,padding:"9px 12px",marginBottom:6,border:"1px solid "+(inCart?C.gold+"88":"#3a3a00"),display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
        <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,marginBottom:2}}>{item.name}</div><div style={{display:"flex",gap:5,flexWrap:"wrap"}}><span style={{background:sc+"22",color:sc,border:"1px solid "+sc+"44",borderRadius:3,padding:"1px 5px",fontSize:9,fontWeight:700}}>{item.sup}</span>{cable&&<span style={{fontSize:9,color:C.gold}}>📏/m</span>}<span style={{fontSize:11,fontWeight:700,color:C.red,fontFamily:'"Space Mono",monospace'}}>Rs.{Math.ceil(item.cost*1.25/10)*10}/{cable?"m":item.unit}</span></div></div>
        <div style={{display:"flex",flexDirection:"column",gap:3,alignItems:"center"}}><div style={{background:inCart?C.gold:C.red,borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:cable?11:16}}>{cable?"📏":"+"}</div><button onClick={e=>{e.stopPropagation();toggleFav(item.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:9,color:C.gold,padding:0}}>unpin</button></div>
      </div>);})}
      {dbProds.length>0&&<div style={{borderBottom:"1px solid #2a2a2a",margin:"6px 0 10px"}}/>}
    </div>}
    {dbProds.length>0&&dbProds.map(p=>{const inCart=cart.find(c=>c.pid===p.id);return(<div key={p.id} className="fadeUp" onClick={()=>addDbProd(p)} style={{background:inCart?"#1a1000":"#1a1a1a",borderRadius:10,padding:"10px 12px",marginBottom:7,border:"1px solid "+(inCart?C.gold+"88":"#2a2a2a"),display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
      <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{p.name}</div><div style={{display:"flex",gap:7,alignItems:"center"}}><span style={{fontSize:13,fontWeight:900,color:C.red,fontFamily:'"Space Mono",monospace'}}>{lkr(p.price)}</span><span style={{fontSize:10,color:p.stock<=(p.minStock||10)?C.orange:"#888"}}>Stk: {p.stock}</span></div></div>
      <div style={{background:inCart?C.gold:C.red,borderRadius:8,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:16,flexShrink:0}}>{inCart?inCart.qty:"+"}</div>
    </div>);})}
  </div>);

  // ── Catalog panel ─────────────────────────────────────────────────
  const CatalogPanel=()=>(<div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column",minHeight:0}}>
    <div style={{padding:"8px 12px 6px",background:"#0f0f0f",borderBottom:"1px solid #2a2a2a",flexShrink:0}}>
      <div style={{position:"relative",marginBottom:7}}><div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}><Ic n="srch" s={13} c="#888"/></div><input value={catSrch} onChange={e=>setCatSrch(e.target.value)} placeholder="Search catalog..." style={{width:"100%",background:"#242424",border:"1px solid #2a2a2a",borderRadius:8,padding:"7px 10px 7px 30px",color:"#f0f0f0",fontSize:13,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/></div>
      <div style={{display:"flex",gap:5,overflow:"auto"}}>{SSUPS.map(s=><button key={s} onClick={()=>setSupFlt(s)} style={{background:supFlt===s?C.red:"#2a2a2a",border:"none",borderRadius:14,padding:"4px 10px",color:"#fff",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontWeight:supFlt===s?700:400,flexShrink:0}}>{s}</button>)}</div>
    </div>
    <div style={{padding:"3px 12px",fontSize:10,color:"#888",background:"#0f0f0f",borderBottom:"1px solid #2a2a2a",flexShrink:0}}>{catalogList.length} items · ⭐ pin to My Products · 📏 cables by meter</div>
    <div style={{flex:1,overflow:"auto",padding:"8px 10px"}}>
      {catalogList.map(item=>{const inCart=cart.find(c=>c.pid==="cat_"+item.id||c.pid.startsWith("cat_"+item.id+"_"));const sc=SUP_COL[item.sup]||"#888";const cable=isCable(item);const pinned=favs.includes(item.id);return(<div key={item.id} className="fadeUp" style={{background:inCart?"#1a1000":"#1a1a1a",borderRadius:10,padding:"9px 12px",marginBottom:6,border:"1px solid "+(inCart?C.gold+"88":"#2a2a2a"),display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:700,marginBottom:2}}>{item.name}</div><div style={{display:"flex",gap:5,flexWrap:"wrap"}}><span style={{background:sc+"22",color:sc,border:"1px solid "+sc+"44",borderRadius:3,padding:"1px 5px",fontSize:9,fontWeight:700}}>{item.sup}</span>{cable&&<span style={{background:C.gold+"22",color:C.gold,borderRadius:3,padding:"1px 5px",fontSize:9}}>📏</span>}<span style={{fontSize:10,color:"#888"}}>{lkr(item.cost)}/{cable?"roll":item.unit}</span></div></div>

        </div>

      </div>
    </div>}
  </div>);
}

      "<thead><tr style='background:"+(isT?"#000":"#CC0000")+";color:#fff'>" +
        "<th style='padding:"+(isT?"4px 2px":"8px 10px")+";text-align:left;font-size:"+(isT?"9":"11")+"px'>Item</th>" +
        "<th style='padding:"+(isT?"4px 2px":"8px 10px")+";text-align:center;font-size:"+(isT?"9":"11")+"px'>Qty</th>" +
        "<th style='padding:"+(isT?"4px 2px":"8px 10px")+";text-align:right;font-size:"+(isT?"9":"11")+"px'>Price</th>" +
        "<th style='padding:"+(isT?"4px 2px":"8px 10px")+";text-align:right;font-size:"+(isT?"9":"11")+"px'>Total</th>" +
      "</tr></thead><tbody>" + items + "</tbody></table>";
    const totals = "<div style='border-top:2px solid #CC0000;padding-top:8px;margin-top:8px'>" +
      "<div style='display:flex;justify-content:space-between;font-size:"+(isT?"10":"12")+"px;margin-bottom:3px'><span>Subtotal</span><span>Rs." + Number(sale.subtotal).toFixed(2) + "</span></div>" +
      (sale.discount>0?"<div style='display:flex;justify-content:space-between;font-size:"+(isT?"10":"12")+"px;margin-bottom:3px;color:#CC0000'><span>Discount</span><span>- Rs." + Number(sale.discount).toFixed(2) + "</span></div>":"") +
      "<div style='display:flex;justify-content:space-between;font-size:"+(isT?"13":"16")+"px;font-weight:900;color:#CC0000;margin-top:5px'><span>TOTAL</span><span>Rs." + Number(sale.total).toFixed(2) + "</span></div>" +
      "<div style='display:flex;justify-content:space-between;font-size:"+(isT?"10":"12")+"px;margin-top:5px;color:#555'><span>Payment</span><span>" + sale.paymentMode.toUpperCase() + " — Rs." + Number(sale.paid).toFixed(2) + "</span></div>" +
      (sale.paymentMode==="cash"&&sale.change>0?"<div style='display:flex;justify-content:space-between;font-size:"+(isT?"10":"12")+"px;color:#555'><span>Change</span><span>Rs." + Number(sale.change).toFixed(2) + "</span></div>":"") +
      "</div>";
    const footer = isT
      ? "<div style='text-align:center;margin-top:12px;font-size:9px;color:#888;border-top:1px dashed #ccc;padding-top:8px'>Thank you for your purchase!<br/>Nippon Electricals — Sri Lanka</div>"
      : "<div style='margin-top:20px;padding:14px;background:#fff5f5;border-radius:10px;text-align:center;border:1px solid #CC000022'><p style='font-size:12px;color:#CC0000;font-weight:700;margin-bottom:4px'>Thank you for choosing Nippon Electricals!</p><p style='font-size:10px;color:#888'>All electrical supplies — Sri Lanka</p></div>";
    return brand + meta + tbl + totals + footer;
  };

  const doPrint = (size) => {
    printDoc(buildBillHTML(size), size);
  };

  return (<div style={{minHeight:"100vh",background:C.dark,paddingBottom:40}}>
    <div style={{maxWidth:700,margin:"0 auto"}}>
    <div style={{background:"linear-gradient(135deg,"+C.red+" 0%,#7A0000 100%)",padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
      <NipponLogo size={38}/>
      <div style={{flex:1}}><div style={{fontWeight:900,fontSize:16,color:"#fff"}}>Sale Complete!</div><div style={{fontSize:11,color:"#ffcccc"}}>{sale.invoiceNo}</div></div>
      <button onClick={()=>setShowPrintPicker(true)} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:10,padding:"8px 14px",cursor:"pointer",color:"#fff",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
        <Ic n="print" s={14} c="#fff"/>Print
      </button>
    </div>

    <div style={{padding:14}}>
      {/* Colourful summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <div style={{background:"linear-gradient(135deg,"+C.green+"22,"+C.green+"11)",border:"1px solid "+C.green+"44",borderRadius:14,padding:14}}>
          <div style={{fontSize:10,color:C.green,letterSpacing:0.5,textTransform:"uppercase",marginBottom:4}}>Total Collected</div>
          <div style={{fontSize:22,fontWeight:900,color:C.green,fontFamily:'"Space Mono",monospace'}}>{lkr(sale.total)}</div>
        </div>
        <div style={{background:"linear-gradient(135deg,"+C.blue+"22,"+C.blue+"11)",border:"1px solid "+C.blue+"44",borderRadius:14,padding:14}}>
          <div style={{fontSize:10,color:C.blue,letterSpacing:0.5,textTransform:"uppercase",marginBottom:4}}>Items Sold</div>
          <div style={{fontSize:22,fontWeight:900,color:C.blue,fontFamily:'"Space Mono",monospace'}}>{sale.items.reduce((a,i)=>a+i.qty,0)}</div>
        </div>
        {sale.discount>0&&<div style={{background:"linear-gradient(135deg,"+C.orange+"22,"+C.orange+"11)",border:"1px solid "+C.orange+"44",borderRadius:14,padding:14}}>
          <div style={{fontSize:10,color:C.orange,letterSpacing:0.5,textTransform:"uppercase",marginBottom:4}}>Discount Given</div>
          <div style={{fontSize:22,fontWeight:900,color:C.orange,fontFamily:'"Space Mono",monospace'}}>{lkr(sale.discount)}</div>
        </div>}
        {sale.paymentMode==="cash"&&sale.change>0&&<div style={{background:"linear-gradient(135deg,"+C.gold+"22,"+C.gold+"11)",border:"1px solid "+C.gold+"44",borderRadius:14,padding:14}}>
          <div style={{fontSize:10,color:C.gold,letterSpacing:0.5,textTransform:"uppercase",marginBottom:4}}>Change Given</div>
          <div style={{fontSize:22,fontWeight:900,color:C.gold,fontFamily:'"Space Mono",monospace'}}>{lkr(sale.change)}</div>
        </div>}
      </div>

      {/* Details */}
      <div style={{background:"#1a1a1a",borderRadius:14,padding:14,marginBottom:14,border:"1px solid #2a2a2a"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,paddingBottom:10,borderBottom:"1px solid #2a2a2a"}}>
          <div><div style={{fontSize:10,color:"#888",marginBottom:2}}>Invoice</div><div style={{fontWeight:700,color:C.red}}>{sale.invoiceNo}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#888",marginBottom:2}}>Customer</div><div style={{fontWeight:700}}>{sale.customer}</div></div>
        </div>
        <div style={{marginBottom:8,fontSize:11,color:"#888",textTransform:"uppercase",letterSpacing:0.5}}>Items ({sale.items.length})</div>
        {sale.items.map((item,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:7,marginBottom:7,borderBottom:"1px solid #242424"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600}}>{item.name}</div>
            <div style={{fontSize:11,color:"#888"}}>{item.qty} × {lkr(item.price)}</div>
          </div>
          <div style={{fontWeight:700,fontFamily:'"Space Mono",monospace',color:C.green,fontSize:13}}>{lkr(item.price*item.qty)}</div>
        </div>))}
        <div style={{paddingTop:8,borderTop:"1px solid #2a2a2a"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:13}}><span style={{color:"#888"}}>Subtotal</span><span>{lkr(sale.subtotal)}</span></div>
          {sale.discount>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:13}}><span style={{color:C.orange}}>Discount</span><span style={{color:C.orange}}>- {lkr(sale.discount)}</span></div>}
          <div style={{display:"flex",justifyContent:"space-between",fontSize:17,fontWeight:900,color:C.red,marginTop:4}}><span>TOTAL</span><span style={{fontFamily:'"Space Mono",monospace'}}>{lkr(sale.total)}</span></div>
        </div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <Btn ch={<><Ic n="plus" s={14} c="#fff"/>New Bill</>} onClick={onNewSale} col={C.green} full sz="lg"/>
      </div>
    </div>
    <PrintSizePicker open={showPrintPicker} onClose={()=>setShowPrintPicker(false)} onSelect={doPrint}/>
  </div></div>);
}

//  PRODUCTS PAGE
// ═══════════════════════════════════════════════════════════════════════
function ProductsPage() {
  const {products,upsertProduct,deleteProduct,toast2}=useApp();
  const [tab,setTab]=useState("mine");
  const [srch,setSrch]=useState("");
  const [catFlt,setCatFlt]=useState("All");
  const [showForm,setShowForm]=useState(false);
  const [ed,setEd]=useState(null);
  const [saving,setSaving]=useState(false);
  const [catSupFlt,setCatSupFlt]=useState("All");
  const [catSrch,setCatSrch]=useState("");
  const blank={name:"",sku:"",category:"Lighting",price:"",stock:"",unit:"pcs",taxRate:"0",minStock:"10",active:true,notes:""};
  const [f,setF]=useState(blank);
  const allCats=["All",...CATS];
  const filtered=products.filter(p=>(catFlt==="All"||p.category===catFlt)&&(!srch||p.name.toLowerCase().includes(srch.toLowerCase())));
  const catalogF=SUPPLIER_CATALOG.filter(i=>(catSupFlt==="All"||i.sup===catSupFlt)&&(!catSrch||i.name.toLowerCase().includes(catSrch.toLowerCase())));
  const openForm=(p=null)=>{setEd(p);setF(p?{...blank,...p,price:String(p.price),stock:String(p.stock),taxRate:String(p.taxRate||0),minStock:String(p.minStock||10)}:blank);setShowForm(true);};
  const save=async()=>{
    if(!f.name.trim()||!f.price){toast2("Name and price required","error");return;}
    setSaving(true);
    try{await upsertProduct({...f,id:ed?ed.id:uid(),price:parseFloat(f.price),stock:parseFloat(f.stock)||0,taxRate:parseFloat(f.taxRate)||0,minStock:parseFloat(f.minStock)||10,createdAt:ed?ed.createdAt:today()});toast2(ed?"Updated!":"Product added!","success");setShowForm(false);}
    catch(e){toast2("Failed: "+e.message,"error");}
    setSaving(false);
  };
  const addFromCatalog=async(item)=>{
    const sellPrice=Math.ceil(item.cost*1.25/10)*10;
    await upsertProduct({id:uid(),name:item.name,sku:item.id,category:item.cat,price:sellPrice,stock:0,unit:item.unit||"pcs",taxRate:0,minStock:10,active:true,notes:"Supplier: "+item.sup,createdAt:today()});
    toast2(item.name.slice(0,22)+" added to My Products","success");
  };
  return (<div style={{paddingBottom:90}}>
    <div style={{padding:"14px 14px 0",background:"#1a1a1a",borderBottom:"1px solid #2a2a2a",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:0,paddingBottom:0}}>
      <h2 style={{fontSize:16,fontWeight:900,padding:"14px 0 10px"}}>Products</h2>
      <div style={{display:"flex",gap:8}}>
        <ExportMenu onXLSX={()=>xlsxExp(products.map(p=>({Name:p.name,SKU:p.sku,Category:p.category,Price:p.price,Stock:p.stock,Unit:p.unit,Active:p.active})),"Products","products")} onPDF={()=>pdfExp("Products",["Name","Category","Price","Stock"].map(h=>({h,k:h.toLowerCase()})),products.map(p=>({name:p.name,category:p.category,price:lkr(p.price),stock:p.stock})),"products")}/>
        <Btn ch={<><Ic n="plus" s={14} c="#fff"/>Add</>} onClick={()=>openForm()} sz="sm"/>
      </div>
    </div>
    <Tabs tabs={[["mine","My Products ("+products.length+")"],["catalog","Supplier Catalog"]]} active={tab} setActive={setTab}/>
    {tab==="mine"&&(<><div style={{padding:"9px 12px",background:"#0f0f0f",borderBottom:"1px solid #2a2a2a"}}>
        <div style={{position:"relative",marginBottom:7}}><div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}><Ic n="srch" s={13} c="#888"/></div><input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Search products..." style={{width:"100%",background:"#242424",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 10px 8px 30px",color:"#f0f0f0",fontSize:13,outline:"none",fontFamily:"inherit"}}/></div>
        <div style={{display:"flex",gap:5,overflow:"auto"}}>{allCats.map(c=><button key={c} onClick={()=>setCatFlt(c)} style={{background:catFlt===c?C.red:"#2a2a2a",border:"none",borderRadius:16,padding:"4px 11px",color:"#fff",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontWeight:catFlt===c?700:400,flexShrink:0}}>{c}</button>)}</div>
      </div>
      <div style={{padding:"10px 12px"}}>
        {filtered.length===0?(<div style={{textAlign:"center",color:"#888",padding:40}}>
          <Ic n="box" s={44} c="#888"/><p style={{marginTop:12,fontSize:13}}>No products yet</p>
          <Btn ch="Add Product" onClick={()=>openForm()} col={C.red} st={{margin:"14px auto"}}/>
          <p style={{fontSize:11,color:"#888"}}>Or browse Supplier Catalog tab</p>
        </div>):filtered.map((p,i)=>(
          <div key={p.id} className="fadeUp" style={{background:"#1a1a1a",borderRadius:12,padding:12,marginBottom:8,border:"1px solid #2a2a2a",animationDelay:i*0.03+"s",opacity:p.active?1:0.5}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:44,height:44,borderRadius:10,background:C.red+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:18}}>💡</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{p.name}</div>
                <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontFamily:'"Space Mono",monospace',fontWeight:900,color:C.red,fontSize:13}}>{lkr(p.price)}</span>
                  <Badge ch={p.category} col={C.muted}/>
                  <span style={{fontSize:10,color:p.stock<=(p.minStock||10)?C.orange:"#888"}}>Stk: {p.stock} {p.unit}</span>
                </div>
              </div>
              <button onClick={()=>openForm(p)} style={{background:"#2a2a2a",border:"none",borderRadius:8,padding:"7px 9px",cursor:"pointer"}}><Ic n="edit" s={15}/></button>
            </div>
          </div>
        ))}
      </div>
    </>)}
    {tab==="catalog"&&(<><div style={{padding:"9px 12px",background:"#0f0f0f",borderBottom:"1px solid #2a2a2a"}}>
        <div style={{position:"relative",marginBottom:7}}><div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}><Ic n="srch" s={13} c="#888"/></div><input value={catSrch} onChange={e=>setCatSrch(e.target.value)} placeholder="Search catalog..." style={{width:"100%",background:"#242424",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 10px 8px 30px",color:"#f0f0f0",fontSize:13,outline:"none",fontFamily:"inherit"}}/></div>
        <div style={{display:"flex",gap:5,overflow:"auto"}}>{SSUPS.map(s=><button key={s} onClick={()=>setCatSupFlt(s)} style={{background:catSupFlt===s?C.red:"#2a2a2a",border:"none",borderRadius:14,padding:"4px 10px",color:"#fff",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontWeight:catSupFlt===s?700:400,flexShrink:0}}>{s}</button>)}</div>
      </div>
      <div style={{padding:"5px 12px",fontSize:10,color:"#888",background:"#0f0f0f",borderBottom:"1px solid #2a2a2a"}}>{catalogF.length} items — tap + to add to My Products</div>
      <div style={{padding:"8px 10px"}}>
        {catalogF.map((item,i)=>{
          const sc=SUP_COL[item.sup]||"#888";
          const cable=isCable(item);
          return (<div key={item.id} className="fadeUp" style={{background:"#1a1a1a",borderRadius:10,padding:"10px 12px",marginBottom:6,border:"1px solid #2a2a2a",display:"flex",alignItems:"center",gap:10,animationDelay:Math.min(i,20)*0.02+"s"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,lineHeight:1.3,marginBottom:3}}>{item.name}</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{background:sc+"22",color:sc,border:"1px solid "+sc+"44",borderRadius:3,padding:"1px 6px",fontSize:9,fontWeight:700}}>{item.sup}</span>
                {cable&&<span style={{background:C.gold+"22",color:C.gold,border:"1px solid "+C.gold+"44",borderRadius:3,padding:"1px 5px",fontSize:9,fontWeight:700}}>📏 Cable</span>}
                <span style={{fontSize:10,color:"#888"}}>Cost: {lkr(item.cost)}</span>
                <span style={{fontSize:10,color:C.green,fontWeight:700}}>Sell: {lkr(Math.ceil(item.cost*1.25/10)*10)}</span>
              </div>
            </div>
            <button onClick={()=>addFromCatalog(item)} style={{background:C.green+"22",border:"1px solid "+C.green+"44",borderRadius:8,width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:C.green,fontSize:18,flexShrink:0}}>+</button>
          </div>);
        })}
      </div>
    </>)}
    <Modal open={showForm} onClose={()=>setShowForm(false)} title={ed?"Edit Product":"Add Product"} ch={<>
      <Inp lbl="Product Name" val={f.name} set={v=>setF(p=>({...p,name:v}))} req/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Inp lbl="Price (Rs.)" val={f.price} set={v=>setF(p=>({...p,price:v}))} type="number" req/>
        <Inp lbl="Stock" val={f.stock} set={v=>setF(p=>({...p,stock:v}))} type="number"/>
      </div>
      <Sel lbl="Category" val={f.category} set={v=>setF(p=>({...p,category:v}))} opts={CATS}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Sel lbl="Unit" val={f.unit} set={v=>setF(p=>({...p,unit:v}))} opts={["pcs","m","roll","kg","box","set","pair"]}/>
        <Inp lbl="Min Stock Alert" val={f.minStock} set={v=>setF(p=>({...p,minStock:v}))} type="number"/>
      </div>
      <Inp lbl="SKU / Code" val={f.sku} set={v=>setF(p=>({...p,sku:v}))} ph="Optional"/>
      <Inp lbl="Tax Rate %" val={f.taxRate} set={v=>setF(p=>({...p,taxRate:v}))} type="number"/>
      <Textarea lbl="Notes" val={f.notes} set={v=>setF(p=>({...p,notes:v}))}/>
      <div style={{display:"flex",gap:10,marginTop:4}}>
        {ed&&<Btn ch={<><Ic n="del" s={13} c="#fff"/>{f.active?"Deactivate":"Activate"}</>} col="#333" onClick={()=>setF(p=>({...p,active:!p.active}))}/>}
        <Btn ch={saving?"Saving...":"Save Product"} onClick={save} dis={saving} full/>
        {ed&&<Btn ch={<><Ic n="del" s={13} c="#fff"/>Delete</>} col="#3a1a1a" onClick={async()=>{if(confirm("Delete this product?"))await deleteProduct(ed.id);setShowForm(false);}}/>}
      </div>
    </>}/>
  </div>);
}

    <div style={{padding:"14px",background:"#1a1a1a",borderBottom:"1px solid #2a2a2a"}}>

          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:44,height:44,borderRadius:12,background:tc+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🏢</div>

              <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>{c.name}</div>

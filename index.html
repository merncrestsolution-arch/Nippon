// ═══════════════════════════════════════════════════════════
//  DATABASE  (IndexedDB)
// ═══════════════════════════════════════════════════════════
const DB = (() => {
  let _db = null;
  const STORES = ['users','products','sales','cheques','companies'];
  const init = () => new Promise((ok,er) => {
    const r = indexedDB.open('NipponElectricals_v4', 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      STORES.forEach(s => { if (!d.objectStoreNames.contains(s)) d.createObjectStore(s,{keyPath:'id'}); });
    };
    r.onsuccess = e => { _db = e.target.result; ok(); };
    r.onerror = () => er(r.error);
  });
  const os = (s,m) => _db.transaction(s,m).objectStore(s);
  const getAll = s => new Promise((ok,er) => { const r=os(s,'readonly').getAll(); r.onsuccess=()=>ok(r.result||[]); r.onerror=()=>er(r.error); });
  const put   = (s,v) => new Promise((ok,er) => { const r=os(s,'readwrite').put(v); r.onsuccess=()=>ok(); r.onerror=()=>er(r.error); });
  const del   = (s,id) => new Promise((ok,er) => { const r=os(s,'readwrite').delete(id); r.onsuccess=()=>ok(); r.onerror=()=>er(r.error); });
  const cnt   = s => new Promise((ok,er) => { const r=os(s,'readonly').count(); r.onsuccess=()=>ok(r.result); r.onerror=()=>er(r.error); });
  const seed  = async (s,items) => { if((await cnt(s))===0) for(const i of items) await put(s,i); };
  return { init, getAll, put, del, seed };
})();

const compressImg = file => new Promise(res => {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1400;
      const ratio = Math.min(MAX/img.width, MAX/img.height, 1);
      const canvas = document.createElement('canvas');
      canvas.width = img.width*ratio; canvas.height = img.height*ratio;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      res(canvas.toDataURL('image/jpeg',0.78));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

const xlsxExport = (rows, sheetName, fname) => {
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, fname+'.xlsx');
};
const pdfExport = (title, cols, rows, fname, orient='landscape') => {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({orientation:orient,unit:'mm',format:'a4'});
    doc.setFontSize(14); doc.setTextColor(204,0,0);
    doc.text('NIPPON ELECTRICALS', 14, 14);
    doc.setFontSize(11); doc.setTextColor(0);
    doc.text(title, 14, 21);
    doc.setFontSize(8); doc.setTextColor(120);
    doc.text('Exported: '+new Date().toLocaleString(), 14, 27);
    doc.autoTable({ columns:cols.map(c=>({header:c.h,dataKey:c.k})), body:rows, startY:32,
      styles:{fontSize:8,cellPadding:2},
      headStyles:{fillColor:[204,0,0],textColor:255,fontStyle:'bold'},
      alternateRowStyles:{fillColor:[245,245,245]} });
    doc.save(fname+'.pdf');
  } catch(e) { alert('PDF export failed. Please try Excel instead.'); }
};

function POSPage() {
  const {products,user,onSaleComplete,toast2} = useApp();
  const [cart,setCart] = useState([]);
  const [srch,setSrch] = useState('');
  const [cust,setCust] = useState('Walk-in Customer');
  const [payMode,setPayMode] = useState('cash');
  const [disc,setDisc] = useState('');
  const [paid,setPaid] = useState('');
  const [view,setView] = useState('grid');
  const [cat,setCat] = useState('All');
  const [chqNo,setChqNo] = useState('');
  const [chqBank,setChqBank] = useState('');
  const [processing,setProcessing] = useState(false);

  const cats = ['All',...CATS];
  const filtered = products.filter(p=>p.active&&(cat==='All'||p.category===cat)&&p.name.toLowerCase().includes(srch.toLowerCase()));

  const addToCart = p => {
    if(p.stock<=0){toast2('Out of stock!','error');return;}
    setCart(prev=>{
      const ex=prev.find(i=>i.pid===p.id);
      if(ex){if(ex.qty>=p.stock){toast2('Insufficient stock!','error');return prev;}return prev.map(i=>i.pid===p.id?{...i,qty:i.qty+1}:i);}
      return [...prev,{pid:p.id,name:p.name,price:p.price,qty:1,tax:p.taxRate,sku:p.sku}];
    });
    setView('cart');
  };
  const updQty = (pid,d) => setCart(prev=>prev.map(i=>i.pid===pid?{...i,qty:Math.max(1,i.qty+d)}:i));
  const remItem = pid => setCart(prev=>prev.filter(i=>i.pid!==pid));

  const discNum = Math.max(0,parseFloat(disc)||0);
  const sub = cart.reduce((a,i)=>a+i.price*i.qty,0);
  const taxAmt = cart.reduce((a,i)=>a+(i.price*i.qty*i.tax/100),0);
  const total = Math.max(0,sub+taxAmt-discNum);
  const change = parseFloat(paid||0)-total;
  const cnt = cart.reduce((a,i)=>a+i.qty,0);

  const checkout = async () => {
    if(!cart.length){toast2('Cart is empty!','error');return;}
    if(payMode==='cash'&&parseFloat(paid||0)<total){toast2('Insufficient payment!','error');return;}
    if(payMode==='cheque'&&(!chqNo||!chqBank)){toast2('Enter cheque details!','error');return;}
    setProcessing(true);
    try {
      const inv = {
        id:uid(), date:today(), customer:cust, items:[...cart],
        subtotal:sub, taxAmount:taxAmt, total, discount:discNum,
        paid:parseFloat(paid||total), change:Math.max(0,change),
        paymentMode:payMode, cashier:user.username, status:'completed',
        invoiceNo:'NE-'+today().replace(/-/g,'').slice(2)+'-'+String(uid()).slice(-4),
        chqDet:payMode==='cheque'?{no:chqNo,bank:chqBank}:null,
        createdAt:new Date().toISOString(),
      };
      await onSaleComplete(inv); // App-level: saves to DB + shows bill
    } catch(e) { toast2('Checkout failed!','error'); setProcessing(false); }
  };

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',paddingBottom:72}}>
      {/* POS Header */}
      <div style={{background:C.card,padding:'10px 13px',borderBottom:`1px solid ${C.border}`,display:'flex',gap:8,alignItems:'center'}}>

          <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Search products…"
            style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 10px 8px 30px',color:C.text,fontSize:13,fontFamily:"'Noto Sans JP'",outline:'none'}}/>
        </div>
        <button onClick={()=>setView(view==='grid'?'cart':'grid')}
          style={{position:'relative',background:view==='cart'?C.red:C.border,border:'none',borderRadius:8,padding:'8px 11px',cursor:'pointer',display:'flex',alignItems:'center'}}>
          <Ic n="cart" s={18} c="#fff"/>
          {cnt>0&&<span style={{background:'#fff',color:C.red,borderRadius:'50%',width:16,height:16,fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',position:'absolute',top:-4,right:-4}}>{cnt}</span>}
        </button>
      </div>

      {view==='grid'?(

              </div>

              <div key={item.pid} style={{background:C.card,borderRadius:10,padding:12,marginBottom:8,border:`1px solid ${C.border}`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600}}>{item.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>{lkr(item.price)} {item.tax>0?'+ '+item.tax+'% Tax':''}</div>
                  </div>
                  <button onClick={()=>remItem(item.pid)} style={{background:'none',border:'none',cursor:'pointer'}}><Ic n="del" s={16} c={C.red}/></button>
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,background:'#242424',borderRadius:8,padding:'4px 10px'}}>
                    <button onClick={()=>updQty(item.pid,-1)} style={{background:'none',border:'none',cursor:'pointer'}}><Ic n="minus" s={16} c={C.red}/></button>
                    <span style={{fontFamily:"'Space Mono'",fontWeight:700,minWidth:20,textAlign:'center'}}>{item.qty}</span>
                    <button onClick={()=>updQty(item.pid,1)} style={{background:'none',border:'none',cursor:'pointer'}}><Ic n="plus" s={16} c={C.green}/></button>
                  </div>
                  <div style={{fontFamily:"'Space Mono'",fontWeight:700}}>{lkr(item.price*item.qty)}</div>
                </div>
              </div>
            ))}
          </div>

          {cart.length>0&&(
            <div style={{background:'#141414',padding:14,borderTop:`1px solid ${C.border}`}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{color:C.muted,fontSize:13}}>Subtotal</span><span style={{fontFamily:"'Space Mono'"}}>{lkr(sub)}</span></div>
              {taxAmt>0&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{color:C.muted,fontSize:13}}>Tax</span><span style={{fontFamily:"'Space Mono'"}}>{lkr(taxAmt)}</span></div>}
              <input value={disc} onChange={e=>setDisc(e.target.value)} placeholder="Discount (Rs.)" type="number" min="0"
                style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'7px 10px',color:C.text,fontSize:13,marginBottom:8,fontFamily:"'Noto Sans JP'"}}/>
              <div style={{display:'flex',justifyContent:'space-between',borderTop:`1px solid ${C.border}`,paddingTop:7,marginBottom:10}}>
                <span style={{fontWeight:700,fontSize:15}}>TOTAL</span>
                <span style={{fontFamily:"'Space Mono'",fontWeight:900,fontSize:18,color:C.red}}>{lkr(total)}</span>
              </div>
              {/* Payment Mode */}
              <div style={{display:'flex',gap:5,marginBottom:8}}>
                {['cash','card','upi','cheque'].map(m=>(

                <div style={{marginBottom:8}}>
                  <input value={paid} onChange={e=>setPaid(e.target.value)} placeholder="Amount paid (Rs.)" type="number"
                    style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 12px',color:C.text,fontSize:14,fontFamily:"'Noto Sans JP'"}}/>
                  {paid&&<div style={{fontSize:12,color:change>=0?C.green:C.red,marginTop:3}}>Change: {lkr(Math.abs(change))}{change<0?' (Short)':''}</div>}
                </div>
              )}
              {payMode==='cheque'&&(
                <div style={{marginBottom:8}}>
                  <input value={chqNo} onChange={e=>setChqNo(e.target.value)} placeholder="Cheque No."
                    style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'7px 12px',color:C.text,fontSize:13,marginBottom:5,fontFamily:"'Noto Sans JP'"}}/>
                  <select value={chqBank} onChange={e=>setChqBank(e.target.value)}
                    style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'7px 12px',color:chqBank?C.text:C.muted,fontSize:13,fontFamily:"'Noto Sans JP'"}}>
                    <option value="">Select Bank…</option>
                    {SL_BANKS.map(b=><option key={b} value={b}>{b}</option>)}
                  </select>
                </div>

              <div style={{display:'flex',gap:8}}>
                <Btn ch="Clear" v="dk" onClick={()=>{setCart([]);setDisc('');setPaid('');setChqNo('');setChqBank('');}} st={{flex:1}}/>
                <Btn ch={processing?'Processing…':<><Ic n="ok" s={14} c="#fff"/>Checkout</>} onClick={checkout} dis={processing} st={{flex:2}}/>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

//  PRODUCTS
// ═══════════════════════════════════════════════════════════
function ProductsPage() {
  const {products,upsertProduct,deleteProduct,toast2,user,companies} = useApp();
  const [srch,setSrch] = useState('');
  const [cat,setCat] = useState('All');
  const [showForm,setShowForm] = useState(false);
  const [ed,setEd] = useState(null);
  const blankF = {name:'',sku:'',category:'Lighting',price:'',costPrice:'',stock:'',unit:'pcs',taxRate:'0',minStock:'10',barcode:'',active:true,supplierId:'',supplierName:''};
  const [f,setF] = useState(blankF);

  const cats = ['All',...CATS];
  const list = products.filter(p=>(cat==='All'||p.category===cat)&&(p.name.toLowerCase().includes(srch.toLowerCase())||p.sku.toLowerCase().includes(srch.toLowerCase())));

  const openForm = (p=null) => {
    if(p){setEd(p);setF({...blankF,...p,price:String(p.price),costPrice:String(p.costPrice),stock:String(p.stock),taxRate:String(p.taxRate),minStock:String(p.minStock),supplierId:String(p.supplierId||''),supplierName:p.supplierName||''});}
    else{setEd(null);setF(blankF);}
    setShowForm(true);
  };

  const handleSupplierChange = v => {
    const co = companies.find(c=>String(c.id)===v);
    setF(p=>({...p,supplierId:v,supplierName:co?co.name:''}));
  };

  const save = async () => {
    if(!f.name||!f.price||!f.stock){toast2('Fill required fields!','error');return;}
    const p = {...f,price:parseFloat(f.price),costPrice:parseFloat(f.costPrice||0),stock:parseInt(f.stock),taxRate:parseFloat(f.taxRate||0),minStock:parseInt(f.minStock||10),supplierId:f.supplierId?parseInt(f.supplierId):null,id:ed?ed.id:uid()};
    await upsertProduct(p);
    toast2(ed?'Product updated!':'Product added!','success');
    setShowForm(false);
  };

  const toggle = async p => { await upsertProduct({...p,active:!p.active}); };
  const del = async id => { if(confirm('Delete this product?')){await deleteProduct(id);toast2('Deleted','info');} };
  const canEdit = user.role==='admin'||user.role==='manager';

  return (
    <div style={{padding:14,paddingBottom:90}}>
      <SectionHeader title="Products" right={<>
        {canEdit&&<Btn ch={<><Ic n="add" s={14} c="#fff"/>Add</>} onClick={()=>openForm()} sz="sm"/>}
        <ExportMenu onXLSX={()=>exportProductsXLSX(products)} onPDF={()=>exportProductsPDF(products)}/>
      </>}/>
      <div style={{position:'relative',marginBottom:10}}>
        <div style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)'}}><Ic n="srch" s={15} c={C.muted}/></div>
        <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Search name or SKU…"
          style={{width:'100%',background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 10px 9px 32px',color:C.text,fontSize:13,fontFamily:"'Noto Sans JP'",outline:'none'}}/>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:12,overflow:'auto',paddingBottom:3}}>
        {cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{background:cat===c?C.red:C.border,border:'none',borderRadius:16,padding:'4px 11px',color:'#fff',fontSize:10,cursor:'pointer',whiteSpace:'nowrap',fontWeight:cat===c?700:400}}>{c}</button>)}
      </div>

      {list.map(p=>(
        <Card key={p.id} st={{marginBottom:8,opacity:p.active?1:0.55}} ch={
          <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3,flexWrap:'wrap'}}>
                <span style={{fontSize:13,fontWeight:700}}>{p.name}</span>
                {!p.active&&<Badge ch="Inactive" col={C.muted}/>}
                {p.stock<=p.minStock&&<Badge ch="Low Stock" col={C.orange}/>}
              </div>
              <div style={{fontSize:11,color:C.muted,marginBottom:3}}>{p.sku} · {p.category}</div>
              <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                <span style={{fontSize:14,fontWeight:900,color:C.red,fontFamily:"'Space Mono'"}}>{lkr(p.price)}</span>
                <span style={{fontSize:11,color:C.muted}}>Cost: {lkr(p.costPrice)}</span>
                <span style={{fontSize:11,color:p.stock<=p.minStock?C.orange:C.muted}}>Stk: {p.stock} {p.unit}</span>
                {p.taxRate>0&&<Badge ch={p.taxRate+'% Tax'} col={C.blue}/>}
              </div>
              {p.supplierName&&<div style={{fontSize:11,color:C.muted,marginTop:3,display:'flex',alignItems:'center',gap:4}}><Ic n="bldg" s={11} c={C.muted}/>{p.supplierName}</div>}
            </div>
            {canEdit&&(
              <div style={{display:'flex',flexDirection:'column',gap:5,flexShrink:0}}>
                <button onClick={()=>openForm(p)} style={{background:C.border,border:'none',borderRadius:6,padding:'5px 7px',cursor:'pointer'}}><Ic n="edit" s={13}/></button>
                <button onClick={()=>toggle(p)} style={{background:p.active?'#1a3a1a':'#3a1a1a',border:'none',borderRadius:6,padding:'5px 7px',cursor:'pointer'}}><Ic n={p.active?'eye':'eyeoff'} s={13} c={p.active?C.green:C.red}/></button>
                <button onClick={()=>del(p.id)} style={{background:'#3a1a1a',border:'none',borderRadius:6,padding:'5px 7px',cursor:'pointer'}}><Ic n="del" s={13} c={C.red}/></button>
              </div>
            )}
          </div>
        }/>
      ))}

      <Modal open={showForm} onClose={()=>setShowForm(false)} title={ed?'Edit Product':'Add Product'} ch={
        <>
          <Inp lbl="Product Name" val={f.name} set={v=>setF(p=>({...p,name:v}))} req/>
          <Inp lbl="SKU" val={f.sku} set={v=>setF(p=>({...p,sku:v}))} ph="NE-XX-001"/>
          <Sel lbl="Category" val={f.category} set={v=>setF(p=>({...p,category:v}))} opts={CATS}/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Inp lbl="Sale Price (Rs.)" val={f.price} set={v=>setF(p=>({...p,price:v}))} type="number" req/>
            <Inp lbl="Cost Price (Rs.)" val={f.costPrice} set={v=>setF(p=>({...p,costPrice:v}))} type="number"/>
            <Inp lbl="Stock Qty" val={f.stock} set={v=>setF(p=>({...p,stock:v}))} type="number" req/>
            <Inp lbl="Min Stock Alert" val={f.minStock} set={v=>setF(p=>({...p,minStock:v}))} type="number"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel lbl="Unit" val={f.unit} set={v=>setF(p=>({...p,unit:v}))} opts={['pcs','roll','box','kg','meter','set','pair']}/>
            <Inp lbl="Tax %" val={f.taxRate} set={v=>setF(p=>({...p,taxRate:v}))} type="number"/>
          </div>
          <Inp lbl="Barcode" val={f.barcode} set={v=>setF(p=>({...p,barcode:v}))}/>
          <div style={{marginBottom:13}}>
            <label style={{display:'block',fontSize:11,color:C.muted,marginBottom:5,letterSpacing:0.5,textTransform:'uppercase'}}>Supplier / Company</label>
            <select value={f.supplierId} onChange={e=>handleSupplierChange(e.target.value)}
              style={{width:'100%',background:'#242424',border:`1.5px solid ${C.border}`,borderRadius:8,padding:'10px 13px',color:C.text,fontSize:14,fontFamily:"'Noto Sans JP',sans-serif",outline:'none'}}>
              <option value="">— No supplier assigned —</option>
              {companies.filter(c=>c.active).map(c=><option key={c.id} value={String(c.id)}>{c.name} ({c.type})</option>)}
            </select>
          </div>
          <Btn ch={ed?'Update Product':'Add Product'} onClick={save} full/>
        </>
      }/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  CHEQUES — Full featured
// ═══════════════════════════════════════════════════════════
function ChequesPage() {
  const {cheques,upsertCheque,deleteCheque,toast2} = useApp();
  const [showForm,setShowForm] = useState(false);
  const [ed,setEd] = useState(null);
  const [flt,setFlt] = useState('all');
  const [catFlt,setCatFlt] = useState('all');
  const [viewImg,setViewImg] = useState(null);

  const blankF = {category:'received',customerName:'',companyName:'',chequeNo:'',bank:'',branch:'',amount:'',chequeDate:today(),dueDate:'',givenDate:today(),billNumber:'',invoiceRef:'',isReturn:false,returnReason:'',chequeImage:null,status:'pending',notes:''};
  const [f,setF] = useState(blankF);
  const [imgLoading,setImgLoading] = useState(false);

  const flts = [{id:'all',l:'All'},{id:'pending',l:'Pending'},{id:'cleared',l:'Cleared'},{id:'bounced',l:'Bounced'},{id:'returned',l:'Returned'}];
  const catFlts = [{id:'all',l:'All Types'},{id:'received',l:'Received'},{id:'given',l:'Given'},{id:'return',l:'Return'}];

  let list = cheques;
  if(catFlt!=='all') list = list.filter(c=>c.category===catFlt);
  if(flt!=='all') list = list.filter(c=>c.status===flt);
  list = [...list].sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));

  const pendAmt = cheques.filter(c=>c.status==='pending'&&c.category==='received').reduce((a,c)=>a+c.amount,0);
  const givenAmt = cheques.filter(c=>c.status==='pending'&&c.category==='given').reduce((a,c)=>a+c.amount,0);

  const openForm = (c=null) => {
    if(c){setEd(c);setF({...blankF,...c,amount:String(c.amount)});}
    else{setEd(null);setF(blankF);}
    setShowForm(true);
  };

  const handleImg = async e => {
    const file = e.target.files[0];
    if(!file) return;
    setImgLoading(true);
    try { const img = await compressImg(file); setF(p=>({...p,chequeImage:img})); }
    catch(e){toast2('Image load failed','error');}
    setImgLoading(false);
  };

  const save = async () => {
    if(!f.chequeNo||!f.bank||!f.amount){toast2('Fill required fields!','error');return;}
    if(f.category==='received'&&!f.customerName){toast2('Customer name required!','error');return;}
    if(f.category==='given'&&!f.companyName){toast2('Company name required!','error');return;}
    const c = {...f,amount:parseFloat(f.amount),id:ed?ed.id:uid(),createdAt:ed?ed.createdAt:new Date().toISOString(),clearedDate:f.status==='cleared'?(ed?.clearedDate||today()):null};
    await upsertCheque(c);
    toast2(ed?'Cheque updated!':'Cheque added!','success');
    setShowForm(false);
  };

  const setStatus = async (c,status) => {
    await upsertCheque({...c,status,clearedDate:status==='cleared'?today():c.clearedDate});
    toast2('Marked as '+status,'success');
  };
  const del = async id => { if(confirm('Delete this cheque?')){await deleteCheque(id);toast2('Deleted','info');} };

  const sc={pending:C.orange,cleared:C.green,bounced:C.red,returned:C.red};
  const cc={received:C.green,given:C.blue,return:C.orange};
  const catLabel={received:'Customer Received',given:'Company/Dealer Given',return:'Return Cheque'};

  return (
    <div style={{padding:14,paddingBottom:90}}>
      <SectionHeader title="Cheques" right={<>
        <Btn ch={<><Ic n="add" s={14} c="#fff"/>Add</>} onClick={()=>openForm()} sz="sm"/>
        <ExportMenu onXLSX={()=>exportChequesXLSX(cheques)} onPDF={()=>exportChequesPDF(cheques)}/>
      </>}/>

      {/* Stats */}
      <div style={{display:'flex',gap:10,marginBottom:14}}>
        <StatBox lbl="Pending (Received)" val={lkrK(pendAmt)} col={C.green} icon="chq"/>
        <StatBox lbl="Pending (Given)" val={lkrK(givenAmt)} col={C.blue} icon="chq"/>
      </div>

      {/* Category Filter */}
      <div style={{display:'flex',gap:6,marginBottom:8,overflow:'auto',paddingBottom:3}}>
        {catFlts.map(f=><button key={f.id} onClick={()=>setCatFlt(f.id)} style={{background:catFlt===f.id?C.red:C.border,border:'none',borderRadius:16,padding:'4px 12px',color:'#fff',fontSize:10,cursor:'pointer',whiteSpace:'nowrap',fontWeight:catFlt===f.id?700:400}}>{f.l}</button>)}
      </div>
      {/* Status Filter */}
      <div style={{display:'flex',gap:6,marginBottom:14,overflow:'auto',paddingBottom:3}}>
        {flts.map(f=><button key={f.id} onClick={()=>setFlt(f.id)} style={{background:flt===f.id?C.border:C.dark,border:`1px solid ${flt===f.id?C.muted:C.border}`,borderRadius:16,padding:'3px 10px',color:flt===f.id?C.text:C.muted,fontSize:10,cursor:'pointer',whiteSpace:'nowrap'}}>{f.l}</button>)}
      </div>

      {list.map(c=>(
        <Card key={c.id} st={{marginBottom:12,borderLeft:`3px solid ${cc[c.category]||C.muted}`}} ch={
          <>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap',marginBottom:3}}>
                  <Badge ch={catLabel[c.category]} col={cc[c.category]}/>
                  <Badge ch={c.status} col={sc[c.status]}/>
                  {c.isReturn&&<Badge ch="RETURN CHQ" col={C.red}/>}
                </div>
                <div style={{fontSize:14,fontWeight:700,marginTop:4}}>{c.customerName||c.companyName}</div>
                <div style={{fontSize:11,color:C.muted}}>CHQ# {c.chequeNo} · {c.bank}{c.branch?' · '+c.branch:''}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:16,fontWeight:900,color:c.category==='received'?C.green:C.blue,fontFamily:"'Space Mono'"}}>{lkr(c.amount)}</div>
              </div>
            </div>

            {/* Details Grid */}
            <div style={{background:'#242424',borderRadius:8,padding:10,marginBottom:10,fontSize:11,display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              <div><span style={{color:C.muted}}>Cheque Date: </span><strong>{c.chequeDate||'—'}</strong></div>
              {c.category==='received'&&<div><span style={{color:C.muted}}>Due Date: </span><strong style={{color:c.status==='pending'?C.orange:C.text}}>{c.dueDate||'—'}</strong></div>}
              {c.category==='given'&&<div><span style={{color:C.muted}}>Given Date: </span><strong>{c.givenDate||'—'}</strong></div>}
              {c.invoiceRef&&<div><span style={{color:C.muted}}>Invoice: </span><strong>{c.invoiceRef}</strong></div>}
              {c.billNumber&&<div><span style={{color:C.muted}}>Bill No: </span><strong>{c.billNumber}</strong></div>}
              {c.returnReason&&<div style={{gridColumn:'1/-1'}}><span style={{color:C.muted}}>Return Reason: </span><strong style={{color:C.red}}>{c.returnReason}</strong></div>}
              {c.clearedDate&&<div><span style={{color:C.muted}}>Cleared: </span><strong style={{color:C.green}}>{c.clearedDate}</strong></div>}
            </div>

            {c.notes&&<div style={{fontSize:11,color:C.muted,marginBottom:8,fontStyle:'italic',padding:'6px 8px',background:'#1f1f1f',borderRadius:6}}>{c.notes}</div>}

            {/* Cheque Image */}
            {c.chequeImage&&(
              <div style={{marginBottom:10}}>
                <button onClick={()=>setViewImg(c.chequeImage)} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,padding:'6px 12px',color:C.muted,cursor:'pointer',fontSize:11,display:'flex',alignItems:'center',gap:6}}>
                  <Ic n="img" s={14} c={C.muted}/> View Cheque Image
                </button>
              </div>
            )}

            {/* Actions */}
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {c.status==='pending'&&<Btn ch={<><Ic n="ok" s={12} c="#fff"/>Cleared</>} v="ok" sz="sm" onClick={()=>setStatus(c,'cleared')}/>}
              {c.status==='pending'&&<Btn ch="Bounced" sz="sm" st={{background:'#3a1a1a',color:C.red}} onClick={()=>setStatus(c,'bounced')}/>}
              {c.status==='pending'&&c.category==='received'&&<Btn ch={<><Ic n="ret" s={12}/>Return</>} sz="sm" st={{background:'#3a2000',color:C.orange}} onClick={()=>setStatus(c,'returned')}/>}
              <Btn ch={<><Ic n="edit" s={12}/>Edit</>} v="dk" sz="sm" onClick={()=>openForm(c)}/>
              <Btn ch={<><Ic n="del" s={12} c={C.red}/></>} sz="sm" st={{background:'#3a1a1a'}} onClick={()=>del(c.id)}/>
            </div>
          </>
        }/>
      ))}
      {list.length===0&&<div style={{textAlign:'center',color:C.muted,padding:40}}>No cheques found</div>}

      {/* Image Viewer Modal */}
      {viewImg&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.95)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={()=>setViewImg(null)}>
          <img src={viewImg} style={{maxWidth:'100%',maxHeight:'90vh',borderRadius:8,boxShadow:'0 0 40px rgba(0,0,0,0.5)'}} alt="Cheque"/>
          <button onClick={()=>setViewImg(null)} style={{position:'absolute',top:20,right:20,background:C.red,border:'none',borderRadius:50,width:36,height:36,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ic n="x" s={18} c="#fff"/>
          </button>
        </div>
      )}

      {/* Cheque Form — Full modal with all fields */}
      <Modal open={showForm} onClose={()=>setShowForm(false)} title={ed?'Edit Cheque':'Add Cheque'} ch={
        <div>
          {/* Category */}
          <div style={{marginBottom:16}}>
            <label style={{display:'block',fontSize:11,color:C.muted,marginBottom:8,letterSpacing:0.5,textTransform:'uppercase'}}>Cheque Category <span style={{color:C.red}}>*</span></label>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
              {[['received','Customer\nReceived',C.green],['given','Company/\nDealer Given',C.blue],['return','Return\nCheque',C.orange]].map(([v,l,col])=>(
                <button key={v} onClick={()=>setF(p=>({...p,category:v}))}
                  style={{background:f.category===v?col+'33':C.border,border:`2px solid ${f.category===v?col:C.border}`,borderRadius:8,padding:'10px 6px',cursor:'pointer',color:f.category===v?col:C.muted,fontSize:11,fontWeight:700,lineHeight:1.3,whiteSpace:'pre-line'}}>
                  {l}
                </button>
              ))}
            </div>
          </div>

          {/* Party Name */}
          {f.category==='received'&&<Inp lbl="Customer Name" val={f.customerName} set={v=>setF(p=>({...p,customerName:v}))} ph="Customer full name" req/>}
          {f.category==='given'&&<Inp lbl="Company / Dealer Name" val={f.companyName} set={v=>setF(p=>({...p,companyName:v}))} ph="Company or dealer name" req/>}
          {f.category==='return'&&<Inp lbl="Party Name (From Whom)" val={f.customerName} set={v=>setF(p=>({...p,customerName:v}))} ph="Name of person/company" req/>}

          {/* Cheque Details */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Inp lbl="Cheque No." val={f.chequeNo} set={v=>setF(p=>({...p,chequeNo:v}))} ph="CHQ000001" req/>
            <Inp lbl="Amount (Rs.)" val={f.amount} set={v=>setF(p=>({...p,amount:v}))} type="number" req/>
          </div>
          <Sel lbl="Bank" val={f.bank} set={v=>setF(p=>({...p,bank:v}))} opts={['',...SL_BANKS].map(b=>({v:b,l:b||'Select Bank…'}))} req/>
          <Inp lbl="Branch" val={f.branch} set={v=>setF(p=>({...p,branch:v}))} ph="Branch name"/>
          <Inp lbl="Cheque Date (on cheque)" val={f.chequeDate} set={v=>setF(p=>({...p,chequeDate:v}))} type="date" req/>

          {/* Category-specific fields */}
          {f.category==='received'&&(
            <>
              <Inp lbl="Due / Maturity Date" val={f.dueDate} set={v=>setF(p=>({...p,dueDate:v}))} type="date"/>
              <Inp lbl="Invoice / Reference No" val={f.invoiceRef} set={v=>setF(p=>({...p,invoiceRef:v}))} ph="NE-INV-XXXX"/>
            </>
          )}

          {f.category==='given'&&(
            <>
              <Inp lbl="Date Given" val={f.givenDate} set={v=>setF(p=>({...p,givenDate:v}))} type="date"/>
              <Inp lbl="Bill / Invoice Number (Purpose)" val={f.billNumber} set={v=>setF(p=>({...p,billNumber:v}))} ph="PO-2025-001 or Invoice No."/>
              {/* Return cheque flag */}
              <div style={{marginBottom:13}}>
                <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
                  <div onClick={()=>setF(p=>({...p,isReturn:!p.isReturn}))}
                    style={{width:44,height:24,borderRadius:12,background:f.isReturn?C.red:C.border,position:'relative',transition:'background 0.2s',cursor:'pointer',flexShrink:0}}>
                    <div style={{position:'absolute',width:18,height:18,borderRadius:'50%',background:'#fff',top:3,left:f.isReturn?23:3,transition:'left 0.2s'}}/>
                  </div>
                  <span style={{fontSize:13,color:C.text}}>This is a <strong style={{color:C.red}}>Return / Bounced Cheque</strong></span>
                </label>
              </div>
              {f.isReturn&&<Inp lbl="Return Reason" val={f.returnReason} set={v=>setF(p=>({...p,returnReason:v}))} ph="e.g. Insufficient Funds, Account Closed…"/>}
              {/* Cheque Image */}
              <div style={{marginBottom:13}}>
                <label style={{display:'block',fontSize:11,color:C.muted,marginBottom:6,letterSpacing:0.5,textTransform:'uppercase'}}>Cheque Image (Photo)</label>
                <input type="file" accept="image/*" capture="environment" onChange={handleImg}
                  style={{width:'100%',background:'#242424',border:`1.5px dashed ${C.border}`,borderRadius:8,padding:'10px',color:C.muted,fontSize:13,cursor:'pointer'}}/>
                {imgLoading&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>Compressing image…</div>}
                {f.chequeImage&&!imgLoading&&(
                  <div style={{marginTop:8,position:'relative'}}>
                    <img src={f.chequeImage} style={{width:'100%',borderRadius:8,border:`1px solid ${C.border}`}} alt="Cheque preview"/>
                    <button onClick={()=>setF(p=>({...p,chequeImage:null}))} style={{position:'absolute',top:6,right:6,background:C.red,border:'none',borderRadius:50,width:26,height:26,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <Ic n="x" s={14} c="#fff"/>
                    </button>
                  </div>
                )}
              </div>
            </>
          )}

          {f.category==='return'&&(
            <>
              <Inp lbl="Original Invoice / Reference" val={f.invoiceRef} set={v=>setF(p=>({...p,invoiceRef:v}))} ph="NE-INV-XXXX"/>
              <Inp lbl="Return Reason" val={f.returnReason} set={v=>setF(p=>({...p,returnReason:v}))} ph="Insufficient Funds / Account Closed…"/>
            </>
          )}

          <Sel lbl="Status" val={f.status} set={v=>setF(p=>({...p,status:v}))} opts={[{v:'pending',l:'Pending'},{v:'cleared',l:'Cleared'},{v:'bounced',l:'Bounced'},{v:'returned',l:'Returned'}]}/>
          <Textarea lbl="Notes" val={f.notes} set={v=>setF(p=>({...p,notes:v}))} ph="Additional notes…" rows={2}/>
          <Btn ch={ed?'Update Cheque':'Add Cheque'} onClick={save} full/>
        </div>
      }/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  COMPANIES PAGE
// ═══════════════════════════════════════════════════════════
function CompaniesPage() {
  const {companies,upsertCompany,deleteCompany,products,upsertProduct,toast2,user} = useApp();
  const [showForm,setShowForm] = useState(false);
  const [ed,setEd] = useState(null);
  const [detailCo,setDetailCo] = useState(null);  // company detail/product view
  const [tab,setTab] = useState('info');           // 'info' | 'products' | 'prices'
  const [srch,setSrch] = useState('');
  const [typeFlt,setTypeFlt] = useState('all');
  const [editPriceId,setEditPriceId] = useState(null);
  const [tempPrice,setTempPrice] = useState({cost:'',sale:''});

  const blankF = {name:'',type:'Supplier',contactPerson:'',phone:'',email:'',address:'',website:'',paymentTerms:'30 days',taxNo:'',notes:'',active:true};
  const [f,setF] = useState(blankF);

  const types = ['Supplier','Dealer','Manufacturer','Distributor','Importer'];
  const typeColors = {Supplier:C.green,Dealer:C.blue,Manufacturer:C.orange,Distributor:C.purple,Importer:C.gold};

  const filteredCos = companies.filter(c =>
    (typeFlt==='all'||c.type===typeFlt) &&
    (c.name.toLowerCase().includes(srch.toLowerCase())||
     c.contactPerson.toLowerCase().includes(srch.toLowerCase()))
  );

  const coProducts = co => products.filter(p => p.supplierId === co.id);
  const totalCostValue = co => coProducts(co).reduce((a,p)=>a+p.costPrice*p.stock,0);

  const openForm = (c=null) => {
    if(c){setEd(c);setF({...blankF,...c});}
    else{setEd(null);setF(blankF);}
    setShowForm(true);
  };

  const save = async () => {
    if(!f.name){toast2('Company name required!','error');return;}
    const c = {...f,id:ed?ed.id:uid(),createdAt:ed?ed.createdAt:today()};
    await upsertCompany(c);
    toast2(ed?'Company updated!':'Company added!','success');
    setShowForm(false);
    if(detailCo&&ed&&detailCo.id===ed.id) setDetailCo(c);
  };

  const del = async id => {
    const linkedProds = products.filter(p=>p.supplierId===id);
    if(linkedProds.length>0){toast2(`${linkedProds.length} product(s) linked — unlink first!`,'error');return;}
    if(confirm('Delete this company?')){await deleteCompany(id);toast2('Deleted','info');setDetailCo(null);}
  };

  const toggle = async c => { await upsertCompany({...c,active:!c.active}); };

  // Inline price update
  const startEditPrice = p => {
    setEditPriceId(p.id);
    setTempPrice({cost:String(p.costPrice),sale:String(p.price)});
  };
  const savePrice = async p => {
    const updated = {...p,costPrice:parseFloat(tempPrice.cost)||p.costPrice,price:parseFloat(tempPrice.sale)||p.price};
    await upsertProduct(updated);
    setEditPriceId(null);
    toast2('Price updated!','success');
  };

  const canEdit = user.role==='admin'||user.role==='manager';

  // ── DETAIL VIEW ──────────────────────────────────────────
  if(detailCo) {
    const co = companies.find(c=>c.id===detailCo.id)||detailCo;
    const prods = coProducts(co);
    const margin = p => p.costPrice>0?((p.price-p.costPrice)/p.costPrice*100).toFixed(0)+'%':'—';
    const marginColor = p => {
      if(!p.costPrice) return C.muted;
      const m = (p.price-p.costPrice)/p.costPrice*100;
      return m>=30?C.green:m>=15?C.gold:C.red;
    };

    return (
      <div style={{paddingBottom:90}}>
        {/* Header */}
        <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>setDetailCo(null)} style={{background:'none',border:'none',cursor:'pointer',color:C.muted,padding:4}}><Ic n="back" s={22} c={C.muted}/></button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:900,fontSize:16,color:C.text}}>{co.name}</div>
            <div style={{fontSize:11,color:C.muted}}>{co.type} · {co.active?'Active':'Inactive'}</div>
          </div>
          {canEdit&&<Btn ch={<><Ic n="edit" s={13}/>Edit</>} v="dk" sz="sm" onClick={()=>openForm(co)}/>}
        </div>

        {/* Tab Bar */}
        <div style={{display:'flex',background:'#141414',borderBottom:`1px solid ${C.border}`}}>
          {[['info','Info'],['products','Products ('+prods.length+')'],['prices','Price Mgmt']].map(([t,l])=>(
            <button key={t} onClick={()=>setTab(t)}
              style={{flex:1,padding:'11px 4px',background:'none',border:'none',cursor:'pointer',color:tab===t?C.red:C.muted,fontWeight:tab===t?700:400,fontSize:12,borderBottom:tab===t?`2px solid ${C.red}`:'2px solid transparent'}}>
              {l}
            </button>
          ))}
        </div>

        {/* INFO TAB */}
        {tab==='info'&&(
          <div style={{padding:'16px 14px'}}>
            {/* Stats Row */}
            <div style={{display:'flex',gap:10,marginBottom:18}}>
              <StatBox lbl="Products" val={prods.length} col={C.blue} icon="box"/>
              <StatBox lbl="Stock Value (Cost)" val={lkrK(totalCostValue(co))} col={C.green} icon="coin"/>
            </div>
            {/* Details Card */}
            <Card st={{marginBottom:14}} ch={
              <div style={{display:'grid',gap:12}}>
                {[
                  ['Contact Person',co.contactPerson,'users'],
                  ['Phone',co.phone,'phone'],
                  ['Email',co.email,'srch'],
                  ['Address',co.address,'bldg'],
                  ['Website',co.website,'link'],
                  ['Payment Terms',co.paymentTerms,'coin'],
                  ['Tax / VAT No',co.taxNo,'tag'],
                ].filter(([,v])=>v).map(([label,value,icon])=>(
                  <div key={label} style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                    <div style={{color:C.muted,flexShrink:0,marginTop:1}}><Ic n={icon} s={14} c={C.muted}/></div>
                    <div>
                      <div style={{fontSize:10,color:C.muted,letterSpacing:0.5,textTransform:'uppercase'}}>{label}</div>
                      <div style={{fontSize:13,color:C.text,marginTop:1}}>{value}</div>
                    </div>
                  </div>
                ))}
              </div>
            }/>
            {co.notes&&<Card ch={<><div style={{fontSize:10,color:C.muted,letterSpacing:0.5,textTransform:'uppercase',marginBottom:6}}>Notes</div><div style={{fontSize:13,color:C.text,lineHeight:1.6}}>{co.notes}</div></>}/>}
            {canEdit&&(
              <div style={{marginTop:16,display:'flex',gap:10}}>
                <Btn ch={<><Ic n={co.active?'eyeoff':'eye'} s={14}/>{co.active?'Deactivate':'Activate'}</>} v="dk" onClick={()=>toggle(co)} st={{flex:1}}/>
                <Btn ch={<><Ic n="del" s={14} c={C.red}/>Delete</>} st={{flex:1,background:'#3a1a1a',color:C.red,border:'none'}} onClick={()=>del(co.id)}/>
              </div>
            )}
          </div>
        )}

        {/* PRODUCTS TAB */}
        {tab==='products'&&(
          <div style={{padding:'14px 14px',paddingBottom:90}}>
            {prods.length===0?(
              <div style={{textAlign:'center',color:C.muted,padding:40}}>
                <Ic n="box" s={40} c={C.muted}/><p style={{marginTop:12}}>No products linked to this company</p>
                <p style={{fontSize:11,marginTop:6}}>Edit a product and set this company as its supplier</p>
              </div>
            ):prods.map(p=>(
              <Card key={p.id} st={{marginBottom:8}} ch={
                <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{p.name}</div>
                    <div style={{fontSize:11,color:C.muted,marginBottom:5}}>{p.sku} · {p.category}</div>
                    <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
                      <div><div style={{fontSize:9,color:C.muted,letterSpacing:0.5}}>SALE PRICE</div><div style={{fontFamily:"'Space Mono'",fontWeight:700,color:C.red,fontSize:13}}>{lkr(p.price)}</div></div>
                      <div><div style={{fontSize:9,color:C.muted,letterSpacing:0.5}}>COST PRICE</div><div style={{fontFamily:"'Space Mono'",fontWeight:700,color:C.green,fontSize:13}}>{lkr(p.costPrice)}</div></div>
                      <div><div style={{fontSize:9,color:C.muted,letterSpacing:0.5}}>MARGIN</div><div style={{fontFamily:"'Space Mono'",fontWeight:700,color:marginColor(p),fontSize:13}}>{margin(p)}</div></div>
                      <Badge ch={'Stk: '+p.stock+' '+p.unit} col={p.stock<=p.minStock?C.orange:C.muted}/>
                    </div>
                  </div>
                </div>
              }/>
            ))}
          </div>
        )}

        {/* PRICE MANAGEMENT TAB */}
        {tab==='prices'&&(
          <div style={{padding:'14px 14px',paddingBottom:90}}>
            <div style={{background:'#1f1a00',border:`1px solid ${C.gold}33`,borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:12,color:C.gold,display:'flex',gap:8,alignItems:'center'}}>
              <Ic n="tag" s={14} c={C.gold}/> Tap the edit button to update cost &amp; sale price per product
            </div>
            {prods.length===0?(
              <div style={{textAlign:'center',color:C.muted,padding:40}}>No products linked to this supplier</div>
            ):prods.map(p=>(
              <Card key={p.id} st={{marginBottom:10,borderLeft:`3px solid ${editPriceId===p.id?C.gold:C.border}`}} ch={
                <>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:700}}>{p.name}</div>
                      <div style={{fontSize:11,color:C.muted}}>{p.sku}</div>
                    </div>
                    {canEdit&&(
                      editPriceId===p.id?(
                        <div style={{display:'flex',gap:6}}>
                          <Btn ch={<><Ic n="ok" s={13} c="#fff"/>Save</>} v="ok" sz="sm" onClick={()=>savePrice(p)}/>
                          <Btn ch="Cancel" v="ghost" sz="sm" onClick={()=>setEditPriceId(null)}/>
                        </div>
                      ):(
                        <Btn ch={<><Ic n="edit" s={13}/>Edit</>} v="dk" sz="sm" onClick={()=>startEditPrice(p)}/>
                      )
                    )}
                  </div>

                  {editPriceId===p.id?(
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                      <div>
                        <label style={{display:'block',fontSize:10,color:C.muted,marginBottom:5,textTransform:'uppercase',letterSpacing:0.5}}>Cost Price (Rs.)</label>
                        <input value={tempPrice.cost} onChange={e=>setTempPrice(p=>({...p,cost:e.target.value}))} type="number"
                          style={{width:'100%',background:'#242424',border:`1.5px solid ${C.gold}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:15,fontFamily:"'Space Mono'",outline:'none',fontWeight:700}}/>
                      </div>
                      <div>
                        <label style={{display:'block',fontSize:10,color:C.muted,marginBottom:5,textTransform:'uppercase',letterSpacing:0.5}}>Sale Price (Rs.)</label>
                        <input value={tempPrice.sale} onChange={e=>setTempPrice(p=>({...p,sale:e.target.value}))} type="number"
                          style={{width:'100%',background:'#242424',border:`1.5px solid ${C.red}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:15,fontFamily:"'Space Mono'",outline:'none',fontWeight:700}}/>
                      </div>
                      {tempPrice.cost&&tempPrice.sale&&(
                        <div style={{gridColumn:'1/-1',background:'#1a1a00',borderRadius:8,padding:'8px 12px',fontSize:12}}>
                          <span style={{color:C.muted}}>Margin: </span>
                          <strong style={{color:((parseFloat(tempPrice.sale)-parseFloat(tempPrice.cost))/parseFloat(tempPrice.cost)*100)>=20?C.green:C.orange}}>
                            Rs. {(parseFloat(tempPrice.sale)-parseFloat(tempPrice.cost)).toFixed(2)} ({((parseFloat(tempPrice.sale)-parseFloat(tempPrice.cost))/parseFloat(tempPrice.cost)*100).toFixed(1)}%)
                          </strong>
                        </div>
                      )}
                    </div>
                  ):(
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                      {[
                        ['Cost Price',lkr(p.costPrice),C.green],
                        ['Sale Price',lkr(p.price),C.red],
                        ['Margin',margin(p),marginColor(p)],
                      ].map(([l,v,col])=>(
                        <div key={l} style={{background:'#242424',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                          <div style={{fontSize:9,color:C.muted,letterSpacing:0.5,textTransform:'uppercase',marginBottom:3}}>{l}</div>
                          <div style={{fontFamily:"'Space Mono'",fontWeight:700,fontSize:12,color:col}}>{v}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </>
              }/>
            ))}
          </div>
        )}

        {/* Company Form Modal */}
        <Modal open={showForm} onClose={()=>setShowForm(false)} title={ed?'Edit Company':'Add Company'} ch={<CompanyForm f={f} setF={setF} types={types} onSave={save}/>}/>
      </div>
    );
  }

  // ── LIST VIEW ────────────────────────────────────────────
  return (
    <div style={{padding:14,paddingBottom:90}}>
      <SectionHeader title="Companies" right={<>
        {canEdit&&<Btn ch={<><Ic n="add" s={14} c="#fff"/>Add</>} onClick={()=>openForm()} sz="sm"/>}
        <ExportMenu onXLSX={()=>exportCompaniesXLSX(companies,products)} onPDF={()=>exportCompaniesPDF(companies,products)}/>
      </>}/>

      {/* Summary */}
      <div style={{display:'flex',gap:10,marginBottom:14}}>
        <StatBox lbl="Companies" val={companies.filter(c=>c.active).length} col={C.blue} icon="bldg"/>
        <StatBox lbl="Linked Products" val={products.filter(p=>p.supplierId).length} col={C.green} icon="link"/>
      </div>

      {/* Search */}
      <div style={{position:'relative',marginBottom:10}}>
        <div style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)'}}><Ic n="srch" s={15} c={C.muted}/></div>
        <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Search company or contact…"
          style={{width:'100%',background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 10px 9px 32px',color:C.text,fontSize:13,fontFamily:"'Noto Sans JP'",outline:'none'}}/>
      </div>

      {/* Type Filter */}
      <div style={{display:'flex',gap:6,marginBottom:14,overflow:'auto',paddingBottom:3}}>
        {['all',...types].map(t=>(
          <button key={t} onClick={()=>setTypeFlt(t)}
            style={{background:typeFlt===t?C.red:C.border,border:'none',borderRadius:16,padding:'4px 12px',color:'#fff',fontSize:10,cursor:'pointer',whiteSpace:'nowrap',fontWeight:typeFlt===t?700:400}}>
            {t==='all'?'All Types':t}
          </button>
        ))}
      </div>

      {/* Company Cards */}
      {filteredCos.map(co=>{
        const prods = coProducts(co);
        const stockVal = totalCostValue(co);
        return (
          <Card key={co.id} st={{marginBottom:12,opacity:co.active?1:0.6,borderLeft:`3px solid ${typeColors[co.type]||C.muted}`}}
            onClick={()=>{setDetailCo(co);setTab('info');}} ch={
            <>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                    <span style={{fontSize:15,fontWeight:700}}>{co.name}</span>
                    <Badge ch={co.type} col={typeColors[co.type]||C.muted}/>
                    {!co.active&&<Badge ch="Inactive" col={C.muted}/>}
                  </div>
                  <div style={{fontSize:12,color:C.muted,display:'flex',alignItems:'center',gap:5}}>
                    <Ic n="users" s={12} c={C.muted}/>{co.contactPerson}
                  </div>
                  <div style={{fontSize:12,color:C.muted,display:'flex',alignItems:'center',gap:5,marginTop:2}}>
                    <Ic n="phone" s={12} c={C.muted}/>{co.phone}
                  </div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.blue,fontFamily:"'Space Mono'"}}>{prods.length} products</div>
                  {stockVal>0&&<div style={{fontSize:11,color:C.muted}}>{lkr(stockVal)}<br/><span style={{fontSize:9}}>stock cost</span></div>}
                </div>
              </div>
              <div style={{display:'flex',gap:6,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
                <div style={{flex:1,fontSize:10,color:C.muted}}><span style={{color:C.text,fontWeight:600}}>{co.paymentTerms}</span> payment</div>
                {co.email&&<div style={{fontSize:10,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:140}}>{co.email}</div>}
              </div>
            </>
          }/>
        );
      })}
      {filteredCos.length===0&&<div style={{textAlign:'center',color:C.muted,padding:40}}><Ic n="bldg" s={40} c={C.muted}/><p style={{marginTop:12}}>No companies found</p></div>}

      <Modal open={showForm} onClose={()=>setShowForm(false)} title={ed?'Edit Company':'Add Company'} ch={<CompanyForm f={f} setF={setF} types={types} onSave={save}/>}/>
    </div>
  );
}

// ── Company Form (shared) ─────────────────────────────────
function CompanyForm({f,setF,types,onSave}) {
  return (
    <>
      <Inp lbl="Company Name" val={f.name} set={v=>setF(p=>({...p,name:v}))} req/>
      <Sel lbl="Type" val={f.type} set={v=>setF(p=>({...p,type:v}))} opts={types}/>
      <Inp lbl="Contact Person" val={f.contactPerson} set={v=>setF(p=>({...p,contactPerson:v}))} ph="Full name"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <Inp lbl="Phone" val={f.phone} set={v=>setF(p=>({...p,phone:v}))} ph="+94 77 000 0000" type="tel"/>
        <Inp lbl="Email" val={f.email} set={v=>setF(p=>({...p,email:v}))} type="email"/>
      </div>
      <Inp lbl="Address" val={f.address} set={v=>setF(p=>({...p,address:v}))} ph="No., Street, City"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <Inp lbl="Website" val={f.website} set={v=>setF(p=>({...p,website:v}))} ph="www.example.com"/>
        <Inp lbl="Payment Terms" val={f.paymentTerms} set={v=>setF(p=>({...p,paymentTerms:v}))} ph="30 days / Cash"/>
      </div>
      <Inp lbl="VAT / Tax No" val={f.taxNo} set={v=>setF(p=>({...p,taxNo:v}))} ph="VAT-123456"/>
      <Textarea lbl="Notes" val={f.notes} set={v=>setF(p=>({...p,notes:v}))} ph="Additional notes about this company…"/>
      <Btn ch={f.id?'Update Company':'Add Company'} onClick={onSave} full/>
    </>
  );
}

// ═══════════════════════════════════════════════════════════
//  USERS / ACCOUNTS
// ═══════════════════════════════════════════════════════════
function AccountsPage() {
  const {users,upsertUser,toast2,user:me,sales} = useApp();
  const [showForm,setShowForm] = useState(false);
  const [ed,setEd] = useState(null);
  const blankF = {name:'',username:'',password:'',role:'cashier',email:'',active:true};
  const [f,setF] = useState(blankF);

  const openForm = (u=null) => {
    if(u){setEd(u);setF({...u,password:''});}
    else{setEd(null);setF(blankF);}
    setShowForm(true);
  };

  const save = async () => {
    if(!f.name||!f.username||(!ed&&!f.password)){toast2('Fill required fields!','error');return;}
    if(!ed&&users.find(u=>u.username===f.username)){toast2('Username exists!','error');return;}
    const u = {...f,avatar:f.name[0]?.toUpperCase()||'U',password:f.password||(ed?.password||''),id:ed?ed.id:uid(),createdAt:ed?ed.createdAt:today()};
    await upsertUser(u);
    toast2(ed?'Updated!':'User added!','success');
    setShowForm(false);
  };

  const toggle = async u => {
    if(u.id===me.id){toast2("Can't deactivate yourself!",'error');return;}
    await upsertUser({...u,active:!u.active});
  };
  const rc={admin:C.red,manager:C.blue,cashier:C.green};

  return (
    <div style={{padding:14,paddingBottom:90}}>
      <SectionHeader title="User Accounts" right={<Btn ch={<><Ic n="add" s={14} c="#fff"/>Add User</>} onClick={()=>openForm()} sz="sm"/>}/>
      <div style={{display:'flex',gap:10,marginBottom:18}}>
        <StatBox lbl="Total Users" val={users.length} col={C.red} icon="users"/>
        <StatBox lbl="Active Users" val={users.filter(u=>u.active).length} col={C.green} icon="ok"/>
      </div>

      {users.map(u=>{
        const uSales=sales.filter(s=>s.cashier===u.username);
        const uRev=uSales.reduce((a,s)=>a+s.total,0);
        return (
          <Card key={u.id} st={{marginBottom:10,opacity:u.active?1:0.6}} ch={
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <div style={{width:46,height:46,borderRadius:12,background:rc[u.role]+'33',border:`2px solid ${rc[u.role]}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:900,color:rc[u.role],flexShrink:0}}>{u.avatar}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                  <span style={{fontWeight:700,fontSize:14}}>{u.name}</span>
                  {!u.active&&<Badge ch="Inactive" col={C.muted}/>}
                  {u.id===me.id&&<Badge ch="You" col={C.gold}/>}
                </div>
                <div style={{fontSize:11,color:C.muted}}>@{u.username} · {u.email}</div>
                <div style={{display:'flex',gap:7,marginTop:3,alignItems:'center',flexWrap:'wrap'}}>
                  <Badge ch={u.role} col={rc[u.role]}/>
                  {uSales.length>0&&<span style={{fontSize:10,color:C.muted}}>{uSales.length} sales · {lkr(uRev)}</span>}
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:5,flexShrink:0}}>
                <button onClick={()=>openForm(u)} style={{background:C.border,border:'none',borderRadius:6,padding:'5px 7px',cursor:'pointer'}}><Ic n="edit" s={13}/></button>
                <button onClick={()=>toggle(u)} style={{background:u.active?'#1a3a1a':'#3a1a1a',border:'none',borderRadius:6,padding:'5px 7px',cursor:'pointer'}}><Ic n={u.active?'eye':'eyeoff'} s={13} c={u.active?C.green:C.red}/></button>
              </div>
            </div>
          }/>
        );
      })}

      <Modal open={showForm} onClose={()=>setShowForm(false)} title={ed?'Edit User':'Add User'} ch={
        <>
          <Inp lbl="Full Name" val={f.name} set={v=>setF(p=>({...p,name:v}))} req/>
          <Inp lbl="Username" val={f.username} set={v=>setF(p=>({...p,username:v}))} req dis={!!ed}/>
          <Inp lbl={ed?"New Password (blank = keep)":"Password"} val={f.password} set={v=>setF(p=>({...p,password:v}))} type="password" req={!ed}/>
          <Inp lbl="Email" val={f.email} set={v=>setF(p=>({...p,email:v}))} type="email"/>
          <Sel lbl="Role" val={f.role} set={v=>setF(p=>({...p,role:v}))} opts={[{v:'admin',l:'Admin — Full Access'},{v:'manager',l:'Manager — No User Mgmt'},{v:'cashier',l:'Cashier — POS Only'}]}/>
          <Btn ch={ed?'Update User':'Add User'} onClick={save} full/>
        </>
      }/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════════════
function App() {
  const [ready,setReady] = useState(false);
  const [me,setMe] = useState(null);
  const [pg,setPg] = useState('dash');
  const [toast,setToast] = useState(null);
  const [users,setUsers] = useState([]);
  const [products,setProducts] = useState([]);
  const [sales,setSales] = useState([]);
  const [cheques,setCheques] = useState([]);
  const [companies,setCompanies] = useState([]);
  const [posKey,setPosKey] = useState(0);   // incremented to reset POS
  const [billToShow,setBillToShow] = useState(null);
  const tRef = useRef(null);

  // Init DB
  useEffect(()=>{
    DB.init().then(async()=>{
      await DB.seed('users',SEED_USERS);
      await DB.seed('products',SEED_PRODUCTS);
      await DB.seed('sales',SEED_SALES);
      await DB.seed('cheques',SEED_CHEQUES);
      await DB.seed('companies',SEED_COMPANIES);
      const [u,p,s,c,co] = await Promise.all([DB.getAll('users'),DB.getAll('products'),DB.getAll('sales'),DB.getAll('cheques'),DB.getAll('companies')]);
      setUsers(u); setProducts(p); setSales(s); setCheques(c); setCompanies(co);
    }).catch(err=>{
      console.warn('IndexedDB failed, using memory only:',err);
      setUsers(SEED_USERS); setProducts(SEED_PRODUCTS); setSales(SEED_SALES); setCheques(SEED_CHEQUES); setCompanies(SEED_COMPANIES);
    }).finally(()=>setReady(true));
  },[]);

  const toast2 = (msg,type='info') => {
    setToast({msg,type});
    clearTimeout(tRef.current);
    tRef.current = setTimeout(()=>setToast(null),2800);
  };

  const login  = u => { setMe(u); setPg('dash'); };
  const logout = () => { setMe(null); setPg('dash'); setBillToShow(null); };

  // DB-backed mutations
  const upsertProduct = async p => {
    await DB.put('products',p);
    setProducts(prev=>prev.find(x=>x.id===p.id)?prev.map(x=>x.id===p.id?p:x):[...prev,p]);
  };
  const deleteProduct = async id => {
    await DB.del('products',id);
    setProducts(prev=>prev.filter(p=>p.id!==id));
  };
  const upsertCheque = async c => {
    await DB.put('cheques',c);
    setCheques(prev=>prev.find(x=>x.id===c.id)?prev.map(x=>x.id===c.id?c:x):[...prev,c]);
  };
  const deleteCheque = async id => {
    await DB.del('cheques',id);
    setCheques(prev=>prev.filter(c=>c.id!==id));
  };
  const upsertUser = async u => {
    await DB.put('users',u);
    setUsers(prev=>prev.find(x=>x.id===u.id)?prev.map(x=>x.id===u.id?u:x):[...prev,u]);
  };
  const upsertCompany = async c => {
    await DB.put('companies',c);
    setCompanies(prev=>prev.find(x=>x.id===c.id)?prev.map(x=>x.id===c.id?c:x):[...prev,c]);
  };
  const deleteCompany = async id => {
    await DB.del('companies',id);
    setCompanies(prev=>prev.filter(c=>c.id!==id));
  };

  // POS sale completion — saves to DB, lifts bill, resets POS
  const onSaleComplete = async sale => {
    await DB.put('sales',sale);
    setSales(prev=>[...prev,sale]);
    setBillToShow(sale);
    setPosKey(k=>k+1);
  };

  // New sale — clear bill, fresh POS (already keyed)
  const onNewSale = () => setBillToShow(null);

  // Loading screen
  if(!ready) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div style={{width:64,height:64,borderRadius:18,background:C.red,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 0 30px ${C.red}66`}}>
        <Ic n="bolt" s={32} c="#fff"/>
      </div>
      <div style={{color:C.muted,fontSize:14}}>Initializing database…</div>
    </div>
  );

  const ctx = {user:me,users,products,sales,cheques,companies,toast2,login,logout,onSaleComplete,upsertProduct,deleteProduct,upsertCheque,deleteCheque,upsertUser,upsertCompany,deleteCompany};
  const pages = {dash:Dashboard,prod:ProductsPage,comp:CompaniesPage,chq:ChequesPage,accts:AccountsPage};

  // POS page: show bill if just completed, else show POS (keyed for fresh mount)
  const renderPOS = () => {
    if(billToShow) return <BillView sale={billToShow} onNewSale={onNewSale}/>;
    return <POSPage key={posKey}/>;
  };

  return (
    <Ctx.Provider value={ctx}>
      <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',position:'relative'}}>
        {!me ? <LoginPage/> : (
          <>
            {pg==='pos' ? renderPOS() : React.createElement(pages[pg]||Dashboard)}
            {!(pg==='pos'&&billToShow) && <Nav pg={pg} setPg={setPg} user={me}/>}
          </>
        )}
        <Toast t={toast}/>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

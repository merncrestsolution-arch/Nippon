//  QUOTATION / MANUAL BILLING PAGE
// ═══════════════════════════════════════════════════════════════════════
function QuotationPage() {
  const {user,toast2} = useApp();
  const [items,setItems]   = useState([]);
  const [cust,setCust]     = useState('');
  const [phone,setPhone]   = useState('');
  const [project,setProject] = useState('');
  const [discount,setDiscount] = useState('');
  const [srch,setSrch]     = useState('');
  const [supFlt,setSupFlt] = useState('All');
  const [catFlt,setCatFlt] = useState('All');
  const [tab,setTab]       = useState('catalog');
  const [qNum] = useState('QT-'+today().replace(/-/g,'')+'-'+String(uid()).slice(-3));

  const CATS_FOR_SUP = sup => {
    const src = sup==='All'?SUPPLIER_CATALOG:SUPPLIER_CATALOG.filter(i=>i.sup===sup);
    return ['All',...new Set(src.map(i=>i.cat))];
  };

  const filtered = SUPPLIER_CATALOG.filter(i=>{
    const matchSup = supFlt==='All'||i.sup===supFlt;
    const matchCat = catFlt==='All'||i.cat===catFlt;
    const matchSrch = !srch||i.name.toLowerCase().includes(srch.toLowerCase())||i.sup.toLowerCase().includes(srch.toLowerCase());
    return matchSup&&matchCat&&matchSrch;
  });

  const addItem = cat => {
    const ex = items.find(i=>i.id===cat.id);
    if(ex){
      setItems(prev=>prev.map(i=>i.id===cat.id?{...i,qty:i.qty+1}:i));
    } else {
      const margin = 1.25; // default 25% markup
      setItems(prev=>[...prev,{...cat,qty:1,sellPrice:Math.ceil(cat.cost*margin/10)*10}]);
    }
    toast2(cat.name.slice(0,28)+' added','success');
  };

  const updQty  = (id,d) => setItems(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+d)}:i));
  const updPrice= (id,v) => setItems(prev=>prev.map(i=>i.id===id?{...i,sellPrice:parseFloat(v)||0}:i));
  const remItem = id => setItems(prev=>prev.filter(i=>i.id!==id));
  const clearAll= () => { if(confirm('Clear all items?')){setItems([]);} };

  const discN = parseFloat(discount||0);
  const subtotal = items.reduce((a,i)=>a+i.sellPrice*i.qty,0);
  const totalAmt = Math.max(0,subtotal-discN);
  const inCart = id => items.find(i=>i.id===id);

  const printQuotation = () => {
    if(!cust.trim()){toast2('Enter customer name first!','error');return;}
    if(!items.length){toast2('Add items to quotation!','error');return;}
    const el=document.getElementById('bill-print');
    const rows=items.map((i,n)=>`<tr style="border-bottom:1px solid #eee"><td style="padding:6px 4px;font-size:11px">${n+1}</td><td style="padding:6px 4px;font-size:11px">${i.name}</td><td style="padding:6px 4px;font-size:11px;text-align:center">${i.qty} ${i.unit}</td><td style="padding:6px 4px;font-size:11px;text-align:right">Rs.${i.sellPrice.toLocaleString('en',{minimumFractionDigits:2})}</td><td style="padding:6px 4px;font-size:11px;text-align:right;font-weight:700">Rs.${(i.sellPrice*i.qty).toLocaleString('en',{minimumFractionDigits:2})}</td></tr>`).join('');
    el.innerHTML=`
      <div style="font-family:Arial,sans-serif;max-width:720px;margin:0 auto;padding:20px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #CC0000;padding-bottom:14px;margin-bottom:16px">
          <div>
            <div style="font-size:22px;font-weight:900;color:#CC0000;letter-spacing:1px">NIPPON ELECTRICALS</div>
            <div style="font-size:11px;color:#555;margin-top:2px">Electrical Supplies &amp; Solutions · Sri Lanka</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:18px;font-weight:700;color:#333">QUOTATION</div>
            <div style="font-size:11px;color:#777">No: <strong>${qNum}</strong></div>
            <div style="font-size:11px;color:#777">Date: <strong>${today()}</strong></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;background:#f9f9f9;padding:12px;border-radius:6px">
          <div>
            <div style="font-size:9px;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Bill To</div>
            <div style="font-size:14px;font-weight:700">${cust}</div>
            ${phone?`<div style="font-size:11px;color:#555;margin-top:2px">Tel: ${phone}</div>`:''}
            ${project?`<div style="font-size:11px;color:#555;margin-top:2px">Project: ${project}</div>`:''}
          </div>
          <div style="text-align:right">
            <div style="font-size:9px;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Prepared By</div>
            <div style="font-size:12px;font-weight:600">${user.name}</div>
            <div style="font-size:11px;color:#777">Valid: 30 days from issue date</div>
          </div>
        </div>
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:#CC0000;color:#fff">
              <th style="padding:8px 4px;font-size:11px;text-align:left;width:28px">#</th>
              <th style="padding:8px 4px;font-size:11px;text-align:left">Description</th>
              <th style="padding:8px 4px;font-size:11px;text-align:center;width:60px">Qty</th>
              <th style="padding:8px 4px;font-size:11px;text-align:right;width:90px">Unit Price</th>
              <th style="padding:8px 4px;font-size:11px;text-align:right;width:90px">Total</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="margin-top:16px;display:flex;justify-content:flex-end">
          <div style="min-width:240px">
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:12px"><span>Subtotal</span><span>Rs.${subtotal.toLocaleString('en',{minimumFractionDigits:2})}</span></div>
            ${discN>0?`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:12px;color:#CC0000"><span>Discount</span><span>- Rs.${discN.toLocaleString('en',{minimumFractionDigits:2})}</span></div>`:''}
            <div style="display:flex;justify-content:space-between;padding:10px 0;font-size:16px;font-weight:900;border-top:2px solid #CC0000"><span>TOTAL</span><span style="color:#CC0000">Rs.${totalAmt.toLocaleString('en',{minimumFractionDigits:2})}</span></div>
          </div>
        </div>
        <div style="margin-top:28px;padding-top:14px;border-top:1px solid #eee;font-size:10px;color:#999;text-align:center">
          All prices are inclusive of taxes unless otherwise stated. Prices subject to change without prior notice.<br/>
          Thank you for choosing Nippon Electricals — Your trusted electrical supplier.
        </div>
      </div>`;
    window.print();
  };

  const supColors = {'Kevilton':C.red,'ACL Cables':C.blue,'Kelani':C.orange,'Green Electric':C.green};

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',paddingBottom:70}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.red},#7A0000)`,padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
        <NipponLogo size={32}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:15,color:'#fff'}}>Quotation Builder</div>
          <div style={{fontSize:10,color:'#ffcccc'}}>{qNum}</div>
        </div>
        <Btn ch={<><Ic n="print" s={14} c="#fff"/>Print</>} onClick={printQuotation} sz="sm"
          st={{background:'rgba(255,255,255,0.2)',border:'1px solid rgba(255,255,255,0.3)'}}/>
      </div>

      {/* Sub-tabs */}
      <div style={{display:'flex',background:'#141414',borderBottom:`1px solid ${C.border}`}}>
        {[['catalog','box','Catalog'],['quote','cart',items.length>0?`Items (${items.length})`:'Items'],['info','users','Customer']].map(([v,ic,lb])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:'9px 4px',background:'none',border:'none',cursor:'pointer',color:tab===v?C.red:C.muted,fontWeight:tab===v?700:400,fontSize:11,borderBottom:tab===v?`2px solid ${C.red}`:'2px solid transparent',display:'flex',alignItems:'center',justifyContent:'center',gap:4,transition:'color 0.2s'}}>
            <Ic n={ic} s={13} c={tab===v?C.red:C.muted}/>{lb}
          </button>
        ))}
      </div>

      {/* ── CATALOG TAB ── */}
      {tab==='catalog'&&(
        <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column'}}>
          {/* Search */}
          <div style={{padding:'10px 12px 6px',background:'#141414',borderBottom:`1px solid ${C.border}`}}>
            <div style={{position:'relative',marginBottom:8}}>
              <div style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)'}}><Ic n="srch" s={13} c={C.muted}/></div>
              <input value={srch} onChange={e=>{setSrch(e.target.value);}} placeholder="Search products…"
                style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 10px 8px 28px',color:C.text,fontSize:13,fontFamily:"'Noto Sans JP'",outline:'none'}}
                onFocus={e=>e.target.style.borderColor=C.red} onBlur={e=>e.target.style.borderColor=C.border}/>
            </div>
            {/* Supplier filter */}
            <div style={{display:'flex',gap:5,overflow:'auto',paddingBottom:3}}>
              {SSUPS.map(s=>(
                <button key={s} onClick={()=>{setSupFlt(s);setCatFlt('All');}} style={{background:supFlt===s?C.red:C.border,border:'none',borderRadius:16,padding:'4px 11px',color:'#fff',fontSize:10,cursor:'pointer',whiteSpace:'nowrap',fontWeight:supFlt===s?700:400,flexShrink:0,transition:'all 0.18s'}}>{s}</button>
              ))}
            </div>
          </div>
          {/* Category filter */}
          {!srch&&<div style={{padding:'6px 12px',background:'#141414',borderBottom:`1px solid ${C.border}`,display:'flex',gap:5,overflow:'auto'}}>
            {CATS_FOR_SUP(supFlt).slice(0,12).map(c=>(
              <button key={c} onClick={()=>setCatFlt(c)} style={{background:catFlt===c?'#333':C.dark,border:`1px solid ${catFlt===c?C.muted:C.border}`,borderRadius:12,padding:'3px 10px',color:catFlt===c?C.text:C.muted,fontSize:10,cursor:'pointer',whiteSpace:'nowrap',transition:'all 0.18s',flexShrink:0}}>{c}</button>
            ))}
          </div>}
          {/* Item count */}
          <div style={{padding:'6px 13px',fontSize:10,color:C.muted,background:'#141414',borderBottom:`1px solid ${C.border}`}}>
            {filtered.length} items {srch&&`matching "${srch}"`}
          </div>
          {/* Product list */}
          <div style={{flex:1,overflow:'auto',padding:'8px 10px'}}>
            {filtered.map((item,i)=>{
              const ci=inCart(item.id);
              return (
                <div key={item.id} className="anim-fadeUp" style={{background:ci?'#1a1000':C.card,borderRadius:10,padding:'10px 12px',marginBottom:7,border:`1px solid ${ci?C.gold+'88':C.border}`,display:'flex',alignItems:'center',gap:10,animationDelay:`${Math.min(i,20)*0.03}s`,transition:'all 0.18s'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:700,lineHeight:1.3,marginBottom:3}}>{item.name}</div>
                    <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                      <span style={{background:supColors[item.sup]+'22',color:supColors[item.sup],border:`1px solid ${supColors[item.sup]}44`,borderRadius:4,padding:'1px 6px',fontSize:9,fontWeight:700}}>{item.sup}</span>
                      <span style={{fontSize:10,color:C.muted}}>{item.cat}</span>
                    </div>
                    <div style={{fontSize:12,color:C.muted,marginTop:3}}>Cost: <span style={{fontFamily:"'Space Mono'",fontWeight:700,color:C.text}}>Rs.{item.cost.toLocaleString()}</span> / {item.unit}</div>
                  </div>
                  <button onClick={()=>addItem(item)} style={{background:ci?C.gold:C.red,border:'none',borderRadius:8,width:34,height:34,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'background 0.2s',fontWeight:700,color:'#fff',fontSize:18}}>
                    {ci?ci.qty:'+'}
                  </button>
                </div>
              );
            })}
            {!filtered.length&&<div style={{textAlign:'center',color:C.muted,padding:40}}><Ic n="srch" s={44} c={C.muted}/><p style={{marginTop:12,fontSize:13}}>No products found</p></div>}
          </div>
        </div>
      )}

      {/* ── QUOTE ITEMS TAB ── */}
      {tab==='quote'&&(
        <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column'}}>
          <div style={{flex:1,overflow:'auto',padding:'10px 12px'}}>
            {!items.length?(
              <div style={{textAlign:'center',color:C.muted,padding:48}}>
                <Ic n="cart" s={44} c={C.muted}/>
                <p style={{marginTop:12,fontSize:13}}>No items added yet</p>
                <Btn ch="Browse Catalog" v="out" onClick={()=>setTab('catalog')} st={{marginTop:16}}/>
              </div>
            ):items.map((item,i)=>(
              <div key={item.id} className="anim-fadeUp" style={{background:C.card,borderRadius:10,padding:11,marginBottom:8,border:`1px solid ${C.border}`,animationDelay:`${i*0.04}s`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div style={{flex:1,minWidth:0,paddingRight:6}}>
                    <div style={{fontSize:12,fontWeight:700,lineHeight:1.3,marginBottom:2}}>{item.name}</div>
                    <span style={{background:supColors[item.sup]+'22',color:supColors[item.sup],border:`1px solid ${supColors[item.sup]}44`,borderRadius:4,padding:'1px 6px',fontSize:9,fontWeight:700}}>{item.sup}</span>
                    <div style={{fontSize:10,color:C.muted,marginTop:3}}>Cost Price: Rs.{item.cost.toLocaleString()}</div>
                  </div>
                  <button onClick={()=>remItem(item.id)} style={{background:'#3a1a1a',border:'none',borderRadius:6,padding:'5px 7px',cursor:'pointer',flexShrink:0}}><Ic n="del" s={13} c={C.red}/></button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:8,alignItems:'center'}}>
                  <div style={{display:'flex',alignItems:'center',background:'#242424',borderRadius:8,overflow:'hidden'}}>
                    <button onClick={()=>updQty(item.id,-1)} style={{background:'none',border:'none',padding:'6px 11px',cursor:'pointer',color:C.red,fontSize:16,fontWeight:700}}>−</button>
                    <span style={{fontFamily:"'Space Mono'",fontWeight:700,fontSize:13,minWidth:22,textAlign:'center'}}>{item.qty}</span>
                    <button onClick={()=>updQty(item.id,1)} style={{background:'none',border:'none',padding:'6px 11px',cursor:'pointer',color:C.green,fontSize:16,fontWeight:700}}>+</button>
                  </div>
                  <div>
                    <div style={{fontSize:9,color:C.muted,marginBottom:3,textTransform:'uppercase',letterSpacing:0.4}}>Sell Price (Rs.)</div>
                    <input type="number" value={item.sellPrice} onChange={e=>updPrice(item.id,e.target.value)}
                      style={{width:'100%',background:'#1a1a00',border:`1.5px solid ${C.gold}66`,borderRadius:7,padding:'6px 9px',color:C.text,fontSize:13,fontFamily:"'Space Mono'",fontWeight:700,outline:'none'}}
                      onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.gold+'66'}/>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:9,color:C.muted,marginBottom:3,textTransform:'uppercase',letterSpacing:0.4}}>Line Total</div>
                    <div style={{fontFamily:"'Space Mono'",fontWeight:900,fontSize:13,color:C.red}}>Rs.{(item.sellPrice*item.qty).toLocaleString('en',{minimumFractionDigits:0})}</div>
                  </div>
                </div>
                {item.cost>0&&<div style={{marginTop:6,fontSize:10,color:item.sellPrice>item.cost?C.green:C.red}}>
                  Margin: Rs.{((item.sellPrice-item.cost)*item.qty).toLocaleString()} ({item.cost>0?((item.sellPrice-item.cost)/item.cost*100).toFixed(0):0}%)
                </div>}
              </div>
            ))}
          </div>
          {items.length>0&&(
            <div style={{background:'#141414',padding:14,borderTop:`1px solid ${C.border}`}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13}}><span style={{color:C.muted}}>Subtotal</span><span style={{fontFamily:"'Space Mono'",fontWeight:700}}>Rs.{subtotal.toLocaleString('en',{minimumFractionDigits:2})}</span></div>
              <input value={discount} onChange={e=>setDiscount(e.target.value)} placeholder="Discount (Rs.)" type="number"
                style={{width:'100%',background:'#242424',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 12px',color:C.text,fontSize:13,fontFamily:"'Noto Sans JP'",outline:'none',marginBottom:8}}/>
              <div style={{display:'flex',justifyContent:'space-between',borderTop:`1px solid ${C.border}`,paddingTop:8,marginBottom:12}}>
                <span style={{fontWeight:700,fontSize:15}}>TOTAL</span>
                <span style={{fontFamily:"'Space Mono'",fontWeight:900,fontSize:20,color:C.red}}>Rs.{totalAmt.toLocaleString('en',{minimumFractionDigits:2})}</span>
              </div>
              <div style={{display:'flex',gap:8}}>
                <Btn ch="Clear All" v="dk" onClick={clearAll} st={{flex:1}}/>
                <Btn ch={<><Ic n="print" s={14} c="#fff"/>Print Quotation</>} onClick={printQuotation} st={{flex:2,background:C.green,border:'none',color:'#fff'}}/>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── CUSTOMER INFO TAB ── */}
      {tab==='info'&&(
        <div style={{flex:1,overflow:'auto',padding:'14px 13px'}}>
          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:0.5,textTransform:'uppercase',marginBottom:12}}>Quotation Details</div>
            <div style={{background:'#242424',borderRadius:8,padding:'9px 13px',marginBottom:12,fontSize:11,color:C.muted}}>
              Quotation No: <span style={{fontFamily:"'Space Mono'",fontWeight:700,color:C.gold}}>{qNum}</span>
            </div>
            <Inp lbl="Customer / Client Name" val={cust} set={setCust} ph="Full name or company" req/>
            <Inp lbl="Phone Number" val={phone} set={setPhone} ph="07X XXXXXXX" type="tel"/>
            <Inp lbl="Project / Site Name" val={project} set={setProject} ph="e.g. House wiring – Kandy"/>
          </div>
          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:0.5,textTransform:'uppercase',marginBottom:12}}>Quote Summary</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
              <StatBox lbl="Total Items" val={items.length} col={C.blue} icon="box"/>
              <StatBox lbl="Quotation Total" val={'Rs.'+Math.round(totalAmt/1000)+'K'} col={C.green} icon="coin"/>
            </div>
            <Btn ch={<><Ic n="print" s={14} c="#fff"/>Print Quotation</>} onClick={printQuotation} full sz="lg"
              dis={!cust.trim()||!items.length} st={{background:C.green,border:'none',color:'#fff'}}/>
            {(!cust||!items.length)&&<p style={{fontSize:11,color:C.muted,textAlign:'center',marginTop:8}}>{!cust?'Enter customer name above':''}{!items.length?' Add items from Catalog':''}</p>}
          </div>
          <div style={{background:'#1a1000',border:`1px solid ${C.gold}33`,borderRadius:10,padding:'10px 14px',fontSize:11,color:C.gold,lineHeight:1.6}}>
            <strong>Tip:</strong> Set selling prices in the Items tab. Default markup is 25% over supplier cost price. Prices shown are supplier MRP — you may buy at dealer discount.
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════════════════════════
function App() {
  const [configured,setConfigured]=useState(()=>!!getCfg());
  const [ready,setReady]  =useState(false);
  const [dbErr,setDbErr]  =useState('');
  const [me,setMe]        =useState(null);
  const [pg,setPg]        =useState('dash');
  const [toast,setToast]  =useState(null);
  const [users,setUsers]  =useState([]);
  const [products,setProducts]=useState([]);
  const [sales,setSales]  =useState([]);
  const [cheques,setCheques]=useState([]);
  const [companies,setCompanies]=useState([]);
  const [posKey,setPosKey]=useState(0);
  const [bill,setBill]    =useState(null);
  const tRef=useRef(null);
  const chanRef=useRef(null);

  const merge=(set,item)=>set(prev=>prev.find(x=>x.id===item.id)?prev.map(x=>x.id===item.id?item:x):[...prev,item]);
  const remove=(set,id)=>set(prev=>prev.filter(x=>x.id!==id));

  const subscribeRT=()=>{
    if(chanRef.current)_sb.removeChannel(chanRef.current);
    const map={users:setUsers,products:setProducts,sales:setSales,cheques:setCheques,companies:setCompanies};
    const ch=_sb.channel('ne-rt-'+Math.random());
    Object.keys(map).forEach(t=>ch.on('postgres_changes',{event:'*',schema:'public',table:t},pl=>{
      if(pl.eventType==='DELETE')remove(map[t],pl.old.id);
      else merge(map[t],{...pl.new.data,id:pl.new.id});
    }));
    ch.subscribe(); chanRef.current=ch;
  };

  const loadAll=async()=>{
    const[u,p,s,c,co]=await Promise.all([DB.getAll('users'),DB.getAll('products'),DB.getAll('sales'),DB.getAll('cheques'),DB.getAll('companies')]);
    setUsers(u);setProducts(p);setSales(s);setCheques(c);setCompanies(co);
  };

  useEffect(()=>{
    if(!configured)return;
    const cfg=getCfg(); if(!cfg)return;
    initSupabase(cfg.url,cfg.key);
    setReady(false);setDbErr('');
    loadAll()
      .then(async()=>{await DB.seed('users',SEED_USERS);const[u]=await Promise.all([DB.getAll('users')]);setUsers(u);subscribeRT();})
      .catch(e=>{console.error(e);setDbErr('Connection failed: '+e.message);})
      .finally(()=>setReady(true));
    return()=>{if(chanRef.current)_sb.removeChannel(chanRef.current);};
  },[configured]);

  const toast2=(msg,type='info')=>{setToast({msg,type});clearTimeout(tRef.current);tRef.current=setTimeout(()=>setToast(null),2800);};
  const login=u=>{setMe(u);setPg('dash');};
  const logout=()=>{setMe(null);setPg('dash');setBill(null);};
  const reconfigure=()=>{clearCfg();setConfigured(false);setMe(null);setReady(false);};

  const upsertProduct=async p=>{await DB.put('products',p);merge(setProducts,p);};
  const deleteProduct=async id=>{await DB.del('products',id);remove(setProducts,id);};
  const upsertCheque =async c=>{await DB.put('cheques',c);merge(setCheques,c);};
  const deleteCheque =async id=>{await DB.del('cheques',id);remove(setCheques,id);};
  const upsertUser   =async u=>{await DB.put('users',u);merge(setUsers,u);};
  const upsertCompany=async c=>{await DB.put('companies',c);merge(setCompanies,c);};
  const deleteCompany=async id=>{await DB.del('companies',id);remove(setCompanies,id);};
  const onSaleComplete=async sale=>{await DB.put('sales',sale);setSales(prev=>[...prev,sale]);setBill(sale);setPosKey(k=>k+1);};
  const onNewSale=()=>setBill(null);

  if(!configured) return <SetupScreen onConnected={()=>setConfigured(true)}/>;
  if(!ready) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div className="anim-float"><NipponLogo size={72} glow={true}/></div>
      <div style={{color:C.muted,fontSize:14}}>Connecting to database…</div>
      {dbErr&&<div style={{maxWidth:300,background:'#3a1a1a',border:`1px solid ${C.red}44`,borderRadius:10,padding:16,textAlign:'center'}}>
        <p style={{fontSize:12,color:'#ff8888',marginBottom:12,lineHeight:1.5}}>{dbErr}</p>
        <Btn ch="Reconfigure" v="out" onClick={reconfigure}/>
      </div>}
    </div>
  );

  const ctx={user:me,users,products,sales,cheques,companies,toast2,login,logout,onSaleComplete,upsertProduct,deleteProduct,upsertCheque,deleteCheque,upsertUser,upsertCompany,deleteCompany,reconfigure};
  const pages={dash:Dashboard,prod:ProductsPage,comp:CompaniesPage,chq:ChequesPage,accts:AccountsPage,quot:QuotationPage};
  const renderPOS=()=>bill?<BillView sale={bill} onNewSale={onNewSale}/>:<POSPage key={posKey}/>;

  return (
    <Ctx.Provider value={ctx}>
      <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',position:'relative'}}>
        {!me?<LoginPage/>:(
          <>
            {pg==='pos'?renderPOS():React.createElement(pages[pg]||Dashboard)}
            {!(pg==='pos'&&bill)&&<Nav pg={pg} setPg={setPg} user={me}/>}
          </>
        )}
        <Toast t={toast}/>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
